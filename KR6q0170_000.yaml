body:
  text: 重刻宗範序光緒丙戌歲聿云莫葭灰既動瑞雪盈尺友人楊仁山郵寄是集來吳同參靈虗道人招余往勘余見其格律精嚴取裁的當不禁踊躍贊歎曰伊菴前輩可謂先得我心矣適有禪客在座略顧册目便不啓閲少頃詢曰是篇何人所輯已得正悟否靈虗子答云此公打破漆桶於向上一著親入密藏深歎禪河泛濫後人無從問津因於太虗空中倏釘箇楔有定據無準則俾人由此契入不致為黑風噩浪吹入羅剎鬼國是亦苦心士也客曰宗門下事如電光石火快便難逢神龍天馬尚難倣佛範云乎哉余應之曰然子言誠高矣美矣第徐六擔板見尚未圓誠能死盡偷心深入堂奧必不斥此篇為賸語客曰何謂也余曰千七百則公案古人判為爛葛藤但參學之士咸如二祖一言契悟即證無生匪特千七百可聿付祖龍即三藏十二部亦可投之巨浸矣何則腳跟下事本無實法只要灼破面門立地搆取則教網綱宗皆為靈龜迹耳安所謂範乎苟不如是中下之士智劣心浮聞多羅一言半偈如蚊上鐵牛及閲古德機緣又復汗牛充棟求其義嚴旨該可以契入者誠不可得則是集如見角識牛望煙知火循類以求因指見月較之重溟浩瀚欲渡無筏者不啻霄壤矣客曰範之義敬聞命矣終以貫教其旨云何余曰此更作者不得已之苦衷也參學得悟如夢裏拾金緣無始氣習頓難淨所謂風停波尚涌理悟念猶侵也若不經大冶洪爐鍛鍊淨盡終是説食不飽古雖有眼正不貴行履之説亦祇一期方便況今古相勘豈只日劫百倍如不假彌陀大願生入蓮花國中則他日一陰現依舊落他圈繢故智如永明尚有角虎之喻古來禪德末後歸重持名者不可縷指後人千萬弗及安可一悟為休漫云我作得主吾願同參上士既得正悟正好借一句彌陀消歸祕密藏中他日與同志諸君上品上升泛駕於七寶池內庶不負伊菴先生纂輯是篇接引後進之苦心也客於是唯唯靈虗子曰真兄可謂語言三昧引人入勝矣盍不將此段因緣載諸簡端以為鴻雪之一證乎余應曰諾客退爰筆以為之序賜進士出身賞戴花翎補用知府特授浙江湖州府安吉縣知縣黔築悟真居士李宗鄴撰序琴軫失調則改弦而更張之教軌失馭則鑒機而疏通之不疏則運塞而通之道繫於變與時轉移救弊扶衰斯度生化法之大綱也佛教東流溯漢迄梁學者泥經語而不探心源達摩倡為別傳妙心見性成佛之宗而天下景從此一變也然師資授受間心心相印不離文字語言每有以巧見浮心妄為摸擬者馬祖復截言句轉為機用其接百丈也傳有野鴨公案再參一喝三日耳聾逆順莫測諸方同風不貴就體消停祇重從緣薦取此又一變也今夫覿面示機良馬則窺鞭而遄馳井蛙則墮底而無路不開以參究之方將何以䇿魯鈍之進繇是設一話頭塞斷意根工夫淹熟時至理彰話頭原無定則溈山之詰香巖則以父母未生前道一句來勘之死心之詰山谷則以彼此死燒後何處相見勘之雪巖高峰相承則專於無夢想時主人公徹了之細剔精搜深造閫奧三根普被一心洞透更無遺憾此又一變也易云窮則變變則通沿至明清宗師家上堂小參各語機鋒峻峭愈的愈奇而學人模稜揣竊為生死心藐務聲名心熱依樣葫蘆擎拳豎指或拂袖便行或禮拜徑退竟不辨彼知有之實虗脫不落草盤桓再三撈搜則其見地清徹基腳堅牢又烏從而印之於此顢頇率許涇渭雜流通者將復為塞此殆乘運而變之一時歟大慧杲云禪備衆體若祇愛擊石火閃電光謂説義理禪教壞男女豈知波瀾不闊生死命根不斷則不敢如此四楞著地為人我伊庵先生知其然也編緝宗範一書自參學以竟離垢自利利他敘秩井然括引古德研究熏修各範模則多取婆禪盡力穿透略不覆藏毋論淺根薄質覽之均可依行發悟惟須就明眼人印證而已又以從朝至寢明了意識主事易雜昭靈窠臼專提無夢想時主公語導人入門體會入微匪孟浪郎君作略衲捧讀之鏡其苦心隨喜其普願謹揭化機變通之理以抉韋編採集之幽衷天下後世其有同調者乎無棄芻蕘證明斯偈偈云死後生前體若何電光石火耳聾多要知無夢無思主磕破酣眠野鴨過道光乙未臘月望東川後學衲諾庵槃談撰凡例一徹參中無夢想見聞主依稀解路甚多一友於炮聲有觸豫曰鄰家放炮與汝無夢想主何涉便無語故得有見處者或問彼時炮聲與現在對談是同是別或問炮聲此際在甚麼處或問炮聲過後汝正眠無夢時更何處相見此是落草勘驗其有以擎拳下喝等機及鼻直眉橫等語祇對者盡與掃除要他將當時見處的實道一句如真有印契心有抓著癢筋話方與點睛否則重令參究一綱宗中五家所建宗旨儘足當機勘辨後人毋須重添名相一洞祖過水覩影悟徹後安知不重見雲巖徹授寶鏡但録中未及敘出耳一示辨中諸祖辨語今依原文摘録未敢擅更然密祖追拂事回生訣載其付法藏公不慎於忍祖前印後辨可以類推至藏忍二祖非尋常禪流可企及勿因辨語率生輕忽一湛祖枕子頌云四大無我心如風箇中誰是主人公廓然撲落原無物始悔從前錯用功令補録以便閲者對勘至雲門瑞白位中諸祖德隆望重即腹脹吐血身亡與疏山倒屙大慧發毒同關報境毋以意見有殊妄存軒輊一貫教中禪宗頓圓台宗妙圓故知有後兼須融會台宗
