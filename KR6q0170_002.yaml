body:
  text: 菩薩戒弟子錢伊庵編緝機用賓主相逢師資互印各出一隻手扶起破沙盆自佛祖遞傳迄今凡燈録所載何能遍收殆不止萬七千則已也茲則擇其尤要者略掇於後兼繫諸家拈頌評唱少志一班以備勘驗相見軌式雖不免得一漏萬之譏或亦同一臠全鼎之味云爾城東老母與佛同生不欲見佛每見便避然回顧東西總皆佛還以手掩面於十指掌中亦是佛雪竇曰他雖是箇老母宛有丈夫之作既知回避稍難不免吞聲忍氣今不欲見佛則許你切忌以手掩面何故明眼人覷著將謂雪竇教你老婆禪一女近佛坐入三昧文殊云何此女得近佛坐我不得佛令覺女起問之殊繞女三匝鳴指一下乃托至梵天盡神力不能出佛曰假使百千文殊亦出女定不得下方過四十二恆沙有罔明菩薩能出女定須臾罔明從地涌出鳴指一下女從定出洪覺範引大愚芝問文殊七佛師為甚出不得罔明下方至彈指便能出莫對自代云僧投寺裏宿賊打不防家豫愛其語偈曰出定只消彈指佛法豈用工夫我今要用便用不管罔明文殊雲庵舉曰文殊罔明見處有優劣無若無文殊何故出不得今擊鼓同到座前與罔明出女定是同是別良久云欲識佛性義當觀時節因緣若見得出家事畢解脫安樂喝一喝下座偈曰佛性天真事誰云別有師罔明彈指處女子出禪時不費纖毫力何曾動所思衆生總平等日用自多疑妙喜曰一種商量針線工夫郎君子弟禪謂文殊無緣罔明初地有緣下語云冤有頭債有主又謂文殊有心罔明無心故出得下語云有心用處還成錯無意求時却宛然又道文殊出不得杓柄在女子手裏罔明出得如蟲禦木又云因風縱火又云爭奈女子何種種邪解甚者作女入定出定勢推一推彈指一下哭蒼天數聲伏維尚饗拂袖之類冷眼看來慚惶殺人頌曰出得出不得是定非正定文殊與罔明送却窮性命調達謗佛生入地獄佛令阿難問答如三禪天樂又問還求出不答我待世尊來便出難曰佛是三界大師豈有入地獄分答佛既無入地獄分我豈有出地獄分湛堂偈曰可笑提婆達多入捺落十萬劫波雖然如三禪天樂吹布毛還須鳥窠殃崛至長者家值婦産難問何法免崛曰待問佛返白佛曰我從賢聖中來未曾殺生崛疾往婦聞當時分娩徑山杲請益湛堂答這話是金矢法不會如金會得如矢問豈無方便答有箇方便只是你不會崛云我乍入道待問世尊未到佛座他生下如何崛持佛語未到他家他已生下又如何杲茫然後讀華嚴菩薩登七地證無生法忍即得入不動地一切動心境想分別皆息菩薩心佛心菩提心涅槃心尚不起況復起世間心杲豁然堂説方便忽然現前頌曰華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領伊庵蒙單華藏老人開示於數則公案有滯曾請益女子入定老人作彈指勢托至梵天勢剷地不會後請益産難老人哂曰甚麼難産口裏七箇八箇生從此透盡古人言句較湛堂所説方便何等快利真難報之恩也二僧論風幡一曰風動二曰幡動六祖曰不是風幡動仁者心動雪竇云龍頭蛇尾好與二十棒孚上座咬齒竇云我與麼道也好與二十棒妙喜曰要識孚上座麼犀因玩月紋生角要識雪竇麼象被雷驚花入牙有人與巴陵作主出來與雪竇相見育王崇頌非風非幡無處著是風是幡無著處撩天俊鶻悉迷蹤踞地金毛還失措呵呵呵悟不悟令人却憶謝三郎一絲獨釣寒江雨天台韶曰斯乃無上心印合作麼會莫道風幡不動汝心妄動莫道不撥風幡就風幡通取莫道風幡動處是什麼有云附物明心不須認物有云色即是空有云應須妙會如是解與祖意有何交涉既不許合如何這裏徹悟何法不明豈是今會一則明又不會也僧問馬祖離四句絶百非請師直指西來意祖曰我今勞倦不能為説問智藏去問西堂堂曰我今頭痛問海兄去問百丈丈曰我到這裏却不會僧回舉祖曰藏頭白海頭黑圜悟云有謂之相瞞有道相推過有道三人總識他問頭所以不答拍盲將醍醐著毒藥這僧將一擔懞懂換箇不安樂勞三尊宿入泥水却被這擔板勘破今只管向語上作活計白是明頭合黑是暗頭合不知古人一句截斷意根須向正眼裏看始得此事如當人按一口劍擬議則喪身失命要會藏頭白海頭黑麼五祖道封后先生破竈墮不知姓氏嵩嶽有廟殿惟一竈祭宰甡命甚多師以杖敲竈三下曰只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃墮落須臾一人衣冠拜曰我竈神久受業報今蒙説法得脫生天持謝師曰是汝本有之性神再禮而沒侍者問某久侍不蒙示誨竈神得甚徑旨便生天師曰只向道是泥瓦合成會麼答不會師曰本有之性為甚不會侍禮拜師曰破也破也墮也墮也安國師曰此子會盡諸法無生難搆伊語脈問未審甚人搆得安曰不知者南陽喚侍者三喚三應師曰將謂吾孤負汝却是汝孤負吾妙喜云三喚話叢林有一絡索惟雪竇見透云國師三喚點即不到喜云灼然侍者三應到即不點喜曰却不恁麼謂吾負汝是汝負吾竇曰謾雪竇不得喜曰誰道召衆曰好箇謾雪竇不得雖然竇亦謾妙喜不得妙喜亦謾諸人不得諸人亦謾露柱不得玄沙云侍者即會竇云停囚長智喜云兩彩一賽雲門云作麼生是國師負侍處會得也是無端竇云元來不會喜云雪峰道底雲又云作麼生是侍負國師處粉骨碎身未報得竇云無端無端喜曰垛生招箭法眼云且去別時來竇云謾我不得喜云却是法眼會興化云一盲引衆盲竇云端的瞎喜云親言出親口玄覺徵云甚處是侍者會處僧云不會爭解恁麼應覺云汝少會在又云於此見得便識玄沙喜曰慚惶殺人翠巖芝云國師侍者總欠會在喜云猶較些子投子云抑逼人作麼竇云垛根漢喜曰理長即就復云唯趙州多口阿師下箇注腳令人疑著州答僧云如暗中書字字雖不成文彩已彰竇便喝喜曰且道這喝在國師侍者分上趙州分上隨一喝云不是命根五色索斷如何透得過竇云若有人問雪竇便打也要諸方檢點喜曰作賊人心虗竇頌師資會遇喜非輕喜云此語有兩負門無事相將草裏行喜云普州人送賊負汝負吾人莫問喜云放待冷來看任從天下競頭爭喜云只今休去便休去若覓了時無了時復云若求玄妙解會只管理會三喚話那裏是國師負那裏是侍者負有恁麼交涉鵝王擇乳素非鴨類這箇便是國師用劍刃上事南陽睡丹霞問侍者耽源云在否答在即在只是不見客霞云太深遠生答莫道上座佛眼也覷不見霞云龍生龍子鳳生鳳兒師起聞打三十棒趁去震聞云不謬為南陽國師徑山䇿云既在為甚不見客見得破非唯知耽落節亦見己出身路雖然如是莫將間學解埋沒祖師心紫璘供奉注經南陽盛一碗水著七粒米碗面安一隻箸問是甚麼義奉無語師云老僧意尚不會何況佛義溈山果云才見問只云草本不勞拈出踢倒便行饒國師通身是口也無説處百丈上堂有老人曰過去迦葉佛時因參人問大修行人還落因果也無某對不落因果遂五百生墮野狐今請代一轉語貴脫狐身師曰不昧因果老大悟禮曰某已脫住山後乞依亡僧送師令食後送亡僧衆聚議師領至後巖以杖挑出死狐火葬黃檗問錯對一轉語墮五百生狐轉轉不錯合作箇甚麼師云近前向汝道檗近前打一掌師笑曰將謂胡鬚赤更有赤鬚胡司馬頭陀舉問溈山作麼生溈撼門扇三下答太粗生溈曰佛法不是這箇道理僧問徑山杲云前百丈不落為甚墮答逢人但恁麼舉問後百丈不昧為甚脫答逢人但恁麼舉問或有問師未審向道甚麼答向你道逢人但恁麼舉頌云不落不昧石頭土塊陌路相逢銀山粉碎拍手呵呵笑一場明州有箇憨布袋雪峰云圓師聞舉野狐話一云不昧也未脫得一云不落又何曾墮圓釋然因詣積翠庵渡澗猛省見南公敘其事涕交頤南令熟睡圓起作偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖𣗖甚縱橫野狐跳入金毛隊南助喜百丈問溈山并却咽喉唇吻作麼生道溈曰却請和尚道丈曰不辭向汝道恐已後喪我兒孫又問五峰峰曰和尚也須并却丈曰無人處斫額望汝又問雲巖巖曰和尚有也未丈曰喪我兒孫雪竇頌却請和尚道虎頭生角出荒草十洲春盡花雕殘瑚樹林日杲杲和尚也并却龍蛇陳上看謀略令人長憶李將軍萬里秋空飛一鶚和尚有也未金毛師子不據地兩兩三三舊路行大雄山下空彈指麻谷到章敬繞禪牀三匝振錫一下立敬曰是是雪竇云錯又到南泉亦繞三匝卓錫一下立泉曰不是不是雪竇曰錯谷曰章敬道是為甚不是泉曰章敬即是是汝不是此風力所轉終成敗壞雪竇頌此錯彼錯切忌拈却四海浪平百川潮落大䇿高風十二門門門有路空蕭索非蕭索作者好求無病藥圜悟曰須明兩錯始得雪竇要提活潑潑處所以如此若皮下有血漢自然不向言中作解有道代麻谷下兩錯有甚交涉不知古人下語銷斷要關這邊也是那邊也是畢竟不在這兩頭慶藏主云持錫繞禪牀是不是俱錯其實亦不在此溈山云道是道不是均落麻谷彀中大溈不然忽有人繞牀立但道未到這裏好與三十棒陸亘云肇法師也奇怪解道天地與我同根萬物與我同體南泉指牡丹云時人見此花如夢相似陸罔測雪竇頌聞見覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒圜悟云南泉小睡語雪竇大睡語雖然作夢却作得箇好夢前頭説一體這裏説不同若道在鏡中觀方曉了則不離鏡處山河大地莫將鏡鑑若將鏡鑑便為兩段只可山是山水是水法住法位世間相常山河不礙眼光且道向甚處觀會麼到這裏向霜天月落夜將半這邊與你打迸了也那邊你自相度還知雪竇以本分事為人麼誰共照影為復自照為復共人照須是絶機絶解方到這境界今也不要澄潭也不待霜天月落即今作麼生徑山杲云若理上看非但南泉謾陸亘不得亦未摸著他腳跟一毫若事上看非但陸亘謾南泉不得亦未夢見他汗臭氣或道徑山説事説理但向他道只在理事上會取頌云天地同根伸一問未曾擡步已亡家無陰陽地花重發玉本無瑕却有瑕法昌遇與訥首座修花壇舉泉話你見似甚麼訥云只是一株花遇云與麼你也在窠窟裏訥云古人意作麼生遇云拈磚來訥拈磚了又問遇曰古佛過去久矣兩堂爭貓南泉云道得救取貓道不得即斬衆無對泉斬之趙州歸泉舉似州脫履頂頭上出泉曰子若在即救得又歸宗剗草以鋤斷蛇僧見曰原來是粗行沙門師曰你粗我粗問如何是粗師豎鋤問如何是細師作斬蛇勢問與麼則依而行師曰依行且置你甚處見我斬蛇來其僧無對真淨舉此一則公案云赤眼斬蛇道你粗我粗古人見處作麼生舉拂云今舉拂與斬蛇是同是別良久云人人有箇天真佛妙用縱橫總不知今日分明齊指出斬蛇舉拂更由誰又云南泉歸宗有優劣無優劣且置趙州頂鞋出又作麼生於此明得德山呵佛罵祖有什麼過若不明丹霞燒木佛院主鬚眉落所以禍福惟人自召喝一喝下座妙喜曰斬蛇斬貓多謂當機妙用又謂大用不存軌則豈是這箇道理具眼者舉起便知落處若大法不明打瓦鑽龜何時了雪峰問斬貓意德山便打趁出復召云會麼答不會德云我恁麼老婆心猶自不會鹽官尚問覺印斬貓案印曰須是南泉始得詰之尚不能對至僧堂大悟古人道從今去更不疑老和尚舌頭信然偈曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𮭗𮭗守空池舉未絶印豎拳曰正當恁麼時作麼生尚掀倒禪牀印遂喝尚曰賊過後張弓圜悟云斬貓話有道提起處便是有道在斬處且得都沒交涉他不提起亦匝匝地古人有定乾坤底劍且道畢竟是誰斬貓兒只如南泉提起云道得即不斬當時忽有人道得且道南泉斬不斬所以道正令當行十方坐斷不在斬不斬處若向情塵意見上討則孤負南泉但向當鋒劍刃上看是有也得無也得不有不無也得所以道窮則變變則通不解變通只管語上走南泉恁麼提起只教人自薦各各自用自知不恁麼會卒摸索不著又云子在救得貓真箇恁麼不恁麼趙州頂鞋出他參活句不參死句須是自己運出家珍方見古人全機大用南泉云喚作如如早是變也今須向異類中行歸宗云雖行畜生行不得畜生報師曰孟八郎漢又與麼去南泉問道吾名甚麼吾曰宗智泉曰智不到處作麼生宗吾曰切忌道著泉曰灼然道著即頭角生後問智不到處作麼生行履吾抽身入堂泉歸方丈雲巖問吾為何不對吾曰汝不妨靈俐巖却問泉智為甚不對泉曰他却是異類中行不見道智不到處切忌道著直須向異類中行巖亦不會巖後問藥山藥云子作麼生會無對藥大笑巖復問如何是異類中行藥曰今困倦且待別時巖曰某為此來藥云且去巖出吾聞巖不薦咬指血出問巖去問作麼生巖曰不與説吾便低頭趙州云異即不問如何是類泉以兩手拓地州近前踏倒向堂裏叫悔悔泉令僧問悔甚麼州曰悔不更與兩踏南泉語僧夜來好風問甚麼風泉曰吹折門前一株松問是甚麼松又語一僧夜來好風問甚麼風泉曰吹折門前一株松問是甚麼松泉云一得一失又趙州到一庵問有麼有麼主豎拳州曰水淺不是泊船處又到一庵問有麼有麼主豎起拳州曰能縱能奪能殺能活便作禮圜悟云有道舌頭在趙州口裏不知己性命已屬他人若能握向上綱宗與二庵主相見便可以定龍蛇別緇素正好著力還知趙州落處麼定山云生死中無佛即無生死夾山云生死中有佛即不畏生死定不肯後見大梅夾問那箇較親梅曰一親一疏夾復問梅曰且去別時來夾明日再問梅曰親者不問問者不親凌行婆問浮杯盡力道不得的句分付阿誰杯曰浮杯無剩語婆曰未到浮杯不妨疑著杯曰別有長處不妨拈出婆斂手哭云蒼天中更加怨苦杯無語婆曰語不知偏正理不識倒邪為人即禍生後僧舉似南泉泉曰苦哉浮杯被婆摧折一上婆聞笑云王老師猶少機關在澄一師問婆怎生是南泉少機關婆哭云可悲可痛一罔措婆云會麼一合掌立婆曰伎死禪和如麻似粟一舉似趙州州曰我若見問教口啞一曰未審怎生問州便打一曰為甚麼打某州曰似怎伎死漢不打更待幾時婆聞却云趙州合吃婆手中棒後僧舉似趙州州哭云可悲可痛婆聞合掌云趙州眼光爍破四天下州令僧問如何是趙州眼婆乃豎起拳僧舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答哭聲師已曉已曉復誰知當時摩竭令幾喪目前機丹霞取木佛燒向火院主呵霞撥灰曰吾燒取舍利主曰木佛何有舍利霞曰既無更取兩尊燒主自後鬚眉墮落保寧勇曰院主鬚眉落且置丹霞眉毛還在也無若見得與古佛同參若不見切忌撥無因果真淨云丹霞燒木佛院主鬚眉墮拈杖云不是木佛擲下云誰敢燒你擬即鬚眉墮不擬又如何高聲云行者拈取拄杖天童華曰人説院主起疑以致斯禍不知院主買鐵得金一場富貴僧問志院主鬚眉為甚墮志曰一人傳虗萬人傳實曰恁麼則不墮也志云兩重公案曰不曉再請益志曰筠袁虔吉頭上插筆僧問趙州如何是西來意師曰庭前柏樹子曰莫將境似人師曰不將境似問如何是西來意答庭前柏樹子法眼問光孝曰聞趙州有柏樹話是否曰無眼云皆謂有此語何道無答先師實無此語莫謗好徑山云道有蹉過覺鐵嘴道無又蹉過法眼若道兩邊都不涉又蹉過趙州直饒總不恁麼別有透脫一路入地獄如箭射畢竟如何舉拂子云會麼喝一喝客問雪竇覺言趙州無此語眼何以肯之顯曰宗門抑揚寧有軌則乎韓大伯匿笑去顯問韓曰笑知客眼未正頌曰一兔橫身當古路蒼鷹一見便生擒後來獵犬無靈性空向枯樁舊處尋顯結為友後顯於雪竇唱道舉有問雲門樹雕葉落時如何門曰體露金風雲門答這僧耶為解説耶有宗上座曰待老漢有悟處即説顯驚視曰非韓大伯乎曰老漢瞥地也顯因乞升座説法趙州問僧曾到此間麼曰曾到師云吃茶去又問僧曰不曾到師云吃茶去院主問為甚都叫吃茶去師召院主主諾師曰吃茶去睦州問僧趙州吃茶意作麼生僧云只是一期方便睦曰趙州被你一杓屎便打睦問沙彌你這生彌拜睦亦打僧問彌打你作麼答不是我師不打某雪竇云這僧將一杓屎撥他二員古佛若辨得非惟趙睦二州雪屈亦乃翠巖與天下老尊宿無過辨不得到處潑人未了在問狗子有佛性也無趙州曰無問有情皆有佛性狗為甚無趙云伊有業識在又僧問狗有佛性無趙曰有問既有為甚入這皮袋趙曰知而故犯僧問臺山路向甚處去婆曰驀直去僧去婆曰好箇師僧又恁麼去後有舉似趙州州曰待我去勘過遂問婆臺山路向甚麼去曰驀直去州便去婆曰好箇師僧又恁麼去州謂僧曰臺山婆為汝勘破也曾學士問雪竇曾與清老商量端的有勘破處麼竇曰清道甚麼曾曰又恁麼去也竇云清老且置還知天下衲僧出這婆圈繢不得麼曾曰這裏別有箇道處趙州若不勘破婆子一生受屈竇曰勘破子也玄覺云趙州去亦恁麼道何處是勘破又云非惟被趙州勘破亦被這僧勘破僧問萬法歸一一歸何處趙州曰我在青州作一領布衫重七斤雪竇頌編辟曾經老古錐七斤衫重幾人知而今拋向西湖裏下載清風付與誰僧問如何是法身夾山曰法道無相問如何是法眼答法眼無瑕道吾不覺失笑曰和尚未有師在乃至請往華亭船子處去船子才見便問住甚麼寺夾曰寺即不住住即不似船曰不似似箇甚麼夾曰不是目前法船曰那裏學得來夾曰非耳目之所到船曰一句合頭語萬劫繫驢橛船又問垂絲千尺意在深潭離鉤三寸子何不道夾擬開口被一橈打落水才上船又擬開口船又打山大悟點頭三下船曰竿頭絲線從君弄不犯清波意自殊夾問拋綸擲釣如何船曰絲懸緑水浮定有無之意夾曰語帶玄而無路舌頭談而不談船曰釣盡江波金鱗始遇夾乃掩耳船曰如是如是囑曰汝向去須藏身處沒蹤迹沒蹤迹處莫藏身吾在藥山只明斯事夾辭行頻顧船豎起橈曰汝將謂別有乃覆船入水逝後道吾復遣僧問如何是法身曰法身無相又問如何是法眼夾曰法眼無瑕僧舉似吾吾曰這漢此回方徹芙蓉楷曰忽問老僧如何是法身羊便乾處臥如何是法眼驢便濕處尿更問作麼是法身買帽相頭作麼是法眼坑坎堆阜夾山學處不明閨闔物捨不得老僧若不當陽顯示後學難以知歸勸汝不用求真惟須息見諸見若息智鑑洞明會麼珠中有火應須信莫向天邊問太陽靈雲見桃花悟道偈曰三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑溈山囑曰從緣悟達永無退失玄沙拈曰諦當甚諦當敢保老兄未徹在沙問地藏汝作麼生會藏云不是桂琛即走殺天下人妙喜云一家有事百家忙頌沙語云打破鬼門關日輪正當午一箭中紅心大地無寸土伊庵曾請益華藏老人答曰即釋迦老子也未徹在溈山問仰山甚處去來仰曰田中溈云多少人仰插鍬叉手溈曰今日南山大有人刈茅仰拔鍬便行玄沙云我若見即踏到鍬子僧問插鍬意如何鏡清云狗銜赦書諸侯避道問沙踏倒如何答不奈船何打破戽斗又問南山刈茅如何清云李靖三兄久經行陳雲居錫云且道鏡清此一判著不著僧問明招古人意在插鍬處叉手處招喚僧僧諾招云還曾夢見仰山麼香巖云論此事如人上樹口銜樹枝腳不踏枝手不攀枝忽有人問西來意不對違所問對他便喪身失命當恁麼時作麼生虎頭招云樹上即不問未上樹時請道巖呵呵大笑雪竇云樹上道即易樹下道即難老僧上樹也致一問來圜悟云項門具眼底不向對不對處作解未舉已知落處若擬議覿面錯過或不落二邊對不對都不是作麼生却得見古人落處僧到石霜舉洞山云兄弟東去西去直須向萬里無寸草處去良久云只如萬里無寸草處作麼生去霜曰何不道出門便是草洞聞云瀏陽乃有古佛耶太陽延曰直道不出門亦草漫漫地且道合作麼生行履良久云莫守寒巖異草青坐却白雲終不妙圓通善云且道腳跟下一句作麼生若道萬里無寸草許你見洞山若道出門便是草許你見石霜若道不出亦草漫漫地許你見太陽若總道不得許你參見延聖何故惟有好風來席上更無間語落人間大覺問興化云你道拄杖頭不曾撥著一箇會佛法底憑甚麼道理與麼道化便喝覺便打化又喝覺又打來日覺曰我直下疑你昨日這兩喝化又喝覺又打化再喝覺又打化曰我於三聖處學箇賓主句總被折倒願與箇安樂法門覺曰這漢來這裏納敗缺脫下衲衣痛打一頓化薦得臨濟吃棒底道理興化謂克賓曰汝不久為唱導師答不入這保社化曰會了不入不會不入答總不與麼化便打曰克賓維那法戰不勝罰錢五貫設飯一堂次日又曰克賓不得吃飯即出院雲居舜曰大冶精金應無變色興化令嚴不是克賓大難承當若泛泛之徒翻轉面皮多少時也徑山杲曰雲居拗曲作直然要作臨濟兒孫直須翻轉面皮始得廣道者問雲蓋智打維那案智下禪牀展兩手以舌示之廣打一坐具智云此是風力所轉又問石霜珠珠云你意作麼生廣亦打一坐具珠曰好一坐具只是你不知落處又問真淨淨云你意作麼生廣亦打一坐具淨云他打你亦打廣大悟淨因頌曰丈夫當斷不自斷興化為人徹底漢已後從他眼自開棒了罰錢趁出院洛浦參夾山叉手立夾曰雞棲鳳巢非其同類出去洛曰自遠趨風請師一接夾曰目前無闍黎此間無老僧洛便喝夾曰住住雲月是同溪山各異截斷天下人舌頭即不無爭教無舌人解語洛佇思夾即打因茲伏膺一日問朝陽已升夜月不現時如何夾曰龍銜海珠遊魚不顧洛大悟雪峰作飯頭飯遲德山托鉢下法堂峰曰鐘未鳴鼓未響托鉢向甚處去德便歸方丈峰舉似巖頭巖曰大小德山未會末後句德聞喚巖問不肯那巖密啓其意德乃休明日升堂與尋常不同巖至僧堂拍掌笑曰且喜老漢會末後句他後人不奈伊何雖然只得三年活德果三年示寂徑山杲頌一撾塗毒聞皆喪身在其中總不知八十翁翁入場屋真誠不是小兒嬉僧到雪峰以手托庵門引身出曰是甚麼僧亦云是甚麼雪低頭歸庵僧辭到巖頭舉前話巖曰他道甚麼答他無語巖曰當時悔不向伊道末後句若向道人不奈雪老何僧至夏末請益前話巖曰何不早問答未敢容易巖曰雪峰雖與我同條生不與我同條死要識末後句只這是雪竇頌末後句向君説明暗雙雙底時節同條生也共相知不同條死還殊絶還殊絶黃頭碧眼須甄別南北東西歸去來夜深同看千巖雪僧問徑山杲為甚低頭歸庵杲曰疑殺天下人又問巖頭末後句杲曰若不同牀睡焉知被底穿又問同條生不同條死杲曰殺人須是殺人刀活人須是活人劍保福問與麼與麼不與麼不與麼作麼生羅山召福福諾羅曰雙明亦雙暗福後問如何是雙明亦雙暗答同生亦同死別有僧問福同生亦同死時如何福曰彼此合取狗口僧曰和尚收取口吃飯其僧却問羅山同生亦同死時如何羅曰如牛無角問同生不同死時如何曰如虎帶角問洞山蛇吞蝦蟆救則是不救則是洞曰救則雙目不睹不救則形影不彰幻寄曰洪州廉使問馬祖吃酒肉是不吃是祖曰吃是中丞祿不吃是中丞福人問國一師郵舍刲羊一人救一人不救罪福異乎國曰救者慈悲不救者解脫此三尊宿一人雷轟電掃却墮見滲漏一人珠輝玉潤却墮情滲漏一人山高水深却墮語滲漏若能辨出有目如盲若辨不出有口若啞更或道一模脫出無有參差捶胸大哭有日在雲門問洞山初曰近離甚處答查渡問夏在甚處答湖南報慈問幾時離彼答六月二十五門曰放汝三頓棒初明日問過在甚麼處門曰飯袋子江西湖南便恁麼去初大悟曰他後向無人煙處不蓄一粒米接待往來盡與伊抽釘楔脫却布衫教伊作箇無事衲僧門曰你身如椰子大開得如許大口初禮拜圜悟曰只為雲門語好拈他情解便發得洞山悟處如臨濟被大愚拈他情見便會得徹後僧問如何是佛便道麻三斤看他那裏是安排得來祖師門下一覷便見雖然點破綱宗要且意在未屙時明眼漢沒窠臼所以巖頭道若論戰也箇箇立在轉處向未屙時一覷便見廓大一路相似靈俐漢疑著處一點便會五祖演曰如牛過窗櫺頭角四蹄俱過因甚尾巴過不去高峰妙頌曰等間放出這牛兒頭角分明舉似誰若同尾巴尖上會新羅子過多時雪巖舉梁武問初祖如何是聖諦第一義答廓然無聖武曰對朕者誰答不識帝不契祖至魏後武問志公志曰陛下識此人否曰不識志曰此是觀音大士傳佛心印帝曰當遣使去詔志曰莫道陛下合國人追他也不回初祖與武一挨一拶如兩鏡相照間不容髮無端被志公向明鏡上彩畫虗空翻成瑕翳武問第一義教有真俗二諦第一義即真諦答廓然無聖且道是為武帝説答他話畢竟廓然無聖理作麼生第一義義何所宗兄弟到這裏也須著些眼目揣摩始得往往盡道武被祖當面熱瞞殊不知武是作家君王到他面前一點也用不著隨口便問對朕者誰好兄弟遮一句大親切祖到這裏未免露出本來面目道箇不識武不契又是放開漫天鐵網了也後問志公也要此話大行志曰陛下識此人麼臂肘不向外曲曰不識達磨元來猶在志云此是觀音傳佛心宗和聲便好一時屏出武曰當遣使詔能縱能奪能殺能活志曰合國人去亦不回若回堪作甚麼此是祖師門下第一箇話頭頌者拈者古今不知多少未免盡道武蹉過祖誠謂刁刀相似一箭尋常落一鵬更加一箭已相饒直歸少室峰前坐梁主休云更去招是白雲端頌多謂落一雕頌廓然無聖加一箭是頌不識如是識情計較討什麼端和尚也末後二句只尋常俗語凡宗門語不説體便説用不説事便説理若向者兩句親見白雲方知一句全體一句全用理事雙全白雲與祖同帝在楊子江心握手却在鳳凰臺上相逢雪竇頌聖諦廓然何當辨的對朕者誰還云不識者四句一時頌了為他才寬又下箇注腳道因茲暗渡江豈免生荊棘兩句占了多少田地合國人追不再來千古萬古空相憶休相憶清風匝地有何極要緊是者一句透得千七百則許你穿却且道落在什處者裏有祖師麼喚來與老僧洗腳保寧勇頌煉得通紅打一鎚周遭無數火星飛十成好箇金剛鑽攤向門前賣與誰四句子却無你下口處無計較處且道落在達磨武帝志公何人分上須是參始得衲亦有頌西來十萬路迢迢智鑑當軒影莫逃四海浪平龍睡穩九天雲淨鶴飛高圜悟云武帝不識與達摩道底是同是別人多錯會達磨是答他禪武是相識之識且得沒交涉志公恁麼問何不一棒打殺免見茶糊雪巖舉馬祖坐禪死水不藏龍讓祖問圖什麼打草驚蛇馬云圖作佛妄想不少讓取甎去磨垂絲千尺馬曰作什麼上鉤了也讓曰磨作鏡意在深潭馬曰甎豈成鏡已是照天照地讓云磨甎不成鏡坐禪豈成佛露出本來面馬云如何即是把定咽喉也讓云牛駕車不行打車是打牛是喝云若於此喝下承當去莫問打牛打車和讓師手內甎百雜碎直得寒光炯炯洞徹山河讓又曰汝學坐禪禪非坐臥佛亦非定相於無住法不應取捨若學坐佛即是殺佛未達其理馬聞如飲醍醐古人根利一撥便轉今人何不也思量打牛打車畢竟意作麼生當知者便是金剛圈栗棘蓬試咬嚼看等間咬著方知磨甎真箇成鏡坐禪斷不成佛頌曰萬法俱忘百念灰等間驀鼻拽將回鏡光一照明如日直得木人心眼開雪巖舉百丈再參馬祖即日恭惟馬豎拂尊候萬福丈云即此用離此用強生分別馬挂拂舊處依舊孟春猶寒馬却問汝後將何為人不可更別有也丈亦豎拂好兒終不使爺錢馬云即此用離此用毫髮無差丈挂拂舊處總離者裏不得馬震威一喝醜舉止丈大悟直得三日耳聾真箇麼往往道喝下大悟不知阿魏無真黃金無假古今老和尚不辨青黃獨雪竇較些子道大冶精金應無變色汾陽頌偶因無事侍師前師指繩牀角上懸舉放却歸本位立分明一喝至今傳順朱填墨不是好手真淨頌客情步步隨人轉有大威光不能見突然一喝雙耳聾那吒眼開黃檗面大力量人語默裏轉却妙喜頌馬駒腳下喪家風四海從今信息通烈焰堆中撈得月巍巍獨坐大雄峰説道理則不無要見馬祖百丈遠在兄弟欲承當箇事如奔流疾𦦨眨眼劍去久矣丈才見豎拂便折作兩段尤較些子無端問即用離用鼻繩落他手也便被他拖拽至震威一喝却道大悟耳聾三日大屈哉還識羞麼山僧路見不平與一頌一喝當頭雷電奔人聞説亦暗消魂看來何止聾三日直到如今海嶽昏雪巖云山青水緑晝明夜暗皆正法眼藏光頭頭顯露萬劫不變壞臨濟却道向瞎驢邊滅莫是顛倒語麼可惜三聖不與他絶盡對道爭敢滅却扶起濟醉後添杯道忽人問作麼道聖也好一喝只是遲三刻致被濟太阿到持盡大地人至今亡鋒結舌山僧路見不平要為伊剗削濟將遷化入地獄有分在吾去世後不得滅正眼聖云怎敢滅已是掃土也濟道忽人問作麼道待問即答聖便喝忙作麼濟云誰知正法眼藏向瞎驢邊滅腦後見腮汝等向者裏還見臨濟也無若見正法眼向瞎驢邊滅若不見正法眼向瞎驢邊滅且道諸訛在甚處保寧勇頌出門把手再叮嚀往往事從叮囑生路遠夜長休把火大家吹滅暗中行今義學道路遠夜長句是頌向瞎驢滅莫謗保寧好佛鑑頌瞎驢滅却正法眼出得兒孫滿大唐須信茫茫遠煙浪灼然別有好商量且道商量箇甚麼我也有頌殺活縱橫得自由懸崖撒手覓冤讐瞎驢滅却正法眼射斗寒光夜不收雲巖舉南院道諸方只具啐同時眼不具啐同時用與麼話非但屈辱諸方抑亦鼓弄他家男女子啐毋正恁麼時喚同時用即是喚同時眼即是者僧不辨端由未免上他鉤線問如何是同時用被南院向咽喉一捻道作家不啐啐同時失者僧也會道此猶是學人問處南院翻一箇浪頭道你問處作麼生僧云失蝦跳不出斗院便打終是老婆心切僧不肯後雲門二僧舉一云當時南院棒折那冷地不甘僧聞有省八兩元來是半斤後往省覲千里迢迢任去來院已遷化相見已了乃訪風穴因行不妨掉臂穴問莫是問啐同時話底麼面目現在僧云是還識羞麼穴問當時作麼會僧云我當時如在鐙影裏相似不但當時穴曰汝會也冬爪印子仰山不然諸方只具啐同時用不具啐同時眼忽問同時眼聽頌同時啐不同時石火電光猶較遲鐙影裏行今已會蹉跎非是落便宜雪巖舉洞山有一物上拄天下拄地黑律漆是什麼物既是常在動用中為什動用中收不得問泰道過在什麼處泰道過在動用中被洞掇退果桌泰得果吃不得吃五祖別泰語道來朝更獻楚王看與過在動用中相去多少大溈云諸人還知洞落處麼且道落在什處溈道若不知往往作是非得失會自是大溈作者見解溈又道者果子非但泰不得吃盡大地人也不敢正眼覷看覷著則瞎雲蓋云洞山雖有打破虗空的鉗鎚且無補綴底針線杜撰不少蓋又云待伊説過在動用中但云請吃果子不勞拈出蓋又道泰首座若是箇衲僧吃了也須吐却特地一場愁五祖大溈雲蓋三人與麼説要見洞山大遠在山僧別行一路有一物拄天拄地黑律漆拈拄杖常在動用中收不得過在什處卓一下當時若下得者一卓縱盡大地是一枚果子也須粉碎聽頌樹頭金果鐵團圞千聖猶難著眼看莫道臨機曾掇退當陽托出已和盤雪巖舉風穴云若立一塵家國興盛野老顰蹙山河大地不礙眼光不立一塵家國喪亡野老安帖盡大地要覓纖塵不可得於此明得闍黎無分全是老僧三世佛祖齊立下風於此不明老僧即是闍黎盡大地人仰望不及老僧與闍黎亦能悟却天下人亦能迷却天下人人貧智短馬瘦毛長要識闍黎麼這裏是四五百條花柳巷二三千處管絃樓要識老僧麼這裏是有意氣時添意氣不風流處也風流只如雲門道者裏即易那裏則難又作麼生却須參始得山僧到此已是口裏膠生未免借古人鼻孔別資一路拈杖云即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分如不然更聽頌且看雙放更雙收有底歡聲無底愁一切聖賢如電拂大千沙界海中漚雪巖舉興化打中間案又打克賓案且道相去多少辨得便見興化八萬四千毫毛孔孔皆透不然聽注腳問四方八面來時如何是甚麼人化云打中間的棒折了也僧禮拜遍地是刀鎗化曰昨赴村齋值一陳卒風暴雨向古廟裏嚲得過七佛以前也未有這箇消息諸人聞舉有不甘者麼出來對衆證據如無聽頌阿師昨日赴村齋幾被他人一窖埋暴雨卒風回避得也成平地露尸骸高峰舉僧問不慕諸聖不重己靈如何香嚴云萬機休罷千聖不攜臘月扇子疏山作嘔曰是何言歟嚴云不肯那疏曰是胡來胡現嚴曰汝莫道得麼答道得平地干戈嚴云試道看疏云須還師資禮始得赤眼遇著火柴頭嚴乃禮拜問疏曰何不道肯諾不得全草賊大敗嚴云直饒恁麼道也須倒屙三十年設使住山無柴燒近水無水吃分明記取棒打石人頭嚗嚗論實事後住疏山果如前記二老互相屈辱山僧從頭解注還分優劣也無若謂不分因甚倒屙三十年若謂分漏逗在甚處緇素得出非惟截斷天下人舌頭釋迦彌勒與你作奴亦不為差不然更聽頌洞徹是非如夢幻轉身未免墮深坑須知別有通霄路不許時人造次行中峰舉溈山問香嚴父母未生前試道一句看賊無種相鼓籠嚴無對不欠一絲毫屢乞説破胡餅裏討甚汁我説底是我底不干汝事將謂將謂元來元來嚴乃焚棄文字結茅自處錯擊竹作聲有省邪法難扶遙禮溈山面皮厚多少若為我説破何有今日事如何是今日事一擊忘所知那裏學得來更不假修持遠在動容揚古路礙塞殺人不墮悄然機未敢相許處處無蹤迹要眼作麼聲色外威儀莫謗他好諸方達道者那箇是咸言上上機承虗接響所以道向自己胸中流出蓋天蓋地不是知音徒勞側耳寶葉源請益虗堂德山末後句若有德焉得不會若無巖又道德未會堂曰問首座詣間極雲值濯足亟進水舉叩雲掬水澆潑曰有甚末後句源不契見堂堂曰那那我向你道他會得源領旨朱心圓居士云有道源無端被雲老澆一杓惡水堂公更向虗空裏添箇楔不道不是但洗腳水有甚滋味湛然澄舉鼓山赴閩王請因緣曰雪峰道好隻箭射入九重城裏去早是拋鉤擲釣孚曰待勘過盲龜跛鱉納敗缺了也孚趁至中路歸舉似峰大似把髻投衙峰云他有語在須知不是好心孚云老凍膿猶有鄉情在祇知貪程不覺蹉路峰便休無齒大蟲傷人不知痛顯聖與麼判久參定知雪峰做處若初機切不得向三人分上著腳直須自己有箇活路始得心圓道者公案大慧捉得賊子雲門捉得賊魁各具一隻眼畢竟事主分上少檢點在鼓山若是箇咬人師子待云忽遇三軍圍繞時如何擘面便與一掌且教孚老頰上雕兩行金印將甚面孔見人心圓雖然截直提持還有代孚老原罪底一語在不得錯舉密雲悟舉高峰海底泥牛銜月走四句內有一句能縱奪能殺活簡校得出參學事畢高峰不妨奇特只是不經簡校古南門云簡校不妨簡校只是無甚奇特南澗門云高峰坐斷獅巖天下人沒奈伊何因甚到者裏却又忍俊不禁一場敗露山僧將老祖陳年骨董傾撥諸人面前還有向箇裏著得眼者麼靠杖云得行便行得坐便坐大小高峰一狀領過不退勇云狗銜鐙盞街前去老鼠偷鹽咳嗽歸露柱堂前驚破夢開門雪裏放烏龜內有一句有權實有照用能縱奪能殺活若簡得出許汝買草鞋行腳速道速道僧擬議勇直打出伊庵曰還識得這一句否且道高峰是那一句不退是那一句雲門澄問石雨方曰趙州道狗子無作麼生方曰和尚著棋某粗知心圓別云合取屎孔伊庵別曰問他作麼門問他道有又作麼生圓云但掩鼻而出伊曰太無厭生方矢口頌云家家有幅遮羞布圓曰何不遮却伊曰這是傳家之寶放下便能當雨露圓曰何不放下伊曰天晴不肯走直待雨霖頭獨怪當年老趙州圓曰兩重公案伊曰這賊擲却頭巾頂却袴圓曰更賣弄在伊曰頂過的草鞋拋在甚處門大喜付以斷拂一枝故號斷拂圓曰頭頂破袴手拏斷拂有甚體面伊曰不風流處儘風流磬山修上堂維那擬白椎玉林琇喝住曰待我問了白椎問昔日大唐無禪師今還有麼修拈杖作打勢曰看棒琇喝修亦喝琇復喝轉身云不是狂兒多意氣祇因曾透上頭關便出修喝一喝琇亦喝遙聞重白椎琇高聲云歎死氣修舉拂語琇云此拂收放自由特付與你琇竟出修乃懸拂牀角琇後有出山意作禮曰師龜毛拂前放之公所一任大衆觀瞻今思事無一向作偈收之修云偈聻琇拈拂便打修笑曰兒大欺爺琇云不勞讚和連打兩拂而退如上所録歷祖機用拈頌徵別箇箇示人活潑潑地如水上捺葫蘆捺著便轉指西話東欺胡謾漢千差萬別萬怪千奇諸來哲如能一一契證消歸自己本分便時時見天真之佛處處有出身之途殺活同時透脫自在不為古人誵訛堪作後人眼目斯非今日之禪狀元歟綱宗綱者提挈衆目之主腦宗者匯合萬流之朝歸故拈花微笑我佛之綱宗也拜立得髓初祖之綱宗也六代傳衣五家分𦦨孰不奉此綱宗為正脈盡未來際豈可越此拈花拜立之玄旨而別奉綱宗耶今溈仰雲門法眼三宗閴寂無傳姑置不論若臨濟家人法照用賓主四喝三玄要及洞家君臣王子內外紹明暗正偏等名祇是當機接衆有此施設爪牙而後人崇此以為臨濟曹洞宗旨末矣今就燈録所載略為集録以存大概俾來哲了然徹照融會貫通微特於自己消識功熏淘汰琢磨深有利益其於接勘後學暗合古人軌則復出自己機杼神出鬼沒妙用難思便是臨濟洞山兩尊宿復現世間不亦盡善也夫世尊覩明星悟道古德頌云因星悟道悟罷非星不逐於物不是無情世尊靈山拈花示衆迦葉獨破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉初祖命徒言所得道副曰不執文字不離文字而為道用祖曰得吾皮尼總持云我今所解如見阿閦佛國一見更不再見祖曰得吾肉道育曰四大本空五蘊非有我見處無一法可當情祖曰得吾骨慧可禮拜依位立祖曰得吾髓南嶽讓謁六祖祖曰何處來答嵩山祖曰什麼物什麼來經八載乃曰説似一物即不中祖曰還可修證否答修證即不無染汙即不得祖曰只此不汙染諸佛之所護念汝既如是吾亦如是汝足下出一馬駒踏殺天下人衡嶽道一師坐禪讓問圖甚麼一曰圖作佛讓取甎磨一曰磨甚麼讓曰磨作鏡一曰磨甎豈得成鏡讓曰坐禪豈得成佛一問如何即是讓曰如牛駕車不行打車是打牛是一無對問如何用心即合無相三昧讓曰汝學心法如下種我説法要如天澤汝緣合故當見其道問道非色相如何能見讓云心地法眼能見乎道無相三昧亦復然矣問有成壞否讓曰若以成壞見者非見道也偈曰心地含諸種遇澤悉皆萌三昧花無相何壞復何成野鴨過馬祖問是甚麼百丈云野鴨飛過去也馬扭丈鼻痛失聲馬曰又道飛過去也丈有省歸寮哭同事問馬云是伊會也汝自問他同事問丈乃大笑次日祖才升座丈出捲却席祖便下座至方丈問我未曾説話為甚捲席丈曰昨被扭鼻痛今又不痛也馬曰汝深明昨日事丈侍馬祖視牀角拂子丈曰即此用離此用馬問汝向後開兩片皮將何為人丈取拂豎起馬曰即此用離此用丈挂拂舊處馬振威一喝丈直得三日耳聾黃檗參丈問巍巍堂堂從何方來檗曰嶺南丈問為何事檗曰不為別事禮拜問從上宗乘如何指示丈良久檗曰不可教後人斷絶去也丈曰將謂汝是箇人一日舉再參話曰老僧被一喝直得三日耳聾檗不覺吐舌曰今因舉得見馬祖大機大用然且不識馬祖若嗣馬祖已後喪我兒孫丈曰見與師齊減師半德見過於師方堪傳授子甚有超師之見臨濟問佛法的的大意黃檗便打三度皆然告睦州今且辭去睦告檗曰後生甚奇特已後為一株大樹蔭天下人在濟辭檗曰參大愚必為汝説濟問愚三度被打不知有過無過愚曰檗與麼老婆心為汝得徹困更來這裏問有過無過濟大悟曰元來黃檗佛法無多子愚搊住曰這尿牀鬼子適來道有過無過今却道佛法無多見箇甚麼道理速道速道濟於愚肋下築三拳愚拓開曰汝師黃檗非干我事濟回檗云這漢來來去去有甚了期濟曰只為老婆心切舉前話檗曰大愚饒舌待來痛與一頓濟曰説甚待來隨後便掌檗曰這風顛漢來這裏捋虎鬚濟便喝檗喚侍者引顛漢參堂去濟後謂普化克符曰我欲於此建立黃檗宗旨且成就我二人珍重下去三日後普化問三日前説甚麼濟便打克符問打化作麼濟亦打此是臨濟一枝歷代相承之大綱宗也臨濟曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪克符問奪人不奪境濟曰煦日發生鋪地錦嬰兒垂髮白如絲問奪境不奪人濟曰王令已行天下遍將軍塞外絶煙塵問人境俱奪濟曰并汾絶信獨處一方問人境俱不奪濟曰王登寶殿野老謳歌諸方目為四料揀濟又云中下根來我奪境不除法中上根便境法俱奪上上根便境法人俱奪如出格見解人來便全體作用不歷根器到這裏學人著力處不通風石火電光即過擬心即差若眼定動即沒交涉有解者不離目前大慧杲云此事決不在言語上若在言語因甚達摩却道單傳心印不立文字語言直指人心見性成佛因何不説傳玄妙傳言語事不獲已説箇心性已狼藉也要拔生死根縱饒念得一藏教喚作運糞入却被障正知見不現只管理會心性禪道枉費精神古人一言半句設箇栗棘蓬教透若英靈者栗棘蓬是甚弄猢猻家具蓋你不能一念緣起無生一向在意識邊向宗師口討玄妙却被倒翻筋斗自家本命依舊不知落處當時克符問臨濟不知那裏得此間言語還會麼煦日句是境嬰兒句是人符頌曰奪人不奪境緣自帶誵訛有甚誵訛擬欲求玄旨思量反責麼誣人之罪驪珠光燦爛仙桂影婆娑何不早恁麼道覿面無差互還應滯網羅又被風吹別調中大概在驪珠兩句上是境思量者人蹉過覿面被語網羅乃存境而奪人王令句奪境將軍句存人符頌奪境不奪人尋言何處真也須間處作提防問禪禪是妄究理理非親好事不如無日照寒光淡山搖翠色新貧兒思舊債直饒玄會得也是眼中塵自起自倒日照二句是境直饒二句奪了也并汾二句人境兩奪符頌人境兩俱奪從來正令行已落第二不論佛與祖那説聖凡情買石得雲饒擬犯吹毛劍還如值木盲識法者懼進前求妙會特地斬精靈前箭猶輕後箭深正令既行不留佛祖如吹毛劍不可犯其鋒王登二句符頌人境俱不奪思量意不偏會麼是法住法位主賓言不異世間相常住問答理俱全添減一毫不得踏破澄潭月猶有這箇在穿開碧落天勞而無功不能明妙用動著即錯淪溺在無緣却依舊處若要分明得但向垂示處看有時奪人不奪境奪境不奪人有時人境兩俱奪人境俱不奪恁麼便是若理會便不是莫道諸人理會不得妙喜也會不得許你聞不許你會如上解注齊聞齊會了臨濟意果如是乎若只如是臨濟宗旨豈到如今若記著一箇元字腳是第一等惡口生死根本也真要參禪百不會虗却心來共你理會臨濟云我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在三山來云人指學者先用後照有法在三山云指師家法照用同時驅耕夫之牛奪飢人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉前撩起便行猶較些子汾陽云先照後用且共汝商量先用後照汝是箇人始得照用同時作麼生抵當照用不同時作麼生湊泊三山云僧來問甚處人或甚處來先照待伊定動或棒或喝是後用僧來便打便喝先用一法隨云還會麼汝道是甚麼意是先用後照僧來棒喝看他如何承當下語即用即照僧來云汝來也或打一棒看他如何支遣應答再作商量不拘一格是照用不同時徑山杲云有不受瞞的漢來道者裏甚麼所在説照説用説賓説主拽下椎一頓也怪不得臨濟云有時一喝如金剛王寶劍有時如踞地師子有時如探竿影草有時一喝不作一喝用作麼生會三山云劍言快利難當截斷學人情見獅謂不落窠臼一吼羣獸腦裂稍犯便遭爪牙吞噬探竿驗學人見地深淺邪正當面欺瞞不作喝用千變萬化最玄最妙向者裏轉得身方見臨濟用處臨濟云賓主相見學人拈一膠盆子主不辨境上作模樣被學人喝不肯放喚作賓看主師家隨學人問處即奪學人被奪不肯放是主看賓學人應一箇境知識辨得拋向坑裏是主看主學人披枷帶鎖知識更與添一重學人歡喜彼此不辨是賓看賓所舉辨魔知其邪正賓看主位中符云慣折驪龍頭上角學人有鼻孔主看賓位中符云驅耕奪食看臨時學人無鼻孔主看主位中云棋逢敵手兩家有鼻孔賓看賓位中云盲瞽相逢兩家無鼻孔此則與臨濟全同僧問賓中賓克符曰倚門傍戶猶如醉此亦學人無鼻孔問賓中主克符曰目瞽瞳神不出頭埋頭人不識指學人有鼻孔問主中賓克符曰高提祖印利物帶悲此賓字指利物邊非師家無鼻孔問主中主克符曰橫按鏌釾全正令此主字指師家機用莫測言僧問賓中賓雪竇云滿面埃塵此上賓字指用下賓指不能用問賓中主竇云玄沙猛虎主字指能用問主中賓竇曰月帶重輪又曰溫故知新此體用雙彰也問主中主竇曰大千揑聚此體用雙泯與洞家但能相續名主中主合此條賓主師家學家皆可説得天目晦有四賓主辨歸示辨中細心參看僧問真佛真法真道臨濟曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆空名無實山僧見處與佛祖不別若第一句薦得堪與祖佛為師第二句薦堪與人天為師若第三句薦自救不了問第一句濟曰三要印開朱點窄未容擬議主賓分問第二句濟曰妙解豈容無著問漚和爭負截流機問第三句濟曰但看棚頭弄傀儡抽牽全藉裏頭人乃曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會南院問第一句三要語風穴隨聲便喝問第二句妙解語穴曰未問已前錯問第三句棚頭語穴曰明破即不堪院許之神鼎諲曰若問我第一句蒼天蒼天第二句有什麼驢漢第三句近前來向你道才近前便打恁麼會也不負西來意佛法不是磨稜合縫底道理直是嫌佛不作嫌法不説方可珍重僧問首山第一句答大用不揚眉棒下須見血問慈悲何在答送出山門外問第二句答不打恁麼驢漢問如何接人答如斯爭奈何問第三句答解問無人答問對者是誰答莫使外人知問和尚第幾句薦得答月落三更穿市過僧問汾陽如何是學人著力處答嘉州打大象問學人轉身處答陝府灌鐵牛問學人親切處答西河弄師子乃曰若人會此三句已辦三玄更有三要語在切須薦取頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新又云汝還會三玄底時節麼直須會古人意然後自心明去更得通變自在受用無窮喚作自受用身佛不從他教便識得自家活計問什麼活計答兩隻水牯牛雙角無欄捲復曰若要於此明得去直須得三玄旨趣始得受用無礙頌曰第一玄法界廣無邊森羅及萬象總在鏡中圓第二玄釋尊問阿難多聞隨事答應器量方圓第三玄直出古皇前四句百非外閭氏問豐干者箇是三玄頌作麼生是三玄旨趣直教決擇分明莫妄道曾親近和尚與我説了誑嚇他人吃鐵棒有日在又曰一句中須具三玄三要賓主歷然所以道粉骨碎身未足酬一句了然超百億三山來載濟宗八棒一觸令支玄棒三山云如宗師置一令學人不知避觸犯當頭支離玄旨師便打是罰棒二接機從正棒宗師接人當打而打謂之從正三靠玄傷正棒學人務奇特靠玄妙反傷正理師打亦罰棒四印順宗旨棒師示宗旨學人相應師便打是印來機名賞棒五取驗虗實棒學人才到或進語便打是驗虗實不在賞罰類六盲枷瞎棒不辦來機一味亂打此師家過七苦責愚癡棒學人不分曉十分愚癡師疊打他八掃除凡聖棒凡情聖解一並掃除道得道不得皆打斷學人命根乃上上提持用棒最妙者名為正棒玉林琇云第一須發心諦當必專為生死始得第二須工夫諦當參一話頭一生不透一生參今生不透來生參第三須悟處諦當不認識神不陷空豁不疑生死不疑古今不強作主宰不以鹵莽承當為有力量不以硬差排為不疑不以粗放狂亂為大機大用不以顢頇為透脫無餘若竿頭宜進而不進言句應參而不參不煩穿鑿而穿鑿不可抹殺而抹殺入門一蹉深可痛哭第四須師承諦當不蹉過師家相為處否不孤負師腦後深錐否洞明從上綱宗否不施為偏重瞎人眼目否若無真正宗師為之打瞎頂門眼雖有實悟為人則禍生倘己見既偏投師又謬邪毒入心如油入更或不知認錯漫云自肯不受人究竟謂之不被他轉此等何足挂齒第五須末後諦當不透末後關而言得大機大用具本分草料鮮不為粗惡狂徒不知有此關於古人參悟與悟後重疑不移前作後指悟為迷者鮮矣謗先聖誤後人皆由不知向上一關可不懼乎第六須修道諦當自己覺察是頓悟頓修根器否是果地善知識否打成一片速於香林否不走作過涌泉否現業流識淨盡否事事無礙否行解相應名祖試看是何標格第七須為人諦當決要人真參實悟悟後達向上關捩決以見性謂之悟不可於人認識之謬云有省於人向念未生時認妄為真印云有省寧絶嗣勿亂傳前六自錯後一錯人山僧與麼訓亦是憐兒不覺醜曹洞宗青原思問六祖當何所務即不落階級祖問曾作恁麼來答聖諦亦不為問落何階級答聖諦尚不為何階級之有祖深器之思令石頭遷持書讓和尚曰速回有箇鈯斧子與汝住山遷至未呈書便問不慕諸聖不重己靈時如何讓曰子問太高生何不向下問遷曰寧可永劫受沈淪不從諸聖求解脫讓便休遷便回思問書達否遷曰書亦不通信亦不達去日蒙許鈯斧子便請思垂一足遷禮拜雲巖晟造藥山藥問百丈有何言句晟曰有時衆立以杖趕散復召衆衆回首丈曰是甚麼藥曰今日因子得見海兄晟頓省禮拜洞山價問雲巖無情説法甚人得聞巖曰無情得聞問和尚還聞否巖曰我若聞汝即不聞吾説法洞曰某為甚不聞巖豎拂曰還聞否洞曰不聞巖曰我説法汝尚不聞豈況無情説法乎洞曰無情説法該何教典巖曰彌陀經水鳥樹林皆念佛念僧洞有省又問百年後有人問還邈得師真否如何祇對巖良久云祇這是洞沈吟巖曰承當箇事大須審細洞猶涉疑後過水覩影大悟偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須與麼會方得契如如洞問曹山名甚麼曹曰本寂問那箇聻答不名本寂洞深契之授洞上宗旨復問子向甚處去曹曰不變異處去問不變異處豈有去耶答去亦不變異此即洞曹一宗歷祖相承大綱宗也洞作正偏五位頌云正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌古轍云正中偏就初悟此理時立理是正悟是偏三更初夜黑表理然以月明前顯黑是黑顯時便有明猶理必由悟顯理顯時却好是悟也天童覺於相逢不相識句著語云雖然同共住到底不知名私謂相逢而仍不相識却好是初悟景象一相識即漏入陰界矣然人往往錯過都由於隱隱地總倚舊日明了識為依靠此則雖相逢而全不明了故云猶懷舊日嫌無聞聰問笑巖曰子之父母何在答有則有只是佛眼覷不著某目亦不見若見即非真父母偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師是此句注也如以不識作不知解亦可但淺薄矣偏中正失曉老婆逢古鏡分明覿面別無真休更迷頭猶認影古轍云就見道後用功時立功熏偏理是正失曉老婆表偏古鏡表正由奉重力見更親前但未能造理尚在影象故戒迷頭認影正中來無中有路隔塵埃但能不觸當今諱也勝前朝斷舌才古轍云此位是得法身亦即正位前半分是轉功就位後半分是轉位就功中間即尊貴位無中正也路偏也隔塵埃以方轉身尚未入俗隔也尊不可犯犯即汙染須善回互從旁顯有語中無語無語中有語故勝斷舌才兼中至兩刃交鋒不須避好手猶如火裏蓮宛然自有沖天志古轍云就功位齊彰時立正既來偏偏必兼正作家相見縱奪互用自不傷鋒犯手如火蓮無損乃他受用三昧是透法身大機大用洞山離三滲漏臨濟具三玄要俱不出此兼中到不落有無誰敢和人人盡欲分常流折合歸來炭裏坐古轍云就功位俱隱時立無正偏迹故不落有無及盡今時還源合本故歸炭裏坐如佛説究竟涅盤義乃自受用三昧雖大用繁興了無朕迹有謂正中偏作體中發用釋偏中正作從用歸體釋者非是雲巖寶鏡中如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故古轍引涅槃經云不能起住去來語言名嬰兒行如來亦爾如來不著諸法不能來者如來身行無動搖不能去者如來已到大涅槃不能語者如來為諸衆生演説諸法實無所説今以例法中具五位也重離六爻偏正回互疊而為三變盡成五原宗辨謬云以初二為初疊以三四為二疊以五六為三疊以初二爻為初變以二三爻為二變以三四爻為三變以四五爻為四變以五六爻為五變錯然則吉不可犯忤古轍云離初九辭錯然敬之無咎言正中尊貴位當錯然敬之不可觸犯所謂不觸當今諱也外寂中搖繫駒伏鼠古轍云外觀似寂中實搖搖如繫駒不忘馳伏鼠偷心在也如虎之缺如馬之馵古轍云虎食畜不至耳馬立時四足中必一足馵不著地此以例語忌十成也五位功勳僧問向答吃飯時作麼生又曰得力須忘飽休糧更不飢即君視臣也吃飯句謂日用間不可須臾忘却得力二句即聖化無為義洞山頌云聖主由來法帝堯御人以禮曲龍腰有時閙市頭邊過到處文明賀聖朝問如何奉答背時作麼生又曰只知朱紫貴辜負本來人即臣奉君識得背是合塵便知奉是合覺朱紫二句謂當全歸白淨識勿倚任六識功熏為極則也洞頌淨洗濃粧為阿誰子規聲裏勸人歸百花落盡啼無盡更向亂峰深處啼問如何功答放下鋤頭時作麼生又曰撒手端然坐白雲深處間翻轉本體作功夫故云功由前把鋤奉重今即放鋤禾苗任運滋茂端然二句契入正位有無為而治景象洞頌枯木花開劫外春倒騎玉象趁麒麟而今高隱千峰外月皎風清好日辰枯木開花是此位功義月皎風清所謂深處間也問共功答不得色又曰素粉難沈迹長安不久居古轍云前功是一色諸法俱隱今一色消諸法俱現不復得一色也素粉二句亦指前一色不可久居也洞頌衆生諸佛不相侵山自高兮水自深萬別千差明底事鷓鴣啼處百花新問功功答不共又曰混然無諱處此外復何求古轍云由前共今則不共聖法亦不可得理事混然無迹造道極致更何求哉此幾於不動地無功可言然視妙覺位尚有無功之功在故云洞頌頭角才生已不堪擬心求佛好羞慚迢迢空劫無人識肯向南詢五十三迢迢空劫是甚麼境界還知否涌泉欣曰我四十九年尚有時走作若識不盡輪回不出但盡却今時始得成立喚立中功轉功就他去亦喚就中功相續大難若不知有啼哭有日在洞曰辨驗三種滲漏一見滲漏機不離位墮在毒海明安云謂見滯所知若不轉位即在一色二情滲漏滯在向背見處偏枯明安云謂情境不圓滯在向背取捨是識浪流轉直須離二邊不滯情境三語滲漏究妙失宗機昧終始濁智流轉明安曰滯在語句失宗當機暗昧須有語中無語無語中有語始得妙音密圓也問如何行鳥道洞答不逢一人直須足下無私去問莫便是本來面目否答因甚顛倒認奴作郎問本來面目答不行鳥道洞山賓主句洞問龍山如何是主中賓答青山覆白雲又問主中主答長年不出戶問賓主相去幾何答長江水上波問賓主相見有何言説答清風拂白月後洞問僧主人公答現祇對次洞曰認驢前底為自己賓中主尚未明況主中主僧問主中主答自道取問某道祇賓中主如何是主中主答恁麼道即易相續也大難古轍載僧問廣德義賓中賓答蕩子無家計飄零不自知問賓中主答茅戶挂珠簾問主中賓答龍樓鋪草座問主中主答東宮雖至嫡不面聖堯顏洞山綱要偈一敲唱俱行亦名金針雙鎖曰金針雙鎖備叶古轍作挾路隱全該寶印當風妙重重錦縫開古轍云初句言偏正並用次句言正偏互挾雖隱而弗顯正偏無不全該三句言正中妙挾之印當衆生機感四句因機感而五位皆顯二金鎖玄路偈曰交互明中暗功齊轉覺難力窮忘進退金鎖網鞔鞔古轍云明喻功暗喻正初借功趨位明中暗次借位明功暗中明至於功位齊彰猶貴功位並轉若窮而不轉則事理迹未消聖凡情未盡是謂玄路之鎖三不墮凡聖偈曰事理俱不涉回照絶幽微背風無巧妙電火爍難追古轍云此明正偏雙泯回照非特無迹即幽微亦絶三句謂有當機則巧拙斯形此機感不到之地有何巧拙聖凡哉即兼中到位曹山云正空界本來無物偏色界有萬象形正中偏理就事偏中正事入理兼帶者冥應衆緣不墮諸有非染非淨非正非偏故云虗玄大道無著真宗推此位最玄妙僧問君答妙德尊寰宇高明朗太虗問臣答靈樞宏聖道真智利羣生問臣向君答不墮諸異趣凝情望聖容問君視臣答妙容雖不動光燭本無偏問君臣道合答混然無內外和融上下平又曰不欲犯中此吾宗法要偈曰學道先須識自宗莫將真際雜頑空妙明體盡知傷觴力在逢緣不借中出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終按無身有事即知有功也無事無身即雙泯也俍師云此提出寶鏡中君臣二字下箇注腳不與洞山五位全合曹山五位圖頌此曹所立今依曹列序次黑白圈亦酌立所附之頌諸本不同今依一本繫於圈下期於孚穩而已君頌渾然藏理事朕兆卒難明威音王未曉彌勒豈惺惺按此若與洞山合應配兼中到位臣頌白衣雖拜相此事不為奇積代簪纓者休言落魄時按與洞合或配兼中至位拜相亦臣非尊貴位即落魄時貧子衣珠儼在故配臣君視臣頌子時當正位明正有作暗在君臣未離兜率界烏雞雪上行臣向君頌皇宮初降日玉兔豈能離未得無功旨人天何太遲皇宮君所居然既降矣即本覺轉為始覺不離於明雖奉重終屬功而淹留於人天故配臣向君若與洞合上即正中偏此即偏中正圈則當以上黑多下白少為君視臣以上黑少下白多為臣向君似不當以白上黑下倒圖為孚君臣道合頌𦦨裏寒冰結楊花九月飛泥牛吼水面木馬逐風嘶如與洞合配正中來位惟次序不同耳曹山四禁莫行心處路不挂本來衣何須正恁麼切忌未生時古轍云心有所趨雖極玄亦偏蔽必須心心無處所方是衲僧行履本來衣指法身法執不忘墮法身邊正恁麼早不恁麼擬之即失認著父母未生前空寂境界乃墮空外道曹山曰夫取正命食者須具三種墮一披毛戴角是類墮二不斷聲色是隨墮三不受食是尊貴墮三山來云披毛帶角乃異類中行若有滯落異類中須異類中有出身故類亦須墮拈云雖行畜生行不得畜生報不斷聲色隨聲逐色也若不明了落聲色中要知聲不自聲色不自色聲色本無因心假立須聲色中有出身路故隨亦須墮拈云見色非干色聞聲不是聲受食是今時事不受食是那邊事若執那邊落尊貴中須知那邊了却來這裏行履虗却尊貴位故亦須墮拈云不裝珍御服來著破𧟋衫又云滯三者中是墮落義向三中有出身是墮除義若論披毛戴角是類墮三句字面墮落義為是若論曹山須具三種墮之言則墮除義為是如上所注二義兼該大約須明轉位始得應時而食不受食害名正命食古轍云大修行人本無所住然亦隨處自在如鏡含萬象豈有滯礙故此墮字乃借義非實義也石霜五位王子誕生云貴裔非常種天生位至尊古頌天然貴胤本非功德合乾坤育勢隆始末一期無雜種分宮六宅不他宗上和下睦陰陽順共氣連枝器量同欲識誕生王子父鶴騰霄漢出銀籠古轍云最初知有如王嫡子初生即得灌頂是誕生位頌中始末句言不雜外紹之功上和句言順於父銀籠是一色超出一色始見尊貴喻之為父也朝生曰白衣為宰輔直指禁庭中頌曰苦學論情世莫羣出來凡事已超倫詩成五字三冬雪筆落分毫四海雲萬卷積功彰聖代一心忠孝輔明君鹽梅不是生知得金榜何勞顯至勳古轍曰祇在外朝居臣位非宮中生也此子全事外紹之功是臣種名王子者所謂外紹王種姓也頌末二句言由學而至終在臣職不登王位何勞有此哉末生曰尋途方覺貴漸進不知尊頌曰久棲巖穴用功夫草榻柴扉守志孤十載見聞心自委一身冬夏衣縑無澄凝含笑三秋思清苦高名上哲圖業就巍科酬極志比來臣相不當途古轍云末生言用功久而成頌首二句專顧本來人也十載句不重見聞一身句不著塵緣澄凝二句言恰神清虗恬淡皆合本意末二句轉功就位不立臣位私謂朝生則心心奉重末生則十八界枝末均以久熟而泯然一色化生專指利他邊化生曰政威無比況神用莫能儔頌曰傍分帝命為傳持萬里山河布政威紅影日輪凝下界碧油風冷暑炎時高低豈廢尊卑奉五袴蘇途遠近知妙印手持煙塞靜當陽那肯露纖機古轍曰傍分帝化轉位就功之子頌三句無私照四句清熱惱碧油漢太守幢名五袴漢民歌曰廉叔度來何暮昔無繻今五袴言蘇民於塗炭也內生曰重幃休勝負金殿臥清風頌曰九重深密復何宣挂敝由來顯妙傳祇奉一人天地貴從他諸道自分權紫羅帳合君臣隔黃閣簾垂禁制全為汝方隅官屬戀遂將黃葉止啼錢古轍曰長在深宮之內功功之極與父無異即理智一如冥合不分之義頌首句言與父合體寂爾無言末二句雖是無為有時應機説法也天童立三一色大功一色者由功力成就猶存功力也正位一色者理境之空寂也今時一色者事境之潔白也天童覺四借一借功明位頌蘋末風休夜未央水天虗碧共秋光月船不犯東西岸須信篙人用意良二借位明功頌六戶虗通路不迷太陽影裏不當機縱橫妙展無私化恰恰行從鳥道歸三借借不借借頌識盡甘辛百草頭鼻無繩索得優遊不知有去成知有始信南泉喚作牛四全超不借借頌霜重風嚴景寂寥玉關金鎖手慵敲寒松盡夜無虗籟老鶴移棲空月巢三山來云借借不借借正中來位雖借借而實無借借體用一如也全超者不住理事玄妙有無體用雙忘兼中到也溈仰宗百丈問溈山撥爐有火否溈撥曰無丈撥少火曰汝道無這箇聻溈發悟丈曰善自護持次日作務丈曰將得火來麼溈曰將得來拈一柴吹兩吹遞與丈丈曰如蟲禦木司馬頭陀談溈山之勝丈曰能下語出格當與住持指瓶曰不得喚淨瓶喚作甚麼華林曰不可喚作木棎溈踢倒瓶出丈笑曰第一座輸却山子也溈遂往焉溈問仰山是有主沙彌無主沙彌答有主問主在甚處仰從西過東立溈異之仰問如何是真佛住處溈曰以思無思之妙反思靈𦦨之無窮思盡還源性相常住事理不二真佛如如仰頓悟此即溈仰宗相承之大綱宗也摘茶溈謂仰曰祇聞子聲不見子形仰撼樹溈曰祇得其用仰問如何溈良久仰曰和尚祇得其體溈曰放子三十棒仰曰某棒教誰吃溈曰放子三十棒溈問涅槃經多少是佛説多少是魔説仰曰總魔説溈曰已後無人奈子何仰曰慧寂即一期之事行履在甚麼處溈曰祇貴子眼正不説子行履溈睡起曰適來得夢為我原看仰取水與師洗面香嚴來溈曰我一夢寂子原了汝更原看嚴點茶來溈曰二子見解過於鶖子一僧問訊仰山向東叉手立以目視師仰垂左足僧過西邊叉手立仰垂右足僧向中間叉手立仰收雙足僧禮拜仰便打僧騰空去僧問仰識字否答隨分僧右旋一匝曰是甚字仰地上書十字僧又左旋一匝曰是甚字仰改十作卍僧畫相以兩字拓如修羅掌日月勢曰是甚字仰畫相僧作婁至德勢仰曰如是如是此諸佛所護念善護持僧禮謝騰空去仰謂道者曰此西天羅漢來探吾道吾以義為汝釋此是八種三昧是覺海變為義海體則同然此義合有因有果即時異時總別不離隱身三昧也幻寄曰圓相即拈花吹毛一揆直示全提人天眼目載圓相總六名曰圓相暗機義海字海意語默論有曰縱義奪義相肯許相見此為舉函索蓋答以則函蓋相稱此抱玉求鑒書某字答此鉤入索續於某字側加人答成寶器相已成寶器相書土字答此玄印玄旨相衆相不著也是猶市賈私為志驗謂入聖位者所建法幢乃如是乎又以三種生為大圓宗旨想生相生流注生此出楞伽經在示辨中解香嚴本來照頌曰擬心開口隔山河寂寞無言也被訶舒展無窮又無盡卷來絶迹已成多寂照頌不動如山萬事休澄潭徹底未曾流箇中正念常相續月皎天心雲霧收常照頌四威儀內不曾虧今古初無間斷時地獄天堂無變異春回楊柳緑如絲仰山臨終偈曰一二二三子平目復仰視兩口一無舌此是吾宗旨龍潭智頌一二二三子字清風起來勘不就乃爭綱紀平目復仰視兒孫還有異未辨箇端倪出門俱失利兩口一無舌止止不須説西天僧到來烏龜喚作鱉此是吾宗旨揚聲囉囉哩鏡智出三生吹到大風止雲門宗龍潭信請示心要天皇曰汝擎茶吾接汝行食吾食汝和南吾低頭何處不示心要信低頭良久皇曰見則便見擬思即差信開解問如何保任答任性逍遙隨緣放曠但盡凡心別無聖解德山到龍潭曰久嚮龍潭及到來潭不見龍又不現潭引身云子親到龍潭德無語一夕潭曰更深何不下去德出復入云外面黑潭度紙燃與德德擬接潭吹滅德大悟禮拜曰從今更不疑天下老和尚舌頭也雪峰問德山從上宗乘學人還有分也無德打一棒曰道甚麼峰不會請益德曰我宗無語句實無一法與人峰有省後鰲山阻雪坐禪巖頭曰每日牀上坐似七村土地他時魔昧人家男女在峰點胸曰這裏未穩去頭曰若實如此據你見處通來是與汝證明不是剷却峰曰聞鹽官舉色空義得箇入處頭曰此去三十年切忌舉著峰又云閲洞山過水偈前四句有得頭曰若與麼自救也未得在峰又舉德山打一棒道甚麼處當時如桶底脫相似頭喝云從門入者不是家珍峰曰如何即是頭曰他後如欲播揚大教一一從自己𮌎中流出與我蓋天蓋地去峰大悟曰今日始是鼇山成道僧問如何是觸目不會道運足焉知路雪峰曰蒼天蒼天僧不會問雲門門曰三斤麻一匹布僧曰不會門曰更有三尺竹峰聞喜曰我常疑這箇布衲雪峰曰南山有一條鱉鼻蛇汝等切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢真淨曰雲門拽拄杖攛作怕勞為蛇添足此是雲門宗相承大綱宗也雲門曰光不透脫有兩般病一切處不明面前有物是一三山來云聞聲見色隨疑轉驢糞從他換眼睛此是物上雖不分青黃長短而即認此光為自己之病又透得一切法空隱隱地似有箇物相似亦是光不透脫前是著所邊此則著能邊之病又云法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可仔細檢點將來有甚麼氣息亦是病妙喜曰此是雲門據實而論透過法身今人為極致雲門反以為病不知透過法身了合作麼生到這裏如人飲水冷暖自知不著問別人問則禍事也雲門一字關問殺父母佛前懺悔殺佛祖甚處懺悔答露問了即業障空二祖是了不了答確不備録雲門每見僧則顧即曰鑒僧欲酬則曰咦以為常故曰顧鑒咦密師抽去顧但頌鑒咦謂之抽顧頌頌曰相見不揚眉君東我亦西紅霞穿碧落白日繞須彌覺範曰今兒孫失其旨以怒目直視為不認聲色名舉處便薦可悲可痛雲門曰函蓋乾坤目機銖兩不涉世緣作麼生承當自代曰一鏃破三關密師離為三句一函蓋乾坤句二截斷衆流句三隨波逐浪句圜悟曰本真本空一色一味非無妙體洞然明白函蓋句也本非解會排疊將來不消一字萬機頓息截流句也若許他相見從苗辨地隨波句也首山拈函蓋句曰普天匝地截流句曰不通凡聖隨波句曰有問有答僧問如何是道巴陵鑒曰明眼人落井問吹毛劍答瑚枝枝撑著月問提婆宗答銀碗裏盛雪鑒不作嗣書將三轉語上雲門門曰他日老僧忌辰只消舉此三轉語作供足矣雲門綱宗頌曰康氏圓形滯不明魔深虗喪擊寒冰鳳羽展時超碧漢晉鋒八博擬何憑一是機是對對機迷闢機塵遠遠塵棲夕日日中誰有挂因底底事隔塵迷二喪時光藤林荒圖人意滯肌尫三咄咄咄力囗希禪子呀中眉垂四上不見天下不見地塞却咽喉何處出氣笑我者多哂我者少五按此頌是大悲圓滿陀羅尼紫琈集人天眼目中略為解釋似覺出自創論法眼宗雪峰將三箇木毬一時拋出玄沙作斫牌勢峰曰汝親在靈山方得如是沙曰也是自家事一日峰輥出木毬沙捉來安舊處玄沙問夾籬處有佛法也無峰撼籬一下沙曰某不與麼峰曰作麼生沙曰穿過篾頭來玄沙以上根罕遇作綱宗三句曰第一句且自承當現成具足都汝心王所為全成不動智於宗旨猶是明前不明後一味平實分證法身之量若知出格到手便轉不墮平懷之見是謂第一句綱宗也不著平常縱奪隨宜二理雙明不被二邊所動妙用現前是謂第二句綱宗也知有大智性相之本通其過量之見應用無方全用全不用方便喚作慈定之門是謂第三句綱宗也羅漢琛侍沙令侍者閉却門問汝作麼生出去琛曰喚甚麼作門地藏問法眼山河大地與自己是同是別眼曰別藏豎兩指眼曰同亦豎兩指便起去雪霽辭藏去藏曰尋常説三界惟心指片石曰在心內心外眼曰心內藏曰行腳人著甚麼來由安片石在心頭眼窘放包求決日呈解藏曰佛法不恁麼眼曰某辭窮理絶也藏曰若論佛法一切現成眼大悟此法眼宗相承大綱宗也法眼三界惟心頌曰三界惟心萬法惟識惟識惟心眼聲耳色色不到耳聲何觸眼眼色耳聲萬法成辦萬法匪緣豈觀如幻大地山河誰堅誰變華嚴六相義頌曰華嚴六相義同中還有異異若異於同全非諸佛意諸佛意總別何曾有同異男子身中入定時女子身中不留意不留意絶名字萬象明明無理事人天眼目云一心約攝諸法得總名能生諸緣成別號法法皆齊為同相隨相不等稱異門建立境界故稱成不動自位而為壞僧問如何是曹源一滴水眼曰是曹源一滴水韶師聞大了悟白眼眼曰汝向後為國王師韶國師四料揀聞聞放三山頌萬籟傳聲無彼無此放開耳門都在裏許聞不聞收三山頌猿嘯鳥吟落花流水是聲非聲歸真亦爾不聞聞明三山頌剛到長松下又從幽澗過蹉跎泉石裏逐處演摩訶不聞不聞瞎三山頌四方咸問道覿面不通風小鼾音幹天地老一枕夢周公韶國師宗風頌通玄峰頂不是人間心外無法滿目青山上録五家綱宗言句略示門風切勿泥滯師子兒把得便用踏毗盧頂上行一橛頭豈為儱侗雜貨鋪誰道支離者裏一也無何有於五家盡從此中出亦奚止於五家也用則與海龍王鬬富不用不值半文錢臨機設化應用無方盡未來際請事斯語示辨我佛為一代法王過去諸佛聖賢或為當機或為影響現權現實現正現邪示圓示偏示順示逆權如觀音文殊逆如善星調達邪如長爪殃崛偏如緣覺聲聞甚至顯為九十五種外道逞其邪智以與佛角俾我佛圓頓正教得以五時顯密闡揚流通其人皆不得作實法會宗門諸祖亦然故有時云即心即佛有時云非心非佛有時翠竹盡是真如有時黃花決非般若莫非解粘去縛點歸正轍前則有初祖所化六宗繼則有歷代不同諸判如三玄要則有古塔輩之偏詞三峰輩之拈語而洞下五位前後諸祖評唱不同無夢主公濟洞兩家拈提各異雖有優劣不齊要皆乘願示現不有偏者何以顯圓不有異者何以顯勝來哲須感示現之深心不可萌攻擊之快説學無常師主善為師庶幾祖印高提妙心徹透云爾漢月藏云粵自威音無象一為千萬佛之祖故七佛以雙頭獨結四法交加勒成無文密印飲光二十八代無非以法印心此法之不可滅沒也重矣達磨六傳後旁出之徒於法偈中鑽出理路密處成滲漏馬大師拈出一機一境絶盡旁門單提向上故正出為重遂有野狐三撼其門百丈末後一喝從前心法印定於此矣黃檗有三頓痛棒未聞有兩頓四頓之旨此臨濟三玄要所以發明佛祖之祕以簡一橛頭相似野狐涎為萬世法也天童斥曰此漢月以三撼三頓為臨濟三玄要之據試問若有威音即不可謂無象若無此從甚麼人畫出又七佛但有偈未見有雙頭獨結又未聞釋迦有四法交加既四法交加豈可謂無文密印哉漢月靈芝庵拈花云此法之本本無法也無法豈無本有法也無法而付即有法也法法何法即無法也此有而無無而有不可有無有無不可者也此豈不是漢月於法偈鑽出理路配成四法何曾夢見馬師一機一境百丈一喝耳聾哉雪竇頌雲門對一説末云別別韶陽老人得一橛夫一橛頭豈容別有硬與不硬相似與不相似耶漢月加謗老僧何曾夢見老僧一棒直指一切人本分正單提向上事也藏公五宗原云見繪家圖七佛始始於威音王惟大作一相後則七佛各有言詮而偈旨不出圓相也夫威者形之外音者聲之外威音王未有出載無考據文字已前最上事若龍樹所現而仰山謂無相三昧然燈已前是也圓相出西天諸祖七佛偈達摩傳來蓋有所本嘗試原之圓相早具五家宗旨矣天童斥云五宗原豈可以繪家圖為原本此漢月揑造抹殺法華經載威音王佛出世事妄説無有唯作一相且仰初無無相三昧之説但云不離隱身三昧後王常侍寄書作一相溈云千里有箇知音仰云也是俗漢於地上畫一中書日字以腳抹之溈大笑可見種種圓相不出隱身三昧腳抹豈非翻前隱身案耶漢月如是妄説妄作一相謂然燈前既然燈前豈可謂圓相出西天諸祖既出西祖皆釋迦後以何為然燈前耶又謂圓相早具五家宗旨五家各出一面有正宗先出臨濟一宗此相拋出直下斷人命根者既曰五宗各出一面當以一相開為五面且五面既從一圓相開則當正則俱正偏則俱偏何獨臨濟先出為正宗耶又豈可謂此相全於臨濟拋出直下斷人命根耶此見漢月立一相為五宗原不可據況能原五宗之旨耶漢月云於一中賓主輥輥直入首羅眼中所謂沿流不止一偈者益可笑臨濟道誰知吾正法眼藏向者瞎驢邊滅却正法眼尚滅況有一相賓主首羅眼等名相遺害後世耶又惟恐執名相為事故以吹毛劍斷他名相猶恐執吹毛為事故曰急須磨也然則漢月於本分未徹故不見威音王佛威音者即諸佛一切含靈共稟舉目了然不假思議言詮所謂情與無情説法無盡者也若不據五宗悟由為宗旨別立異端為五家宗者則致後世妄造怪異穿鑿無根妄誕從漢月始潭吉復作五宗救天童闢妄救曰潭吉謂臨濟於三段二打後以四料揀明之二打謂打克符普化於是玄要賓主照用等宗旨立焉可見自迷頭惟配合名相凡有三者引為三玄要據如三擊三撼等頌百丈醬甕曰擊碓傳來三甕醫即興化拈香亦扯為三數臨濟三聖大覺魔魅後昆且三頓棒漢月謂未聞有兩頓四頓之旨潭吉又何得謂二打乎喚作棒已逐塊況認三段二打為定式而以四料揀明之乎又引漢月頌七佛偈云無相身心即有無有無兩絶密交蘆迅雷不及掩雙耳夢斷遙空月自孤又作此相與所謂不可有無有無不可者皆如彖繫以明一之旨不知一已錯更何論所繫辭耶祇如夢斷遙空不過似聞雷偈默坐公堂心源不動意至一聲頂開喚起自家底則與不可有無妄説天地懸隔矣五宗救曰黃梅亦以袈裟遮圍六祖徵其前悟無住生心大徹以衣鉢付之先師謂袈裟縷縷明示法數非苟然也自一條至二十五每條各五各各四長一短開闔變化默印廣大心體圓融行布不滯一偏始盡此心此法之奧非心外別有所謂密付也如六祖菩提本無樹偈豈非滯在淨處於心法有未圓若此便究竟三鼓入室不應復有大徹則偈旨之偏盧公再出亦當首肯今悟不及此遂謂先師以宗旨定在衣上此正顯潭吉不肯深思前據衣縷為示法數謂非苟然後曰宗旨不在衣上自相矯亂漢月誣六祖偈謂斷見潭吉改滯淨處心法未圓則世尊法本法無法偈亦滯淨處未圓耶又迦葉偈法法本來法無法無非法豈非本來無一物何處惹塵埃乎漢月潭吉向本來外説此心此法之奧反斥六祖偈為滯淨處未夢見處處真塵塵盡是本來人耳救曰五祖亦未見性語皎然明白後世云故意不許可笑天童云壇經載五祖云吾思汝之見可用恐惡人害汝故不與言後見偈將鞋擦了曰亦未見性衆疑息故見五祖時謂弟子念念不離自性與後一切萬法不離自性何期自性能生萬法等句言雖廣略理無二致安可以未見性語為實哉則本來無一物之意全是自性豈離自性外別有一物誣為斷見謗著淨邊恐招謗法過盡未來劫天童云一句語具三玄門一玄門具三要合當三玄九要既不可以三字死配又豈可以三玄要為實而謂自悟三玄要耶臨濟以上無玄要言不可謂自世尊至臨濟前斷無悟者既有何關三玄要哉覺範雖於兩堂同喝賓主歷然有見處錯以為三玄三要未免識者笑然有過汝處云細看即是陷虎機豈不徵玄要非實法哉救中又道拈提玄要者汾陽慈明覺範不下十數人昭公號中興今之抹殺宗旨何以稱焉汾陽誠老僧二十四祖所以道只須明古人意旨然後自心明去更得變通自在受用無窮喚作自受用身此汾陽旨即臨濟旨亦老僧據自受用身一棒不作一棒用直指人各各醒自身受用旨漢月謂只得一橛頭硬禪老僧辨論無非為佛法故又云潭吉謂漢月真照無邊皆是悟處不過似他而已不為無見且問潭吉等多少漢月有似他不似他又有箇真他耶又引香嚴一擊忘所知謂真照屬知故僅得似他非真他也此益顯未知香嚴真悟嚴忘擊竹作聲之所知正據嚴全體不假修持而有所以道場古路用酬溈山未生前一句耳老僧據爾我為離一切名相之真照香嚴我有一機瞬目視伊非據爾我為真照乎實上座夜明簾捲無私照金殿重重顯至尊則真照與尊貴同旨無疑故老僧道似他者舉似他也人不稟離名相之真照則據全體大用斷彼名相而悟爾我全體潭吉錯認離相離名引洞山呵云認得箇不名不物無是無非底道理正先照後用有人在者且問離相離名人不稟底人汝作麼生銷而可謂無有人在耶又云汾陽道會此三句已辨三玄更有三要語在切須薦取索性道破與臨濟汝等諸人作麼生會一般汾陽雖順僧問答三轉語恐作實法會故有切在薦取之囑所謂急須著眼看仙人也又云風穴祖師心印狀似鐵牛之機去即印住住即印破乃至印泥印水印空不留朕迹老僧云宗門三印不知始何人若到老僧前恁麼判一棒打折他驢腰潭吉只據印字紐合三印殊不顧穴全語云祇如不去不住印即是不印即是還有人道得麼穴此語正覿面提人下舉盧陂不薦至牧主曰當斷不斷反招其亂穴便下座據是則印空印水印泥愈彰朕迹正所謂當斷不斷者何曾夢見風穴汗臭氣天童與藏公書云汝舉百丈不落因果因墮狐身此破本無一物之外道不昧因果此破執身是菩提樹為非者汝墮無窮劫無出期本來分上無一物之名可立只因昧故道不落致墮狐耳豈非汝昧之甚者若知極粗一棒落處自不昧矣又云臨濟道無位真人常在面門出入漢月何不自摸面上有三有一有粗細有人法四相有小法大法大法中大法賓主玄要料揀堂奧花中脈脈袈裟縷縷星樹師法柯枝花果乃至我法真子過去再來法密道尊新宗舊旨威音一圈七佛交截雙頭獨結橫開豎合河洛理數也無豈非逐名言塗汙自家面門乎又云德山托鉢峰云托向甚處此峰偶爾成文德聞似言中有響便歸正將錯就錯一似曉他一似相見峰不薦巖頭曰未會末後句一似點他一似忍俊不禁德喚頭密啓便休明日上堂不同頭笑曰且喜會雖然只活三年此頭明歸方丈洎與德山相見耳汝則謂被徒問著便托歸方丈及頭言未會末後句喚頭問復休去未有巖頭強似德山未聞德山軟不中用昧却德巖相見的意皆為賓主相見三峰燈史載藏公立四殺雄云抹殺法中英雄者謂其能以舉一為用也高峰聖云春風猶未至先綻一枝梅驗盡法中英雄者謂其能以大機為用也聖云雲收霧卷青天碧腦後雷轟過九洲奪盡法中英雄者謂其能以抽爻遜位為用也聖云換去乾上九畫長坤下畫瞞盡法中英雄者謂其能以前定不滿為用也聖云紅日才舒影青雲隨後遮又云粗悟一句一棒便無一法當情然此一棒正是實法繫人直須入三玄以銷盡出三要以了盡始得一句中三玄三要謂之小法中大法有句無句乃大法中小法兩不可缺有句無句又脫卸一重走在頂尖裏去三玄又脫卸二玄走在第三玄去三要又脫卸兩要走在末後句裏去按此言句均似別出意見重添名相録以備考耳華藏證云透盡差別智法如臨濟玄要賓主照用人境曹洞五位三墮雲門三句一字溈仰圓相法眼六相義五家宗旨一一透過而會歸德山托鉢公案止忘盡法見通身在裏許通身又不在裏許所謂透盡大法方可罵除大法向威音那邊更那邊任運過日去又五家臨濟最妙濟又四賓主最妙分六種機用乃祖師中之祖師也此亦創論録以備考三峰開發工夫中云菩薩正禪雙照礙雙遮雙遮礙雙照又不妨雙遮即雙照雙照即雙遮四法交加結角如錦文此如來禪結頂處均録以備考指月録載覺範云古塔主誤認玄沙三句為三玄但分三玄遺三要沙云真常流注為平等法但以言遣言理遣理死在句下若知出格量則不被心魔使到手便轉不坐平常見第一句也古謂句中玄回機轉位縱奪隨宜廣利一切此第二句古謂意中玄大用現前全用不全用此第三句古謂體中玄又薦福古云空劫自己是根今時日用自己是枝三玄法門諸佛以度衆生令成佛今言是臨濟門風誤矣汾陽三玄三要事難分總頌三玄得意句玄或作意中玄萬象句體中玄重陽句句中玄僧乞標出古云體玄句玄玄玄是佛祖正見隨入一玄已具正見僧問體玄古曰會萬物為己三界唯心自心是佛如此等方是正見僧問如何語句因緣是體玄古曰佛指地曰此處宜建梵剎帝釋將一草插曰建剎竟水潦被一踏起曰向一毫識得根源此等合頭語直明體中玄自無出身路問何言句明出身路古曰僧問維摩手擲大千世界於他方如何甘泉答填溝塞壑僧問一句道盡時如何答百雜碎此等語雖有出身路未得脫灑須知有句中玄透脫一路向上關棙本分事祇對僧問何等是句中玄古曰佛答昨日定今日不定祖答廬陵米作麼價糊餅麻三斤類此等句中悟入體玄見解淨盡便能與人去釘拔楔然但脫佛法知見見解猶在生死不自在為未悟道故今以此為極則祖風歇滅若要不涉言句須明玄中玄僧問玄玄古曰如問有言無言世尊良久臨濟三問三被打方便門為玄極若望上祖初宗即未可僧問三玄見未圓備有何過古曰得體玄未了句玄有佛法知見對答要合三乘具理事道眼未明眼有屑須更悟句玄也若但悟句玄透得法身反為此知見奴使並無實行有憎愛人我以心外有境未明體玄也學人縱悟一種玄門又須明玄中玄始得平穩僧問三玄法門名既三法門亦三語各各不同如何言一句具三玄要古曰空空法界本自無為隨緣應現經云一切諸佛及三菩提法皆從此經出楞嚴曰一毫端現寶王剎維摩云或為日月天梵王世界主到此境者一法一色皆具含容周遍何疑一語不具三玄要耶問要一語具三玄要意安在古曰諸佛言教出體玄諸祖言教出句玄佛祖心法出玄中玄如巴陵鑒只悟言教未悟道見性問提婆宗答銀碗裏盛雪問吹毛劍答珊瑚枝枝撑著月問祖教同別答雞寒上樹鴨寒下水云三轉語足報雲門恩不作忌齋豈可乎覺範曰古誤判三玄要為玄沙三句所言一句具玄要臨濟所立百丈黃檗但名大機大用巖頭雪峰但名陷虎却物古謂非濟門風必有據何不明書不然則是臆説三玄則分體句玄三要則不分方呵學者溺知見反引金剛楞嚴維摩證一語具三玄要非知見乎且教乘既具安用宗門古毀教乘為知見自宗不通又引知見為證此一失也巴陵真得雲門旨所答三語赴來機活句也古毀之二失也分二種自己不知聖人立言之難世尊偈曰真非真恐迷我常不開演立言之難也楞嚴一攀緣心二識精圓明然猶不間隔其辭慮於一法生二解古創建兩種自己疑誤後學三失也覺範曰參同契但易玄要為明暗首標明皎暗注又發揚之在暗則必分上中在明則須明清濁此體玄也本末須歸宗等此句玄也謹白參玄人二句道人不遺失時候真報佛恩此意玄也法眼注恨不分三法一味作體玄解失石頭意又妙精圓明未曾間斷謂之流注真如汾陽所謂一句該萬象也神而明之機用脫窠臼有語中無語所謂重陽九日菊花新也三玄之設本遣病貴知其意謂之不失時所謂得意忘言道易親也古喜論此道然三玄則以言傳至三要未容無説自非親證莫能辨也曇珍曰淨名香積品羅什注曰如來説法其要有三一軟善語二剛強語三雜説讚善毀惡雜説也三要本此幻寄曰古分劈古人公案為體玄句玄無論未達臨濟落處即於一句具玄要文義亦戾甚寂音斥之良是而謂認沙三句為三玄則誤與古同蓋沙未嘗有體句之名兩家俱以第三為極則沙第一句盡十方祇是仁者等語已盡古體玄義音摘數語為句玄復以沙第三句為體玄淺深既倒置強合其所本二強析其所本一原古二種自己意謂體是教極則句是宗極則尚是今時自己言句邊必不涉言句契空劫始謂玄中玄其訶巴陵即指廬陵米價等為句玄未為悟道也殊不知米價即空劫已具三玄要佛佛相授燈燈相續即此而已音謂古不識陵活句彼固識為宗乘極則活語直未識即空劫自己之分身與玄中玄無異耳古既不識此則玄中所列世尊良久等又何能窺藩乎於不二法強生二解佛祖無奈渠何矣音又引楞嚴罪古二種已楞嚴固有二種根木古肯俯首乎古言空劫是根今時是枝何嘗截然二之必以此罪則真心妄心本來識神皆負罪哉音太息立言難不誣也音引參同契責法眼更穿鑿曇珍三要乃古流裔咦欲識三玄三要句請看金色笑拈花窺鞭良馬今何處高樹扶疏映晚霞清雍正間河南睢州惠曇威清人天眼目中列有玄要總頌玄要旨訣玄要決疑均似創論不録私謂臨濟三玄三要或有所指但既未確判似亦不必苦搜薦福輩所判語豈盡合濟意天童謂臨濟前無玄要語不失為歷代大知識良哉是言也天目晦云位中符謂臨濟屬機用接人賓主洞山屬功勳本分自處賓主豈濟機用外別有所謂本分洞本分外別有所謂機用乎位又云洞兼中至主中賓此洞亦具相見賓主若但言兼至方是賓主餘但虗設洞旨豈如是乎位云浮山翠巖克符汾陽語為本分賓主與臨濟所示無涉位不識賓主落處於看字逐塊謂克符汾陽為洞發應取克符汾陽語俱載洞賓主章豈不以克符答主中主之橫按鏌鎁全正令句汾陽三頭六臂擎天地句俱濟賓主牽合理之本體不涉於用是洞主中主不得遂以三頭六臂句改答主看主汾陽並無四看問答況主看主是兩家相見主中主是主家全主豈可妄改位公反妄謂古德或不曾細心以機用功勳別之不見首山頌識得賓全是主主中賓賓中主更互用無差互賓中賓主中主兩家用莫讓主把定乾坤大作主不容擬議斬全身始得名為主中主首莫也不會錯溷題目頌了洞中字賓主麼翠巖頌賓中賓出語不相應未諦審思惟騎牛過孟津釋曰頌學家眼未明孟津深廣便欲騎過賓中主相牽日卓午展拓自無能且歷他門戶釋云頌學家具眼雖是東拋西擲探竿在手且歷他門主中賓南越望西秦寒山逢拾得擬議乙卯寅釋云頌師家眼觀東南意在西北如寒拾相逢呵呵若擬議則乙卯成甲寅烏豆換矣主中主當頭坐須怖萬里涉流沙誰云佛與祖釋云頌師家把定佛祖也無著處白巖謂與濟賓主無涉不妨指出按所釋頗醒録之晦祖答或問云洞見學者祇認驢前為自己故云賓中主未辨若向空劫前識得便解從偏入正辨得賓中主更須盡却今時無家可坐無世可興方是主中主然濟施設在覿面全提機用即是黃檗處所悟本分洞施設在我渠回互正偏即是垂手接人機用故濟只示四看賓主則四中賓主已具克家種草舉著便知故克符汾陽浮山翠巖語自然如空合空又白巖摘珠中妄改諸大老語如長沙遊山歸案雪竇頌大地絶纖埃何人眼不開始從芳草去又逐落花回羸鶴翹寒木狂猿嘯古臺長沙無限意咄晦曰首二句竇將本分道破眼既開是法住法位所以道隨芳草逐落花復襯羸鶴二句若作遊山會未免髑髏遍野乃云長沙無限意分明欲露長沙面目奈描寫不就遂云咄昭覺云大似作夢却醒方知竇頌非言意可測而長沙首座問答處自不錯會今白巖妄截去後三句咄一喝如寶器被折半節得不令人咬指乎雲門厨庫山門案竇頌自照列孤明為君通一線花謝樹無影看時誰不見見不見倒騎牛兮入佛殿晦云首二句頌雲門廚庫句是放一線將人人光明列出來又恐錯認復云好事不如無花謝二句謂無廚庫光在甚處則花樹無所見且道是誰不見來末後倒騎牛二句方知明中有暗暗裏有明一段光明初無覆藏得此結束始盡公案好處頌亦意句俱圓今白巖將誰不見誰字作還字截去見不見二語使雲門公案好處不盡竇頌意句不圓無知妄誕其過豈細録此以備後鑒然伊庵現緝各章刪截古德原文甚多總期簡省便覽來哲如欲周知切須遍閲銷通切勿責其妄改為幸爾剔燈録載紫琈云溈眼二老一主華嚴一主楞伽故白巖偶言非之此事尚不與教乘合況以華嚴六相配法眼宗晦云華嚴經佛初發心時便成正覺正立地成佛宗乘六相義與三玄五位三句同轍法眼作頌定為宗旨集人天眼目者收宗鏡六相義語於法眼宗白巖錯會宗鏡六相同夢渡河語謂六相教乘尚未極則不可為法眼宗紫仍其謬因略釋宗鏡云今依因門智照以喻明如舍是總椽等別椽等合作舍名同互望非一名異椽等一多相成名成各住自位本不作名壞此六相義是初地觀能入法界之宗位位即佛階墀宛然重重磨煉本位不動斯則同異具濟理事不差因果無虧迷悟全別若論大旨六相還同夢裏渡河若論圓修斷惑對治習氣非無理行相資缺一不可釋云未契入法界者且以因門正智比量舍喻觀見非一非異之旨初地見道位證出障離垢真如圓融境智故有此觀因果登高自邇迷悟後後勝前復以論大旨本始不二之究竟覺拂盡行布迷悟階級在教中不許因地有此不二之覺惟別傳祖祖同證然不二之覺如果圓究竟安住涅槃果海如因中本始不二之覺則理須頓悟乘悟并消事逐漸除因次第盡故曰圓修斷惑對治非無永明善説法要以六相立掃自由還與三玄五位同乎異乎初地至七地見道位雖證真如在法界量裏未超心境無功用道故如夢渡河若以六相合究竟位六相即無上菩提妄言教尚未極悲夫法眼頌萬象明明無理事乃六相深旨見徹禪教皆在裏許白巖以萬象之中獨露身謂是宗語揭為法眼宗旨無理事頌斥為教乘何異摸象雲峰頌成壞總別同異帝網交參六義以帝網喻六相是事事無礙法界白巖載雲峰頌又謂六相非教極則豈知雲峰旨乎一主楞伽謂鏡智三生也溈山云我以鏡智為宗要出三種想生相生流注生楞嚴云想相為塵識情為垢二俱遠離則法眼明成無上覺想即能思心相即所思境微細流注俱為塵垢若淨盡得自在白巖云至以三種生為溈山宗可笑不知鏡智為宗之旨依教僧祇劫滿入金剛定成無上菩提異熟識方轉成大圓鏡智宗門不歷階級頓悟自心即契入鏡智之宗李長者達無始無明為大圓鏡智與溈語合溈引楞嚴正鏡智為宗之旨若達本忘情賴耶根本識即成鏡智根身器界如像想相流注俱成無上知覺真得佛祖心髓溈問妙淨明心仰答山河大地非鏡智為宗之相生乎溈山原夢以驗仰嚴度水擎茶非鏡智為宗之想生乎仰山答僧彼處樓臺汝反思的還有許多否及信位即得人位未在語此僧返照能思心無境落比量祇成信解若獲親證現量契入鏡智人位顯矣此非以想相流注三生令證現量契入鏡智之宗乎宗門極則即教極則故溈眼鏡智六相為宗旨且重離六爻可為宗旨豈圓頓教詮反不如域中奇耦數乎古轍載洞山賓主句主即正即體即理賓即偏即用即事理之本體不涉用者名主中主如王居內宮親從體發用者名主中賓如臣奉命出在用中體名賓中主如閙市裏天子用與體乖全未有主名賓中賓如無父之兒與濟不同私按作此判亦可但晦公所判該廣耳行䇿師云洞宗三疊五變諸師異説當以初二爻初疊三四爻二疊五六爻三疊內卦自受用三昧外卦他受用三昧五變喻顯法圖列初二爻正中偏二三爻偏中正三四爻正中來四五爻兼中至五六爻兼中到以配五變者是亦與辨謬同長行中以初爻為正中偏二爻偏中正三四爻正中來五爻兼中至六爻兼中到者參差未善又曰內卦自受用初爻文殊根本智當發大心二爻普賢廣大行當行大行三爻圓證佛果為成道相當證大果外卦他受用妙覺逆流回入生死海若合祖意不為自了漢作大佛事以三爻是功窮位極之正此是轉位就塗之來故合為正中來五爻道後普賢行當裂大網六爻攝用歸體為祕密藏入涅槃相合諸祖虗玄無著之宗當歸大處利他行滿置諸子祕密藏中我亦自住中也至所配初二般若三四法身五六解脫者是自受用無脫他受用無智當以覺自覺滿覺他以配三疊也覺範五變以中孚大過巽兌俍亭五變以震巽艮兌均出創論綱要云覺範改兼中至為偏中至未是至是兼的這邊才用著兼到是兼的那邊和兼也放倒了辨謬曰至者周也以行周沙界為通塗也到者墮也即尊貴墮也私謂偏中至語醒而意單薄原文既是兼當從原文辨謬云寶鏡變盡成五發明涅槃經如來應世五相洞山立五位正偏石霜立五位王子乃法王之子以初位實智名誕生以偏位權智名朝生以圓證佛果最後一生名末生以道後普賢行名化生以功位齊泯心佛衆生等同一際名內生所謂誕生王子父即此也有謂此位同出根本智何啻萬里或謂化生將軍位末生羣臣位朝生宰相子誕生太子乃至內紹外紹諸見均似偏説私謂內生既稱王子謂即誕生父恐未盡然若配正偏五位誕生以配正中偏悟門知有朝生配偏中正奉重功勳末生配正中來深入徹證化生配兼中至利物機用內生配兼中到體用雙泯頗合亦與石霜頌合九峰謂若不知事極頭祇得了事喚作外紹為臣種知向裏許承當擔荷為內紹須見無承當擔荷底人始得同一色借為誕生名王種又內紹灼然有承當荷擔亦須得轉紹是功紹了非是功轉功就位了始喚作人王種外紹全未知有且教渠知有外紹不借別人家裏事內紹推爺向裏頭問孰親答臣在門內王不出門裏紹王種名外紹王種姓紹是功名臣是偏中正紹了轉功名君是正中偏古轍云臣在門內王不出門俱指推爺向裏頭此臣指王子非外臣也內紹只得王名外紹只得王姓必須紹了轉功方真王子紹是功指內紹內紹未轉亦臣位總是偏以知有是偏中正紹了轉功方是王種名君者以在儲君位是正中偏與洞山所立別綱宗云傳燈石霜章謂霜為洞山五王子作頌朝生末生是外紹全未知有且教渠知有知有方為內紹然尚須轉正中偏配朝生偏中正配末生言向奉未敢言功承當擔荷始是功正中來為誕生王種出自創論俍師因全未知有一語作如此配九峰本以紹為偏中正紹了轉功為正中偏是偏中正應在前今以正中偏在前配朝生與九峰已不合又以洞山前二位全未知有與古轍以正中偏為悟門復不合所配誕生亦然須知洞山五位皆屬知有正中偏悟門知有時正位一色大功一色今時一色均相應烏得不稱內紹與九峰外紹全未知有語斷不能強合所云紹為偏中正二語亦與洞之正中偏偏中正稍有不同故偏中正列在前也録以質諸洞宗尊宿再為定判曹山五位以君臣臣向君君視臣君臣道合為次會元指月首白衣次子時次𦦨裏次王宮次渾然偈而不分配三山來首王宮配誕生次子時朝生次𦦨裏末生次白衣化生次渾然內生辨謬首子時配君視臣誕向次白衣配臣向君朝奉次𦦨裏配君末功次王宮配臣化共次渾然配道合內不共古轍依玄鑒圖首白衣配正中偏次王宮配偏中正次子時配正中來次𦦨裏配兼中至次渾然配兼中到紫琈同諸師各有所見總以綱宗中所依古德列次較妥録俟後定曹山三種墮三山云有墮落墮除二義若論大陽牯牛類墮不斷聲色隨墮不受食尊貴墮則墮落義曹山須具三種墮則墮除義古轍云大陽與曹山義乖覺範不察收入僧寶傳詳之幻寄云僧寶傳述三墮語遺尊貴智證傳以不斷聲色與隨墮分二遺類墮濟公獨載林間固有所擇也大陽直以墮為墮落非曹山旨矣雪竇頌龍牙問翠微臨濟案云龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用祇應分付與盧公是也僧寶傳謂竇以瞎龍死水罪之牙聞必笑所判恐未然三峰有十六問啓雲門湛第一問巖傳寶鏡若是覩影前事為甚未悟先傳堂奧後攖寧答云洞於無情説法處達本猶沈悟迹故臨行有末後重拈過水始釋述偈以明始末俱盡若大慧復至虎丘打失救産因緣與洞過水頓脫悟後影同天童闢妄救云洞過水覩影大悟前此悟無情説法而不薦祇者是非迷頭認影乎私謂洞山過水方大徹則前之未契如如不必諱却雲巖必了知洞山定得徹悟佛祖慧命寄在此人先傳寶鏡亦復何礙且謂寶鏡是堂奧事三峰之創論也至攖師引大慧比自謂確據其實未然蓋不了産難公案無礙佛知見圜悟所以有公案不必盡會之説而祇者是不薦本分收關然亦暫時岐路耳非全未知有也録俟後定餘問非要不載高峰枕子案徑山頌一捺捺倒𭺗不起渾身墮在濫泥裏枕子落地笑呵呵咄吃瓔珞粥底不是你此頌最親切雲門湛作頌翻之天童作二頌正之而崆洞復作頌扶湛以撥童童復有判崆洞語最後出復徐一我書今摘復書略録大旨此實宗乘正眼佛祖慧命繫焉閲者察之天童云雲門頌未盡了義教初發善心中破善後始明善經云若見諸相非相即見如來以配雲頌只破善無後明善故某説未盡在後因瑞白謂某有主公在是雲所撥某據撥字責瑞云若爾益證雲門墮空則雲子孫證其墮空至某偈則因雲未盡念箇補闕真言曰四大無我無心風箇中無二主人公廓然撲落非他物十方世界現全容乃據主以明善無心風該初善無我該破善半偈已該三句而現全容謂即見如來也居士將某主為初為無主為次破某但知法非法對待識神主不知某是超法非法過量主矣百丈以杖趕散復召衆云是甚麼此是別傳單提之旨豈如雲無我如風誰是主元無物其子孫死認撥主為超方句若爾藥山何故道因子得見海兄而雲巖頓省豈藥巖亦取法相耶仰山囑高峰惟為主公安身處峰如網跳出只是舊時人此正依舊山是山水是水故安定國也而雲云誰是主則茫無主豈得安定某謂豈存四大無我有我心如風者正謂雲頌與峰不相當居士云頌只要頭腦不差便可兩存者先當看仰囑峰悟的頭腦清後看兩頌誰當不當論差不差雲云誰是主元無物仰囑主安身處頭腦不相當無我如風云云又與峰如網跳出安定國頭腦不相當反與相違相破其子孫又死執撥主為超方句分明墮空落外烏得謂頭腦不差可兩存乎某云無夢無想主何處白汗出身念無起枕子落地笑呵呵伸手元在縮手裏四大無我無心風一頌見前直據仰囑峰悟説念無起正一念無為一念不生也無心風正外息諸緣內心無喘心如牆壁也居士云兒甫下地便知飢知寒能視能聽如西祖對異見王者大不然西祖收在一塵即仰無夢想主安身處知是佛性意喚作精魂即居士兩知兩能也且西祖不説在意曰知知能屬意識以為主豈不以意識精魂為佛性又云不管妙容色的偉衣冠的一班盡情叱逐使堂中靜悄悄主公靈然自在既到處逢渠何須叱逐方道主靈然自在豈閙亂地主便不在耶要之雲門不知主安身處故云誰是主元無物瑞白歷然不知主安身處故死認撥主為超方居士不知主安身處故云不可説有説無某直據本分主直是十方全現唯我獨尊還信麼居士謂窮其差根全在主公與身命豈可列為二致句既十方全現的主豈在身內若認作身命中則身命去主隨去此妄身心中那堪認主主別有在居士斷然以主與身命為二致則是非都在一致二致間六祖答色身無常法身常云據汝説即色身外別有法身此非居士妄身外別有主主與身命二致現前一班必須叱逐等見乎而祖斥為外道何也南陽問僧返觀陰入界處有纖毫可得否答不見一物可得居士請看有箇妄身心否又問身心外更有物否答身心無外豈有物耶又問汝壞世間相耶答世間相即無相那用更壞陽曰若然即離過請看離身外別有主否可説十方現的主不在身內否現前一班容叱逐否據某正是身心一如身外無餘居士正是於一法生二見色身外別有法身是誰差根邪解據六祖國師言居士正是先尼外道執神我斷常邪見居士若信某言摸取自家頭腦自見某頌所論親切處無夢無想二句正某於身外別無所證的旨後二句正顯峰明得本身主故得安身處西祖在胎等語豈非即人即身即安立義乃居士謂你真箇要將主公向何處安立是某曾將主公安何處立何處乎且仰唯為峰不知主立處特指睡時無夢想見聞識不起時以詰峰正為即人即身即安立的主本自呈露不待識心計度會得則常自作主無識心夢想顛倒故如網中跳出從此安定太平也居士謂豈真要他向睡時討箇安立處正使他疑無所之了到虗凝湛寂真體安於無安立於無立者則蹉過仰為峰徹困處且依舊認識心夢想邊事今問睡著無夢想見聞時可見有虗凝湛寂否此是峰前強作主差根居士認作真體又曰立於無立有甚本據已自墮於莽蕩烏知主安立處故必徹見即人即身即安立主全體獨露方立無所立耳且自不須用識心殷勤奉出但乘自悟力行自不於身外別作功用是謂罷業忘功乘自悟力是謂無功之功非莽蕩之無功今居士不知主落處謬計妄身外別有箇虗凝湛寂為真體既不到罷業忘功妄言立於無立是夢想顛倒的話某謂收在微塵即無二主公立命義者正恐夢想顛倒於身外別作功用離當人而曰遍現故收在無二處始不被夢想所壓殺十方現全容也居士云既十方全現豈在身內不知獨不現身豈得云遍某念無起現全容即微而遍遍而不出一微故伸在縮裏居士謂豈惟頭腦差和身子在他方世界某據渾身一箇主作頌本豈離身別有頭腦又十方現豈在他方居士未嘗摸著頭腦何知兩家頭腦差不差雲昧頭腦撥主某據頭腦證主意相反豈有俱不差理且是非有無皆心風動起念分別有某本分主不干動念有何是非有無故無心風也峰安定國即安立意某據身安立故汗出身念無起也居士何據以為粗莽雲頌既非峰安立旨豈有無身命的頭腦謂頭腦何嘗差耶汝引西祖及孩子知能來證已信主是有復以元無物為頭腦不差何也若謂妄身心無主故曰元無物峰此時於妄身心外別認得主悔前作主者誤則今不是前何以道只是舊人不改舊行履頌而與相違安得謂不差混判兩家俱不差可乎且謂忘了主才是真主古人道欲識佛性因緣時節若至如忘忽憶可見不忘主故常自作主如忘則莽蕩無本可據所以暫不在便不堪此是決定旨所謂那伽常在定無有不定時者某一眼覷定認定抱定故十方全現唯我獨尊居士謂斷乎無認無抱的主正不知安立處便混説箇無所住為安立處而以認不得為主公此所以頭腦不清也無心風豈與四大無我同蓋見有我無我有妄有真皆心風無則心如牆壁可以入道雲謂如風豈不知其指妄心嫌他不據無二的主而存二見昧峰悟意故直曰無心風救之耳居士謂箇中指妄身妄心那堪認主可見主別有在恐雲門亦未肯在凡所有相皆妄謂執著相是初句若見諸相非相破執是次句即見如來謂衆生全體如來是三句如法眼謂若見諸相非相即不見如來正見法眼耳即見如來即如來分上説耳居士以認主主却認不得認不得的才是真主配三句此外道矯亂論即配之亦止到次句認不得的是真主依舊取認不得的非相為主若認不得的是有不可作二句是無不可作三句此外道妄計豈可與佛説並耶且真主豈可認不得既認不得何知是真主此不曾親見暗中摸索若親見自能直據悟處説何須委曲作惑亂語成甚麼直指來惟不曾見混説忘了主真見主常不離主認不得主認不得的是真主且問既不離主又何可忘既忘了主説甚見主説甚真見主既真見主豈可認不得主既認不得主忘了主説甚常不離主此正茫然無主安得成主公義又引子思謂費中自隱不是另藏箇隱發時有未發不是先懸箇未發未會思旨思謂道費而隱蚤提出主也此正即人即身即安立義費是遍該沙界隱是收在一微造端夫婦伸在縮裏察乎天地十方現全容恁麼還説得費中有隱麼且先儒教人看喜怒哀樂未發前氣象居士云不是先懸箇未發則日用與喜怒打輥何曾夢見未發氣象要知未發氣象必慎其獨蚤提出主也永嘉幻身即法身大慧皮袋一靈則身外別有主正合外道神我斷常見又維摩觀身實相乃謂妄身無主維摩法離見聞覺知乃謂知飢寒是主正相反至玄䇿無師自悟屬外道語醫三種病一自為悟實未悟必師點破方免自賺一自非不悟餘惑未盡不經師煅煉不徹源底一自非不悟不依真師不識為人的旨不堪為則未免喪我兒孫玄䇿深識利害指破且自為悟實未悟者如湛堂向杲曰醒醒時有禪才唾便無如何敵生死大慧是識好惡漢今居士説不得自以為悟抵死不識好惡謂仰山豈真要他向睡時討安立處豈非湛謂睡著便無之證正不得這一解在所執皆斷常見而以證雲門則雲亦是外道恐雲叫枉耳某初判雲只言未盡自瑞以撥證則墮空居士以妄身心外別有主則落外既引西祖證而為雲解主公離身別有則為身為人六處作用之謂何乃謂全現的主豈在身內又引楞嚴海漚喻觀河見等皆是就機非了義語直至後生滅去來本如來藏妙真如性乃了義耳居士謂極知淨染二途總出如來藏豈煩惱不是菩提無明不是大智然必見主後方得回轉大用者則知頭腦不清既知淨染出藏則現前惟如來藏更不見染淨煩惱即菩提無明即大智則不見有煩惱無明於此不識則淫怒癡即戒定慧亦不識乃云理自不差豈非約理推度且問若見淫怒癡不可説即戒定慧不見淫怒癡更説甚即戒定慧以故但認得主不忘主不待奉出回轉而主全體獨露更有甚麼菩提煩惱無明大智淫怒癡戒定慧淨染等法故從上只貴覿面提人不以一毫意識措人分上且孩子知能非意識即主公行令請問孩子曾見主否若以不慮不學而知能為非意識則見免悅聞罵怒皆不慮不學是淫怒癡皆良知能是主公又何言回轉乎紫玉厲聲曰于頔客作漢于變色此亦不慮不學玉曰者便是黑風飄墮鬼國則良知能與黑風鬼國同不慮不學又作麼辨而謂知飢寒能聽視者便是主乎又云船子語上句交付阿誰不過以誰是主元無物是沒蹤迹意至藏身身字指甚麼雲門何嘗有身字意豈可單截沒蹤迹證乎且船子惟恐人以沒蹤為事不以身為事故云沒蹤迹處莫藏身此尤身外別無所住之證德山口挂壁上意謂與認不得主同不知更有一人呵呵大笑正枕落笑呵呵無二主之人耳又云召衆衆回首有箇甚麼正要恁麼思量是甚麼此際更可思量否一任疑著更問如何是藥山見海兄及巖省意指説得明亦教天下後世見居士不説瞎話又瑞謂古人行過於解不知行過解行為邪行解亦邪解溈問涅槃多少魔説案以眼正則行履亦正大慧曰諸方先定後慧非行過解癡定乎者裏先慧後定悟了方帖帖地大慧以實悟為見地以帖帖地為行履皆據道所在説瑞謂今時祇貴行履不貴見地分為兩義愈見瑞未悟到帖帖地乃贊為切中今時膏肓不思衆生膏肓病只為忘了主認不得主故迷倒瑞既撥主已是病上增病更説不貴見地貴行履誤人盲修無出頭期居士謂幻身心滅故另有箇非幻不滅諸幻滅盡另有覺心不動等此正離生滅求寂滅外道見又道真主不在妄身心內是有箇真主又有箇妄身心的然二見真無生滅妄有生滅非南陽所訶半生滅半不生滅而何更謂識妄即真同經破妄還真不知見有妄可識真可即及妄可破真可還早已落二了若認得無二主便全體主矣南陽身心一如下有身外無餘句則全收那更分真妄內外誣國師空此身於真心內乎此正執身外有真心故刪身外句仍落斷常見豈曾夢見身心一如來又淨名若行見聞覺知是則見聞覺知非求法也居士翻曰若捨見聞覺知是則無見聞覺知可為求法乎依舊在見聞覺知窠裏何曾夢見通達無取捨來又丟開不起凡聖見不作涅槃解單據平等如幻夢判識為妄正以己夢想顛倒方六祖不起不作者為妄也要之迷悟雖殊皆夢耳故不解六祖平等不起正峰只是舊時人始契國師身心一如旨又疑認者不離見聞抱者不離覺知某認抱身命為主豈更有見聞覺知可著説離不離涅槃嬰兒行為最者豈可知能便是西祖對王語身人本非兩物六處總不離身誠身外無餘旨豈似説箇知飢寒能視聽宛有兩知能乎寶鏡正據五相完具的眼耳鼻舌身為渾然佛性若完具外別有知能屬流注意識矣洞山過水偈切忌二句指水中影我今句指洞獨往處處二句指影因我有我今句唯指自為獨往故恁麼方契不然背雲巖祇者是矣居士錯認逢渠影子作逢渠解惟不認抱身命主人故迷頭至此又仰睡時無夢想見聞主在甚處非真要明主公畢竟是甚麼意若不能指不唯不會睡著旨要且向身命外別尋主人不免夢想顛倒見聞覺知識陰裏反覆也至拖死尸消息居士自未曾悟故不知高峰實未曾悟某曾向歷然道峰不過認是者漢反覆之能日間認能見聞夜間認能夢想但於能上加力故能作主耳若果悟拖死尸則死尸有甚見聞覺知與睡著無夢想見聞的身命何別而無對哉不消道箇某拖死尸去也日以死尸身命見聞夜以死尸身命夢想豈不萬象中獨露身乎又謂無夢想見聞外斷別尋不出主則仰只消道睡著無夢想見聞便了因甚更問主在甚處豈不顯要他會有夢想與無夢想兩不涉的主乎又囑但只吃飯打眠豈非指他吃飯的口打眠的身乎才睡覺來豈非指眠覺的身命乎抖擻情神者一覺主在甚處正要他抖擻身命全體精神也總之某絶後再蘇説認也得説抱也得居士無本可據説妄也不得説空也不得無非識心測度而已牧雲門曰高峰枕墮悟徹主崆洞聞鐘連主不可得烏得同然崆洞無主本雲門來徑山一捺捺倒頌即身命而主公雲門別云四大無我心如風箇中誰是主人公不惟忘自主且忘巖詰主在甚處又忘囑者一覺主在甚處故頌全不出主公意不惟不識徑山主并不識峰浩浩作主之主雲既別去浩浩主又不出無夢想主豈不無主墮空天童正曰無二主崆洞撥之不猶雲忘自主并忘巖所詰所囑主歟僧問從來共住不知名自古上賢猶不識但以假名字引導於衆生崆洞特撥主名字耳答古賢不識不與昧者同乃識自安立之主凡聖伊不得故曰不識實深識之也所以聖凡皆假名耳然有可破之名有不可破之名妄認之我可破常樂之我不可破主亦猶是雲誰是主亦破妄認但一味破昧四大即常樂我童無二主四大當體是常樂我乃天童之確斷了義之正宗佛祖實證之本體斷不可撥也又問洞頌有主初進步無主末後功有無俱打脫石女撞金鐘或當乎答曰峰無言可對雖認箇主未嘗實後枕落實悟全體主未嘗無既初未嘗有末未嘗無已覺顢頇復云有無俱打脫不知枕落徹悟有甚有無情執作是説遣之更曰石女撞金鐘不皆贅言了無涉乎問泥牛鬬入海須彌擊金鐘古説法有此式答誠有之正古人出身句未聞以撥主也洞語似古而非古是脫空語故據正旨泥牛等句更須一一棒過始得洞自謂不惜眉毛頌出童曰却請瑞摸取眉毛試問瑞眉初進步有謂有主初步耶末後向甚處去謂無主末後功耶又眉還曾向道有主無主初進末後有無打脫石女撞鐘耶此童婆心即以眉提撕石女撞鐘乃向眉外描寫詞而眉從本安然豈受塗汙此則洞眉也會自眉便會自主洞既撥主則無眉此則洞不惟不識主并不識眉為何物何得云不惜頌出耶玉林云瑞白因杜撰長老問甚人拖你死尸來此問話者又是誰錯會要識這昭靈拖死尸的問話的瞎做幾日道忽然似手一提這邊提過那邊曉得這拖尸問話的認識為己妄云峰初悟一般頌云有主初進步峰枕落如網跳出亂道峰方脫識空連主沒有妄頌無主末後工妄認識神為悟主云有主先成常見亦知古呵又以識空連主沒得為究竟謬云末後工又成斷見彼亦知未諦當別曰有無俱脫石女撞鐘若然峰應有第三番悟又成矯亂外道瑞半夜間一驚悟得主曉得拖尸問話的守箇昭靈故呵常見後打七忽身心脫落連主不可得墮空落斷故呵斷見又把非有無即有無矯亂見足頌在後可瞞人隨問亂答得莫道生死來用不著一睡去就用不著了甚至云一切習氣總自心現無差別使人殺橫淫妄靡所不至飽肉談禪望被魔魅未招報者各各覺察及早懺悔莫待悔無及今瑞已死魔子離言迷謬狂妄竟敢謗峰上堂所述為開發學人播弄倒橫等不可作實法會離言割愛辭親端的為甚若欲做認識為心外道祇消宗無為教五部六册謬引在眼曰見等語聚衆魔説何用冒在宗門夫瑞以曉拖尸問話的識神為主根本既錯又著魔境墮無記空跕立佛前半枝香漸漸覺來口中亂云不可住著祇與酒醉病熱者昏迷時無主宰失心忘身百事不知打亦不痛許久才醒等耳欲將魔外見謬解宗乘塗汙高峰謬改謬配轉見不堪峰未墮枕前祗於無夢想打成兩橛耳雲巖石女起舞與石女撞鐘矯亂語大有徑庭莫道你師自注過末後工是頌枕落之悟有無打脫是説參人不可有無上作活計多種外見終不能逃強辨何益又曰中瑞魔輩邪毒善因招惡果者先舉湖州一僧一俗言歸安有居士福相豐厚英年向道奉戒持齋以淫習重為愧求出生死誤入瑞魔網死魔子離言手以曉昭靈識神認拖尸的為悟主然尚知淫妄為非乃瑞云才涉參情便有入路更云一切習氣總是自心發現何差別何羈絆教其信得這一著極則無有不是汝無不解脫謬扯萬象中獨露身來恣其狂妄逐令自負悟道勘驗緇流破齋犯戒一切無礙誰知佛法大有靈驗前年七月半身冰冷不能轉側接父兄親戚集驀地躍起遮攔不住直至堂前言一菩薩執一軸手卷書其罪狀又一天大將軍執大鐵鎚令一一發露若一字隱瞞則一大鎚嗟乎居士報未到時其不服善音容更甚今魔氣正甚輩誰知生死到來更不容偽甘伏死門如實供云第一重罪未得謂得第二鞭拷沙門第三妄刻語録第四破齋犯戒把罪説過乃述苦報説受某等地獄報即做其相説獄相畢云是果報先應受花報説數花報畜類形聲畢驟云應先變豬遂作豬鳴奔房中撤臥具眠草中家人以被囊草必去被曰惟草為安慈父痛心仁兄血淚欲救無術而居士説罪狀罪相一一清楚父兄令説懺悔二字便懵然不知嗟乎到求懺悔時不能何不於能懺悔時早自知非而至噬臍無及可為今未得為得者殷鑑其兄親為某説某曰令弟是瑞印的曰固是而與離言更得特請離到家舍弟怒目視之離見形色不好不作聲出舍弟厲聲曰離言離言三聲而終此事湖州咸知我姑就其兄述又一白巖禪人昔參先師跪榻前曰和尚肯印證助和尚成叢林化錢糧被先師深責無顏去末幾在辨山付法矣吳遜翁曰白巖見人打一下曰會麼要人曉得打的舉動的胡亂承當遂印為悟弟婦也被印證近現報了得異症腹脹如蘿等魔事甚多滿屋皆鬼白日出現亂打亂叫如是現報方死僧俗咸知白巖現報如斯其花報果報同前居士斷然一毫不爽至歷然吐血亡現報不一魔輩認識為心未得謂得謗大般若縱無現報入地獄無疑又現報昭然毫不警惕果如何為心乃魔子久默謂伊兄曰令弟招報雖苦見地是好的伊兄曰舍弟見地不好他現報時親説未得謂得且公子家縱欲者多何如是現報之甚久默尚云令弟祖師關是透的如此魔魅禍豈小哉因知其兄外中毒者甚多況他姓耶其兄又述一人到離言處許三日悟道頭一日開示看舉手動足的是什麼人第二日聽其自看第三日謂你今日該承當了你不承當三更來敲我門果然三更敲門承當了問是婦女光天化日下有如是魔精哀哉有居士謂離言師説做幾日工夫他點得會的某云點則可點會則要人自會辨山點得會要人承當識神耳居士曰他説舉動的為己如西祖在眼曰見等某曰彼是方便示王從八處出現時見性非指見聞覺知為性也執此等語誤認則成認識為心外道矣離言開示唐祈遠認動作的云我明明説你還不承當唐曰不敢承當看現報樣怕了離言云若説那居士不好就不濟事了嗟乎地獄非小苦何得邪魅之至瑞開示莫不教承當開口動舌眼見耳聞的為本來隱頤亦被迷曰蒙委曲開示信得極喪心哉然隱頤尚以妄想流注為疑瑞白竟不怕造地獄到底慣以坑陷居士的毒坑陷云汝喚甚作妄想謬解識得不為冤語云曾非別人謬解是誰起滅語云當知妄想全體是箇自己邪人説正法正法亦成邪故我總提一冀魔輩懺悔二聽諸方共辨乃魔子不知負墮地獄豈是等間誤人入地獄豈可兒戲何苦害無限好人入地獄僧問崆洞頌高峰固不合報恩謂峰打破死尸句便實悟何如牧雲門曰疑嗣書謂雪巖誰與你拖死尸者指峰全體主也峰覩讚是者漢觸發拖死尸是阿誰也魂飛膽喪絶後再蘇如放百千斤擔者描邈參情極處境象也到南明納一塌敗闕者相見機緣疑嗣書略過不敘也明得公案亦不受瞞及開口又渾日用尚不得自由如欠人債足見前所得未穩也睡著無夢想主在甚處無對此前雖會拖尸主實未悟全體主也峰不自欺發憤疑枕落如網跳出追憶前疑佛祖誵訛差別公案如遠客還故鄉只是舊時人不改舊行履安定國十方坐斷者此徹悟向被詰主茫然不知今則覿體現前悟得自己立地處不改行履者未悟時吃飯打眠既悟亦同十方坐斷者前有浩浩有睡夢有作主今則全主覿體現前不煩舉念遍界不曾藏也若打破拖尸便實悟拌一生癡呆五年發憤圖甚麼問峰云觸發拖死尸句直得虗空粉碎大地平沈物我俱忘如鏡照鏡野狐狗子布衫出定話驗之了了般若妙用信不誣矣非實悟歟答有疑嗣書無夢想透不得之後案知前未底實也問峰上堂何不舉末後了手語而舉前不了話只如空碎地沈俱忘鏡照有甚不到處答正要汝問峰觸發拖尸會處説向人蓋勉勵人像伊如是體究必有靈驗未嘗指此為了手為實悟虗空粉碎等話有人道得了事有道得不了事非話有差別為悟有淺深而有了不了據後但會日間主未會無夢想主祇見空碎地沈物我俱忘未悟物我全主也如鏡照鏡未悟鏡來處也會得拖死尸未會死尸故無夢想打作兩橛不知落處即疑嗣書云絶後再蘇亦參情逼極得箇活路非撒手再蘇欺君不得也至枕落地始是撒手自肯再蘇時野狐出定話亦隨所見之了了解夏後開口又覺心渾則了了何在可知雖云了了不實了了行狀載詣南明相見雖則機鋒不讓不知機鋒轉語有道得便了事有道得仍不了事不覩大慧未見圜悟時乎然此機鋒疑嗣書不敘自知前來做處不實略之空碎地沈亦不敘豈非峰自不將此為究竟歟問峰不能酬無夢想別以見地不脫礙正知見釋之類乎答打破拖尸句已五年為甚無夢想主無可對安有實悟不知主者正見虗而未實何謂之有見地雖喝也喝得袖也拂得機鋒轉得然會處不確巖不肯放過之峰祇到得睡夢作得主詰無夢主便無對因囑者一覺主在甚處正欲峰實見主安立處若將拖尸打破為實悟豈不致後輩有倣佛打破拖尸見者便自謂實悟高峰枕落一段話語語應著雪巖前指示的語語翻却前自己作得主的巖全提峰全體之主峰供通實悟全體之主謂之見地不脫云乎哉見地不脫非正旨也私謂高峰打破拖尸句固與瑞自有主初步之見兩殊然不了無夢想主到此是見而未徹報恩亦云對瑞師説謂之大悟徹悟若對後枕子悟境但謂之悟而已然終以報恩所判未墮枕前於無夢想主打成兩橛語却好是峰拖死尸觸發分量天目晦有辨牧雲門語不録報恩判魔費隱斥狂解亦不録天童判朝宗説云汝引石門照從上諸聖總具三玄要老僧敢道照亦無擇法眼被濟玄要惑濟道第一句得與祖佛為師正據本來人為祖佛師故道衆生度盡恆沙佛第二句得與人天為師亦據本來人非人天只因不自回機故枉輪回人天第三句得自救不了亦指本來人自不回機故自救不了老僧唯據人貫三句不見三句名言況有三要為印來如問第一句老僧道已第二句濟云三要印開朱點窄據朱點指前人分上首山大用不揚眉棒下須見血初不見彼此之異因問答乃主賓故曰未容擬議主賓分風穴隨聲便喝據是則不容擬議三要矣既未容擬議則舉目了然豈更見佛祖主賓之異三玄要之名哉亦惟據人人本來本具本得故指各各為一句耳問第二句濟曰爭負截流機非反截上問耶所謂一句截流萬機寢削首山亦謂一言截斷千江口萬仞峰頭始得玄南院道赤肉團上壁立萬仞皆指赤肉團為玄所以道照未到本得無擇法眼故謂諸聖皆具三玄要旨耳若悟本得見一切人無不具本得赤肉團之旨豈可以別法加人哉問第三句濟云藉裏頭人正唯據本來人所以穴道明破不堪汝謂三要印即真佛真法真道又計第一第二第三句有三門此汝錯擬以三玄門配三句及佛法道之三耳故謂第三即本於真佛二即本法一即本道道者佛法雙明照用無礙故謂一與祖佛為師既佛法雙明有佛矣可與祖佛為師哉又謂祖即法也分為二句佛為三句且問汝三句中得自救不了佛自救不了耶且不合濟云佛心清淨是法心光明是道處處無礙淨光是汝謂一句中具三玄門即一句具三句權也在賓全正令也既謂權豈全正令未夢見全正令旨又云一句明明該萬象此也以汝未明汾陽自為一句菊花正塵塵盡是汾陽以曉人人該萬象塵塵盡本來人耳又謂三句只一句三玄只一玄故一玄中具三要言言不離本分實也立主要須圓也且問汝因甚道得意忘言道易親耶汾陽豈若汝不忘玄要名言翻覆顛倒哉又謂三玄只一玄三要只一要所以云四門通一要一要具三玄臨濟首山汾陽先三要後三玄實而權也汝莫謗好汝見一要具三玄謂要實玄權且問汝四門著落然後判一要始見不亂説首山云恁麼來者是誰一似指地一似驗他僧答某甲以名通來者常在途中不離家舍首云莫道是別人隱隱證他僧禮拜可知禮也首云見箇甚麼便禮拜又轉驗他答今日大似因齋慶讚果知禮也首云適來恁麼道速須吐却恐他以言語為己事不據自為實也答也知和尚曲為某甲果見己不可受委曲名言首云後有問向道甚麼僧拂袖便出若不出曲為亦虗言矣首召僧又驗他僧回首首便喝以喝不作喝驗僧云者老賊得牛還馬首乃以四門一偈示之只如要須圓之要汝作麼釋汝謂濟立法首偈汾頌先言三要後三玄實而權也濟一句語須具三玄門一玄門須具三要汝何所據為一要耶汾三玄三要事難分皆先玄後要首四門通一要據首一要非濟汾三要據首四門非臨濟一句具三玄一玄具三要初法試配得恰好則汝説不謬又云其實元無先後三玄即三要第以三要施之門庭故謂三玄門四門通一汝又作麼消又謂總看玄權要實玄用要照玄賓要主汝既權先實後則權實從人建立來首問來者是誰非照用同時僧答某甲又非照用同時皆指人外無別法之實哉乃至首便喝者老賊又非全體照用同時乎故在賓全正令立主要須圓耳二人問答何嘗有玄要二字影子可見四門一要三玄皆名言而汝於名言顛倒妄作妄説首山云速須吐却可有玄要名言落賺汝等何曾像汝云細辨則玄中亦有實有照有主此賓中主所以立也踞地師子第三句也要中亦有權有用有賓此主中賓所以立探竿影草第二句也玄要齊彰此主中主所以立金剛寶劍第一句也所以首道把定乾坤大作主不容擬議斬全身方得名為主中主非謗首耶既不容擬議斬全身正據全身初不從擬議來首賓主頌曰悟了却從迷裏悟汝敢於悟迷無二人分上別以玄要等作一程一程定限惑人豈可謂迷悟從來無差互始知本末至於今今古相承無別路耶又兩家用莫讓主非臨機不見師耶又不容擬議豈非擬執玄要等名言而不據全身以示人耶汝謂棒下無生忍為全賓為三玄臨機不見師為全主為三要大不然既不見師則師弟無異各各本具全體平等誰更與汝分賓主玄要況三玄要哉又謂只一句全提者所以三玄要賓主歷然不可分即三玄中亦賓主歷然不可分第一第二第三三要亦如之如鼎三足或縱或橫則鼎不可立老僧只據全體自在誰與你來分縱橫哉又云若儱侗則足無準的不可立此三玄要方為一句而難分濟云三法混融辨既不得喚作茫茫業識非指儱侗者且問誰向汝道儱侗謗老僧為儱侗耶只逐濟名言不顧自全體更問人皆兩足而立直饒汝如鼎再生一足只是箇怪物非自辨不得業識衆生乎又汝道三玄若可分何以具一句三玄可儱侗何為一句具三玄是知權實雙行照用齊彰賓主歷然如大火聚非一草一薪火且問般若大智如大火聚擬則燎面門者是多少人共一般若而謂非一草薪哉非謗大般若而何從上以來並無玄要遞授汝謂三玄要非濟特創亦非黃檗特創非塗汙先聖乎汝謂諸人作麼生會者三玄也一句中之賓也權也報汝通玄士也下座者三要也一句中之主也實也棒喝要臨時也所以一句有三玄要賓主歷然也老僧道棒喝臨時只與作麼生會一般與下座了沒交涉濟道向未舉前撩起便行故某謂下座以全體獨脫抹殺三玄要也豈若汝更分開亂配哉如上所録揀異示正深關宗乘隻眼略為撮要用備探尋噫以不立文字之傳至於羣興辨駁語瑣詞繁得毋傷其已甚雖然若非彼此搜討安得歷祖公案綱宗言句見地如此毫分縷剖之明晰哉不是山僧逞人我有疑不決直須爭萬古碧潭空界月再三撈摝始能明來哲其撈漉之毋負從上古德權實示現之婆心也貫教禪是佛心教是佛口佛之心口決不相違古德云禪為教外別傳教亦可為禪外別傳誠哉斯言也宗鏡録以百本經論引證契同廣大悉備茲不繁引惟舉東土創立講家所謂天台宗賢首宗唯識宗相沿至今與宗門各樹法幢以流衍於無窮者特為疏通其同中異標示其異中同以合貫於我佛一乘之旨俾相得而益彰毋相攻而各是而終以淨土指歸為宗教兩家千穩萬當一生成辦共由之正路焉其亦庶幾也夫唯識一宗奘師數傳後幾於絶響邇時皆台賢兩家兼講之唯識三十頌中立唯識行位有五其三通達位謂諸菩薩所住見道如實通達頌曰若時於所緣智都無所得爾時住唯識離二取相故謂真見道位於所緣境及無分別智都無所得爾時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故此在唯識家謂之真見道位若在天台家是圓教初住位別教初地位破一分無明證一分真如之相方之參禪上士即是薦取本來面目與本分相應然教中乃實證真如是如來應佛成道相禪宗是瞥爾契悟天壤之殊但所悟境相與所證境相了無差別此正生佛不二之心源宗門所謂與諸佛同一鼻孔出氣者指此也所謂三界唯心者亦指此也宗門人既相應已時時任運此境現前消除二取習氣或一生乃至數生般若成熟倏與教中實證相埒斯則全在當人功熏之綿密難以豫判然以始合本其疾如風但令般若常現正不必冀其速效而無不速效者較之唯識本宗自初資糧位次加行位至三通達須歷僧祇大劫方得證真再進而為四修習位五究竟位統須三阿僧祇乃登佛果其遲速蓋不啻天壤矣天台判唯識攝在別教其兩家名相圓融行布固可會通然開解起行門庭迥異毋須曲會賢首判唯識攝在始教尚非終頓二教況華嚴圓教然華嚴疏鈔中遍引唯識故不通唯識者不能演華嚴宗此則與台家自立專門不須兼他宗者異也求證唯識性菩薩從發深固大菩提心修六度勝資糧觀名言我執二取空入手與宗門一念回機便同本得但離妄緣即如如佛者大相徑庭不須和會至因明論中立有現比非三量釋現量云此中現量謂無分別若有正智起時於色聲味等義邊全離名言積習種子等以現根對現境了別而轉故名現量宗門人每以現量為本分當體然以現根對現境則有能現所現與迥脫根塵靈光獨耀宗旨顯然不同須知宗乘悟門不是現不落量㘞地一聲撞倒這沒面目漢方是這一著子獨尊正位切勿鹵莽認現量為本分也祇如正睡著無夢想見聞時以何為量現箇甚麼枕子落地消息是未現起不落量時節佛眼也覷不著豈可説現説量耶總當以唯識見道位親證真如圓成實性引為契同可爾賢首家以法界為宗分理法界事法界理事無礙法界事事無礙法界禪宗則全攝四法界為悟門即全攝四法界為一本分泯絶四法界全收四法界言語道斷心行處滅不可思議天真獨露統謂之一真法界不似賢首教之條分縷剖耳故宗門客多喜賢首家經論以其談説多與宗語相合也賢首判宗為頓如云但一念不生即名為佛頓詮此理不列漸次故名頓教別為一類離念機故即順禪宗而以華嚴經所説一位即一切位一切位即一位依普賢法界帝網重重主伴具足立為圓教若如所判禪宗但是頓而非圓不無抑揚之詞私謂宗門謂之由頓而合乎圓則可謂之但頓而全非圓則不可然華嚴諸祖雖如此判亦許禪宗為圓所攝圭峰云若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修者是最上乘禪一行三昧是一切三昧根本若能念念修習自然漸得百千三昧達磨門下相傳是此禪也頓同佛體得即成聖疾證菩提又云真理即悟而頓圓妄情息之而漸盡頓圓如初生孩子一日肢體已全漸修如長養成人多年志氣方立當知無漏智性本是具足一行三昧是一切三昧根本及真理即悟而頓圓等語皆是圓宗非僅一念不生離念之頓旨不可妄興評論至華嚴家開圓解後諦觀事理圓融無礙周遍含容法界處處開十義而要歸於契心平等以成止觀如云泯同平等者為未了者令了自心若知觸物皆心方了心性故梵行品云知一切法即心自性則成就慧身不由他悟既心境如如則平等無礙即心了境界之佛即境見唯心如來心佛重重而本覺性一皆取之不可得則心境兩忘照之不可窮則理智交徹注云今人只解即心是佛是心作佛不知即境即佛是境作佛以心收境則心中見佛是境界之佛以境收心則境中見佛是唯心如來心佛重重者置兩鏡照一佛則一佛像重重雙入心境兩忘即止理智交徹即觀此與台家初心遮照同時相類正是下手修持功熏吃緊之處與宗門知有後任運騰騰但是無心於萬物何妨萬物常圍繞實際理地不受一塵佛事門中不捨一法行履相應亦與濟宗無依道人歷歷地孤明洞宗六戶不掩四衢無蹤同此是一路涅槃門圓宗圓教若合符節所謂常觀涅槃行道是也若華嚴家所演事事無礙法界帝網重重主伴交互果位方能全行印證似非初學所能證入宗門雖云自心本自具足不須開如此解亦毋須起如是觀此則與賢首別至於賢首依華嚴教判立賢聖五十二位階次井然不同唯識須歷三僧祇劫方能成佛清涼有云三生成佛其疾可知宗門雖不明立五十二位而望空點迹決定暗證不可撥無而終身不退定入聖位斯則速證全與相合者也天台家依法華經純圓獨妙於法華經題開立名體宗用教五重玄義而以經中實相為體斯即宗門所悟之本來面目離實相無悟門離實相無本分所謂實境無相無相亦無實智無緣無緣亦絶境雖無相常為智緣智雖無緣常為境發非實非不實非相非不相遮照同時正是宗門恰好正眼但教下依言而顯離言而契宗下則全指離言而契一邊耳台家判我佛一代五時説法初華嚴時二阿含時三方等時四般若時五法華時判藏通別圓四教雖不專論宗門而判禪宗為般若時所收帶通別二教會歸於圓以宗門得意者全合於圓其未得意者或帶一別或帶通別二開悟有淺深致合教理有純雜六祖宣演摩訶般若勸誦金剛般若經即是其證蓋以般若部中所談與宗門祖師指示多合故也台宗自以法華純圓獨妙出前四時外以前四時是對待之圓法華時是絶待之圓立一念三千空假中不思議境起一念三千空假中不思議觀觀境不二雙照雙遮因該果海果徹因源佛子住此地即入諸佛位了知心佛衆生三無差別祇觀己心一念陰境即具凡聖十法界十如假名一千五陰一千國土一千此一念三千法一空一切空一假一切假一中一切中所立境觀最為圓妙宗門客事來不受一切處無心與一空一切空合轍不變異處去去亦不變異即與一中一切中合轍唯台家入手觀妄不觀真賢家入手觀真不觀妄宗門亦然故宗門與台家多不能會同以台家只觀一念妄心具一切法即空即假即中宗門先須滅盡妄心方得真心脫露然無始來未曾離念不獨起滅是妄即不起滅時亦無記妄念所攝必待登圓初住破一分無明證一分真如始得真如覿面全彰未登住前皆住地無明妄心耳但離此住地無明更無處覓取真心故李長者云住地無明即是諸佛不動智然則台家觀妄禪宗觀真均不外此住地無明是以台家云山外觀真却同觀妄山中觀妄却是觀真此對賢宗而説而禪宗可知蓋禪宗離妄顯真台宗即妄全真而同指此住地無明即諸佛不動智也了此則不必分禪分教分妄分真但認取隨緣不變之實相般若心心不異即是諸佛不動智現前即與諸佛把手同行即是入諸佛位台宗亦判五十二位而一生可望登圓初住位斯與禪門終身不退入聖者同也古來未有不通教乘之大宗師故曰通宗不通教開口便亂道何能接人利物應不失機今略撮録唯識賢首天台三家宗旨與禪門疏其同異和會一貫宗教雙通佛祖並印雖不中不遠矣然而法運際衰人根多鈍猛發大心以了當生死者固不乏人其間三登九上不得遇真正師承即不能得真正知見即或遇正師承得正知見而一知半解未到大徹了手境界臘月到來未免一場㦬懡又或得正知見而習氣濃厚世壽短促又或在家二衆終歲塵勞未得行解純熟而一期報終未免半途而廢雖正念不失來生乘願再來定得滿其所願而隔陰可慮懷疑不消奪其正念以致打失者有之今更為斯輩設一徑捷千穩萬當方便俾人人得以此生超登彼岸則莫如禪淨兼修一門矣其未得悟門及未曾參禪專修事一心淨土者不復贅論茲所列者唯為參禪已經知有而力量弱薄不能純藉自力超登聖位見地雖正餘習熾然日下孤燈常時失照那能打成一片斯則在家二衆此病猶多倘不仗彼佛力加被其能免於臨終生悔乎況自古來永明壽祖極力主張立四料揀以為修禪者勸駕其餘歷代諸祖大事發明而發願往生樂土者不可勝數載入角虎集可考但宗家兒往往以唯心淨土自性彌陀為指歸此則仍是自力薰修不合往生正因一錯百錯不可不知也往生正因者了知自心本自具足自心實相即是西方常寂光淨土自心般若即是西方常寂光彌陀念自心具足之彌陀寶號薰發自心具足之極樂西方今日修持如是因臨終決得如是果仗自力之願山投彌陀之願海願願交契事理圓成臘月三十到來自然有不思議之豫知時至自然有不思議之臨終佛現自然有不思議之聖境現前自然有不思議之上品往生斯乃禪淨雙修之正軌也宗門人那邊明白了却來這邊行履説箇行履二字便是臘月扇子於本分事了無交涉然却少他不得今即以常持六字洪名為行履念念是始覺念念是本覺念念全本覺作始覺念念泯始覺歸本覺本始合一行願相資帶業橫超一生成辦這柄臘月扇子扇得透體清涼飄飄送我入蓮胎禪淨雙修事理該現世人天標榜就他生佛祖位中來斯非千穩萬當至捷至徑之方便行履歟私謂吾儕多劫飄蕩苦海浮沈今世幸得人身痛驚生死幸投佛門幸聞一乘又知宗門之別傳更信橫超之淨土福智兩足美滿前程憶我無始劫來人天樂境何處不曾安享阿鼻苦報億劫當亦備嘗今生再不超脫甘入輪回戀戀兒女恩愛津津名利韁繩何無志氣沒剛骨如是之甚我今普勸發心猛為立志始從參禪入手了知本分淘汰綱宗繼則博會教乘融貫宗門如合水乳毫無纖疑然後合宗教以收歸往生淨土成己成物上求下化發大心行大行證大果起大化歸大處盡未來際有能合如是軌轍者真是古今來第一員無事道人也夫上來所集十門無一門而非參學之要綱無一門而非修持之正轍仰酬佛師難報之恩示茲物我共行之路裒成兩卷連綴三年首事於庚寅孟冬之朔旦草就於癸巳季冬之新春自知謬見多悖禪宗愍此苦心冀諸同志聊採愚者之一得毋負葦草之三編云爾伊庵於是合十一心頂禮盡虗空遍法界十方三世常住三寶而作頌曰一花五葉少室禪紅雪埋脛開別傳嫩桂兩株遠受記濟洞兒孫燈綿綿參情緊峭隻眼露鞭撲生受牛馴眠一生入聖只自了菩薩發心利他先落草之談拈胡餅大機之用𡎺老拳融會綱宗追正脈搜討辨論匯大權宗説雙貫中天日行願穩趨上品蓮吾聞其語人未見五體歸投天中天達磨僧伽同加被見聞隨喜探斯篇項子秋蟾云無夢想主公話雪巖以己所中毒毒高峰先生染華藏老人之毒專提此毒毒盡參禪客俾與絶後再蘇相應至矣請自隗始皓心嚮往之矧自研究以逮入廛合教先生更為之列分十門統攝二利本末大備語云今人未必不如古人焉知來者之不如今是毒也其流衍於無盡際歟歸依三寶弟子項皓合十書後
