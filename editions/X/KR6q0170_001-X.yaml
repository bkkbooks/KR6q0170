body:
  text: 菩薩戒弟子錢伊庵編緝稽首釋迦尊十方三世佛聖賢諸菩薩摩訶聲聞眾東西列代祖第一最上乘我依當代匠究心無夢主百日絕後甦管窺豁一隙歷參諸開士慈愍予鉗鎚佛祖宗教理廣搜具薄信浮沈卅五年忽忽死將至深愧負師恩見淺習復厚兼思涉俗輩彼此抱同病知解不敵業臘底空慞惱因茲緝宗範朝夕痛自䇿願三寶加被見者咸歡喜妙心別傳分十章一禪源二徹參三調習四入聖五利人六顯喻七機用八綱宗九示辯十貫教原夫佛法東流自漢至梁經教廣布修契者代不乏人達摩單以別傳妙心直指人人見性成佛畢竟以何為妙心耶故首之以禪源源既定矣學者從何而契妙心循古軌則非參究不可故繼之以徹參由參而悟便與佛祖同一鼻孔然有無始習氣未消故申之以調習習消力宏真如深契六祖曰終身不退者定入聖位故表之以入聖如上四章自行穩密然須運同體悲詎可斷佛種草故勖之以利人利他中古德有言句機用兩路故分別為顯喻機用二門顯喻在前者初祖接機亦以言顯示迨三四傳而始轉為機用故機用次之法久弊生多諸巧見建立宗旨以護正眼故受之以綱宗公案孔多後來諸尊宿各出手眼以評唱之其間權實示現淺深偏圓不無同中有異然均以成就來學佛知見故廣之以示辯如上九章皆禪宗本分草料第與諸經教不可置之不貫故終之以貫教自八至十雖列利人後而自利均須十科廣研也予自笑挈挈波波儼似跛足道人滿面慚惶說得行不得然利根之士脫能依此撩起便行終身不退現世為人師來生作佛祖當亦今時之第二健兒歟禪源燈錄始七佛偈本師傳則略採諸經公案次列二十八祖授受因緣遡述源流體裁應爾今則不遑徧敘獨指佛生不二別傳妙心為禪源此宗旨豎義於達摩流衍於諸祖觀初祖接可祖梁武楊衒之諸人均以言句顯示乃謂之不立文字教外別傳者良以學人滯於經教卒未能印合妙心立地成佛故乘時而來提唱頓宗斯禪之源也妙心者何蠢動含靈皆有佛性而無始沈淪苦海者不悟此心當體是佛背覺合塵故全圓覺而成無明迷而不返然雖萬劫輪迴而不動之天真佛性從無遷變別記載初祖祇教可祖外息諸緣內心無喘心如牆壁可以入道二祖種種說心性道理祖總遮其非不為說無念心體可祖忽曰我已息諸緣祖曰莫不成斷滅否可曰不成斷滅了了常知故言之不可及祖曰此是諸佛所傳心體蓋息緣則外境相空無喘則內尋伺絕如牆壁則心行處滅言不及則言語道斷了知而無念則寂照同時心境不二迷悟不二生佛不二其恰好處心亦不可得妙亦不可得連不二兩字亦不可得不可得亦不可得非心非不心非妙非不妙放尿屙矢嬉笑怒罵莫非妙心體現今姑立以妙心之名而為達摩禪宗之源也須知安心者安此究心者究此悟心者悟此調心者調此入聖者入此利人者利此乃至諸祖之顯喻機用綱宗示辯并圓頓諸經論皆不離此心別有所指也在初祖證心之楞伽經則謂之自覺境界自覺聖智自覺則靈光獨耀迥脫根塵常寂而照故名為自覺智常照而寂故名為自覺境其餘如來藏自心現不生不滅真識均可一一消歸故初祖引證心宗可祖凡說法竟每曰此經四傳後變成名相悲哉馬祖引楞伽云佛語心為宗無門為法門三界惟心一法之所印初祖旁出之慧滿師常齎楞伽以為心要如說而行極知悟心之後必須消識功熏乃今之禪客微特不依經說而行且不知楞伽所說為何語亦不知初祖何以獨引此經以證心置之不論不議之列可歎也祇緣此經辭義古奧數傳後幾致絕響三祖信心銘中標此妙心為玄旨真如法界等名以顯之四祖則令人念摩訶般若五祖則兼令人誦金剛般若經六祖聞客誦經至應無所住而生其心遂得開了五祖復徵其初悟祖言下大徹啟曰一切萬法不離自性何期自性本自清淨本不生滅本自具足本無動搖何期自性能生萬法迨後開堂說法第一會便演摩訶般若波羅蜜法曰此須心行不在口念口念心行心口相應本性是佛離性無別佛摩訶是大心量大如空無有邊畔方圓大小青黃嗔喜是非善惡世人妙性本空無有一法可得然莫著空有人空心靜坐百無所思自稱為大即著無記空此一輩人不可與語善知識世界虗空能含依正萬像性空亦如是自性能含萬法是大萬法在諸人性中若一切善惡盡不取不捨亦不染著心如虗空故曰摩訶用即了了分明應用便知一切一切即一一即一切去來自由心體無滯即是一切般若智皆從自性生不從外入名為真性自用一真一切真口雖說空不修此行似人妄稱國王終不可得般若者唐言智慧也一切時處念念不愚常行智慧即般若行一念愚即般若絕一念智即般若生世人口說般若不識真空般若無形相智慧心即是若作如是解即名般若智波羅密唐言到彼岸解義離生滅著境生滅起名此岸離境無生滅名彼岸悟此法者即般若法修此行者是般若行不修即凡一念修行自身等佛凡夫即佛煩惱即菩提前念迷即凡後念悟即佛前念著境即煩惱後念離境即菩提摩訶般若波羅密最尊最上最第一無住無往亦無來三世諸佛從中出當用大智慧打破五蘊煩惱塵勞如此修行定成佛道變三毒為戒定慧我此法門從一般若生八萬四千智慧以人有八萬四千塵勞若無塵勞智慧常現不離自性悟此法者即是無念無憶無著不起誑妄用自真如性以智慧觀照於一切法不取不捨即是見性成佛若欲入甚深法界及般若三昧者須修般若行持般若金剛經即得見性當知此經功德無量經中讚歎莫能具說此法門為最上乘大智上根人說須知本性自有般若智自用智慧常觀照故煩惱塵勞常不能染即是見性善知識內外不住去來自由能除執心通達無礙能修此行與般若經更無差別不悟本性即佛是眾生一念悟時眾生是佛故知萬法盡在自心何不從自心中頓見真如我於忍和尚處一聞便悟頓見本性將此教法流行令學道者頓悟各自觀心見性若自不悟須覓大善知識直示正路若起正真觀照一剎那妄念俱滅識自本性一悟即至佛地善知識智慧觀照內外明徹識自本心若識本心即本解脫即是般若三昧般若三昧即是無念若見一切法心不染者是為無念用即徧一切處亦不著一切處但淨本心使六識出六門於六塵無染來去自由通用無滯即是般若三昧自在解脫名無念行若百不思常令念絕即是法縛邊見悟無念法者萬法盡通見諸佛境界至佛地得此頓法終身不退者定入聖位然須傳授不得匿其正法是知摩訶般若便是初祖的傳妙心且知六祖所受五祖心印盡在此篇發揮罄盡無遺苟能細心體會則摩訶般若一句即是絕好話頭悟後熏修精密便是絕好調習功夫又何必另覓話頭別起爐竈耶然此總在行人之便宜矣又六祖最後開示提唱般若經中一相三昧一行三昧若悟一切處不住相於彼相中不生憎愛取捨不念利益成壞等事安閑恬靜虗融淡泊名一相三昧若一切時行住坐臥純一直心不動道場真成淨土名一行三昧人具二三昧依吾行者決獲菩提證妙果此二三昧出文殊問般若經正是摩訶般若妙心體相正是諸佛所傳無念而常知心體正是楞伽經自覺境界自覺聖智名異而體同也圭峰禪源詮曰若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛畢竟無異依此修者是最上乘禪亦名一行三昧是一切三昧根本若能念念修習自然漸得百千三昧達摩門下相傳者是此禪也法運沿流泯相歸性故總以般若印心六祖而後雖立有五家之綱宗千七百則之葛藤或平實商量或機鋒相見乃至盡未來際拈頌代別徵判上堂小參秉拂普說千岐萬派更無越乎摩訶般若一相三昧之一源矣源乎源乎千山勢到嶽邊止萬派聲歸海上消謂之教外別傳也可謂之離教無禪也可謂之不立文字也可謂之無離文字而說解脫也亦可徹參眾生妙心本無生滅而無始沈沒三界者以未知本體主公安身立命處也知則一念回機便同本得靈光獨耀迥脫根塵體露真常即如如佛是則參究以求了知誠學者第一要矣可祖種種說心性初祖祇遮其非可云已息諸緣初祖復將莫成斷滅勘之而後許證此即究心發悟第一則榜樣然箇中消息悉以言通至禮拜而記得髓則離言而顯機靈用活別行一路矣迨後懺罪竟之印誰縛汝之詰子何姓之問三更入室之談乃至什麼物什麼來之徵祖祖相授多於文字顯示蓋以列祖名振當時當機為道心切一語點睛全身擔荷了無扭揑纖疑其間故不須多番勘驗照用以辯其真偽其旁出諸祖亦祇是臨時言接惟六祖接荷澤為用棒始然指授仍不離言詮也馬祖於問西來意便打則專以棒接而機用之門大闢矣古德云從文字得力者弱從事上得力者強從緣薦取相應疾就體消停得力遲者是也其時禪風大播千里同風知有後廣歷諸方叢席如趙州臨濟輩指不勝屈然門庭既別曲調難齊不無有淺深純雜之異矧夫虗妄浮心多諸巧見口頭弄滑以紫亂朱在學輩既未能刻苦研窮而專唇舌為師者不得不掃除言句而變機鋒全提棒喝塞斷咽喉電閃雷轟命喪真露一點再點鼻痛耳聾三打三拳得牛完馬智過師而野狐一掌斬勘眾而貍奴一刀百千鏡交光正中益正十八徧大悟純兮更純甚至逆流洞水勝祖強爺尊重己靈呵佛罵祖總冀白璧之無瑕不厭黃金之久煅然而利智上士把得便行鈍根阿師茫然莫措於是參尋同轍方便異門圜悟云釋迦最後徑截省要接最上機雖迦葉二十八祖少示機關多顯理致至付授際靡不直面提持如倒剎竿盌水投針達摩破六宗翻轉我天爾狗非擬議思量可測洎到梁魏顯言教外別傳逮曹溪詳示宗通說通具正眼大解脫宗師變革通途俾不滯名相不墮理性言說放出活卓卓地脫灑自由妙機遂見棒喝交馳以言遣言以機奪機以毒攻毒以用破用流傳七百年來枝分派別各顯家風然其歸著無出直指人心心地既明無絲毫隔礙脫去勝負彼我是非知見解會透到大休歇安穩之場豈有二致哉要須箇向上根器具高識遠見深入閫奧徹底信得及把得住始可堪為種草又云老僧熱病死一日黑漫漫地甦醒遂驚生死事發心訪道年許只認得昭昭靈靈向四大身中作箇動用佛法上看即有世法上看即無後白雲老師云你總無見處自此全無咬嚼分後問演祖覓心了不可得話演曰你須自參始得者好處別人為汝著力不得參來參去忽因舉頻呼小玉元無事只要檀郎認得聲如桶底脫柏樹子麻三斤玄沙錯過睦州擔板諸公案一一透過黃龍示草堂清風旛話久不契龍曰子見貓捕鼠乎目睛不瞬四足踞地諸根順向首尾一直擬無不中子誠心無異緣六根自靜百不失一師屏去閑緣歲餘忽悟龍曰得道非難宏道為難宏道猶在己說法為人難既明後在力行之晦堂問南公曰大事本來如此和尚何得教人看話頭為伊搜尋曰若不令汝如此尋究到無用心處自見自肯即埋沒汝也晦堂常舉拳問喚作拳則觸不喚作拳則背喚作甚麼真如院方師參瑯琊惟看柏樹子話此即單研一句話頭一則公案一悟一切悟樣式也傳至大慧杲極力主張參看一箇話頭普說云雲門尋常問學者喚作竹篦則觸不喚作竹篦則背不得下語不得無語畢竟喚作甚麼又恒舉狗子語至無字令學者參云經語祖語諸方老宿語千差萬別若透得過無字一時透過不用卜度不用註解不用要得分曉不得作有無商量不得作真無之無卜度不用向開口處承當不用向舉起處作道理不用墮在空寂處不用將心等悟不用向宗師說處領略不用掉在無事甲裏但行住坐臥時時提撕狗子還有佛性也無無提撕得熟口議心思不及方寸裏七上八落如生鐵橛沒滋味時切莫退志得如此時却是好消息忽然打失布袋不覺撫掌大笑茶裏飯裏喜時怒時淨處穢處妻兒聚頭賓客酬酢公私各處都是第一等好做工夫提撕底時節從此禪流無不參一箇話頭為入門話頭不同以悟為則但激發得疑情起處便是得力話頭麻三斤乾矢橛一歸何處無字誰字父母未生前死了燒了向甚麼處相見無夢無想主人公在甚麼處皆可參得天奇瑞則單令人參誰字以其切於日用如行底是誰坐的是誰語底默底是誰聞見嗅觸一一復各是誰這要悟底又復是誰處處追著念念提撕忽然磕著便爾瞥地近時禪者多以念佛的是誰為話頭由文字而機用由機用而話頭一變再變逗會適時此本是置之一處無事不辦法門此門一開萬古莫易盡未來際當遵行之於中根器難齊受益不等或有宜於全無義味語入手者如麻三斤乾矢橛青州布衫等話頭是也或有宜似帶義路藉以追搜仍無罅隙者如未生前本來面目死了燒了甚麼處相見無夢無想時主公等話頭是也借徑不同成功則一然學人發悟多有未能深入堂奧者故曰絕後再甦欺君不得若未到此田地不道全無終未了徹或以在眼曰見在耳曰聞及只這如今誰動口等語強為據證遇有以法離見聞覺知訶之者反以為移易惑人且至有誤認昭昭靈靈以為是者此斷不可不辨昔溈山問香巖曰聞汝在先師處問一答十父母未生前道一句來而香巖不能答死心勘山谷云死了燒了向甚麼處相見而山谷於此茫然高峰於百年三萬六千日反覆元來是這漢領得拖死屍的及至問無夢想主公蚊子上鐵牛竟無下嘴處是知高峰若不得雪巖追搜焉有枕子徹悟境界殷鑒不遠古今同弊以今時人根論如以奇特等話頭苦於茫無入處又恐落無事甲裏若只以誰字參取又易於水乳不分夾雜昭靈業識不揣鄙見總覺以無夢無想主人公畢竟在甚麼處安身立命一箇話頭著倒最為妥當不至生諸異見以日用全是識情用事略不親切只是有夢有想時明了意識到得睡著明了不行復不作夢直與死人一般所云明了了孤歷歷圓陀陀光閃閃等光影全粘貼不上斷不能認昭昭靈靈亦不敢認此悶絕無知之昏住為是兩頭截定既易起疑參情結秀隻眼迸開自有推門落臼時節故於別則話頭發悟者多不脫盡識情惟未生前面目死了燒了甚麼處相見及無夢想主公話頭透出者必到絕後再甦境界方能徹透向八識上亞一刀然未生前死燒後在世諦尚非現在境猶不及無夢想是現前事仍確與未生燒後無二無別於此覰破便信得未生面目也恁麼安身立命燒後主公也恁麼安身立命更不疑生疑死心貼貼地此外千萬則話頭無不迎刃而解但於古德所傳淆訛公案如入定產難野狐托鉢類及五家綱宗言句間有未能消歸因此等公案或全實相般若或兼文字般若宗旨故耳此在後機鋒綱宗內發明至參究之法須將無夢想話頭先行劃分清楚我醒時時了意識現前流露可仗此明了搪抵到睡著時全體昏悶絕無纖覺竟與世間頑空不殊一毫作不得主我這主公畢竟在甚處安身立命不得向無事甲裏躲根不得認此迷悶的頑空便是不得作血脈不斷所以能覺強為消通不得謂了無氣息却好全體獨露穿鑿不得舉手下喝將醒時知覺運動抵擋不得道這裏誰求相見却正好掃除悟迹為極則既一切不得當此時我這主公畢竟在甚處安身愈無理會愈要搜求豎起脊梁卓起眉毛反覆推尋𢬵此生做箇騃漢工夫緊密刻不放鬆便有打成一片光景或因此豁然入定人法雙忘然參看話頭不貴長時定境但可謂之善境界定起後即便如前抖擻精神迸入話頭以期發悟為了當或因此話頭并歸一念外不知境界內不知身心僅只一箇話頭耿耿孤懸亦不得認此一念為是此因心光逼緊所現非本心也本先師亦云諸人眠熟不知一切若道那時有本來性又不知一切與死無異若道那時無本來性睡眼忽醒覺知如故還會麼不知與死無異眼開覺知如故如是時是箇甚麼若不會各體究取私謂參話頭之弊岐路有二一說道理二認光影如參無夢想公案忽然心中謂要人參究不過令斷妄念別無奇特又謂既無夢想那得主公更以為雖所參在無夢想而實不在此悟之類各各遊思未能悉舉此皆落說道理一邊次則既無夢想誰求相見或謂心本不動則夢與無夢不二或謂夢與無夢皆幻其非幻者是真種種說心說性總是說道理窠臼所收都不知有悟門或當參情緊急忽覺得本心如紅日當空或如孤燈獨照或大彌虗空或密入無間或金光閃爍或闇然空寂或見大地平沈或見佛菩薩像或覺得本心非青黃非大小種種一切影事認為本心豈知皆是認光影邊所收亦復不是悟門非本心也大慧云默照邪禪自不證悟而以悟為建立為接引之詞以悟為落第二頭為枝葉邊事自既不曾有證悟處亦不信他有證悟者一味以空寂頑然無知為威音那畔空劫已前事遇善知識與說本分話反以為非此即說道理認光影之輩絕此二途死抱話頭不使有第二念分岐一切時單提此無夢想主公一句結成疑團打又打不破捨又捨不得正是得力時切勿放鬆改轍這便是吞栗棘蓬跳金剛圈銅牆鐵璧忽然㘞地一聲不覺死中得活慶快平生便能與從上佛祖把手並肩同一鼻孔出氣雪峰毬道吾笏石鞏箭祕魔叉是甚麼閑家具到者裏方說得有夢無夢不二睡時醒時不二未生與已生不二未死與死後不二指東瓜畫葫蘆懸羊頭賣狗肉說鹿為馬證龜成鼈作家相見你坐我立勘驗初機應時及節逆行順行天地莫測可謂我為法王於法自在者矣至參究之期自百丈建叢林來倡設禪堂定香立課積代相承功程加密近時中秋加香十月結制半枝行香半枝坐香至正月半解期謂之結冬圍爐取煅煉義其中堂頭有警䇿有追索有考察首座西堂後堂堂主輪流開示有悟入者入室請益或許或不許許則諸班首各拈言句勘辨不許則令依前再參復因人根淺鈍約分本分重關末後使之層層進入必得三關齊透方為了當立法良密矣鄙意當行香時只須大步經行不必過於催逼大事因緣原應各人痛念人命無常誓取一身了辦若香板過緊安能心念不分反致打失話頭且色力有強弱脚步有大小後面搶前撞肩踏踵甚至顛踣其坐香時遇有昏沈重則令其立參輕則以板點肩亦勿遽以香板重撲恐致心驚血涌犯吐紅症或便中表堂激發其慚愧心為孚總之學人不發勇猛大心雖板如雨點亦無濟耳謹附錄於此乞主法者裁取焉若夫本分重關末後之說大悟有十八徧原未必人人一脚便踏到底然有二三番悟徹者亦有四五六七番始圓悟者更屬無定總以徹透為期似不必概定人法雙忘離念泯絕處為本分體以從體所發一切諸用為重關更以鐵蛇鑽入金剛眼等句不受人惑處為末後此雖慈悲之故略設階級然終當以開首話頭使之透頂透底契證否則逼令再參勿輕許可遂至有顢頇儱侗支離穿鑿之流弊可也此是煅煉學人入手要事乞來哲斟酌之至悟後每有悟迹未圓或於五根了徹而意根邊猶是未清便覺無念則是動念即乖或上禪牀則契接事便不相應或心中明了一語莫吐種種諸病久久淘汰自能純熟合軌所謂祇愁不作佛莫愁佛不解語是也昔兜率悅通所見於清素素曰可以入佛不可入魔不見道末後一句始到牢關累日乃印可戒曰洞山文示子者皆正知見子離太早不盡其妙今點破使子得大自在兜率悅謂張無盡曰東林既印可運使有少疑否曰疑德山托鉢語悅曰於此疑餘安得無疑只如巖頭末後句有耶無耶張曰有悅笑歸方丈閉門公一夜不穩五更下牀觸翻溺器大徹叩門曰捉得賊了悅曰贓在甚處公無語悅曰都運且去來日相見悅乃謂曰參禪只謂命根不斷依語生解如是之說公已深悟然至極微細處不覺不知墮在區宇作頌證之後張無盡得龍安悅末後句語謂洪覺範曰可惜雲庵洞山文不知此事欲為點破及敘悅末後句未卒此老大怒罵曰此吐血禿丁脫空妄語不得信既見其盛怒更不欲敘之洪笑曰相公但認龍安口傳末後句真藥現前不能辨也公曰老師果有此意耶洪曰疑則別參公取所藏雲庵相贊之佛心才參靈源每揮淚曰此事我見甚分明只是臨機吐不出源告以須是大徹方自在未幾覩僧讀藥山採薪歸僧指刀曰鳴剝剝是箇甚麼山拔刀作砍勢師欣然摑僧一掌衝口曰徹徹大海乾枯虗空迸裂四方八面絕遮攔萬象森羅齊漏洩此等諸人均有所見祇以未得悟透故有所滯然悟得無夢想主公後前云淆訛公案及五家綱宗或未盡了者祇須提起所悟本分逐一朗照心源細細尋研不經久間自能一一融歸自己其有文字不長者當請益通文知識點示亦得薦取夫然後古人陳爛葛藤莫不一線穿却了無疑礙提撕來學不致添人枷鎖雖刻苦尋求參數十年話頭始得者與乍經一句言下相應明了者悟境無二然既有話頭一門後學必當於此入路話頭起得疑情者雖皆可參然當以無夢想主公一則入手究取為盡善如人飲水冷煖自知未曾飲者只認著有夢想時識性不經明眼一劄曾為浪子偏憐客刺刺不休或有鑒我愚忱者乎蓋無夢想主公既得薦取其餘公案更無疑惑透不過者至於悟後行住坐臥只須就本分上涵濡漸摩其淆訛諸公案性宗諸經教自能一一時復契合更不得別尋法門惟遇諸善知識須要虗心落草盤桓不得強作解人不受人煅煉得少為足再廣參當今老寂尚論古人淘汰盡絕了無遺憾是之謂徹參調習悟門了當徹見聖凡不二迷悟不二生死涅槃不二有情無情不二盡虗空徧法界十方三世諸佛於此安住盡虗空徧法界三乘六道乃至細大蠢動含靈於此安住我自無始輪迴至盡未來際生生死死亦於此安住不特有情於此安住即十方三世微塵國土無情依報億兆品類亦莫不於此安住天然具足更無剩欠尚有何事不了須修造修補畫蛇添足耶中峰云住地無明即是諸佛不動智我不知習氣為何物乃欲以佛知見治之良以眾生無始既全圓覺成無明今日開悟便全無明成圓覺覰到本地風光誠然如是然在天台教中謂之素身佛判六即中祇是理即佛全無莊嚴天龍之所忽劣縱令開悟亦但是名字即佛正須由名字而觀行而相似而分證上至究竟斯為到家至禪門中極重此理即一念印契立地成佛然眾生無始結習輕重不等應須消盡楞嚴經云理則頓悟乘悟并消事須漸除因次第盡悟心後當知有調習法也初祖九年面壁詔人以行解相應又云不覩惡生嫌不觀善勤措不捨智就愚不拋迷就悟此皆調習之說二祖混迹酒肆屠門曰我自調心何關汝事三祖曰不用求真惟須息見心若不異萬法一如宗非延促一念萬年牛頭融問四祖既不許作觀境起時如何對治祖云境緣無好醜好醜起於心心若不強名妄情從何起妄情既不起真心任徧知汝但隨心自在無復對待即名常住法身無有變易六祖曰迷時師度悟時自度只合自性自度又答荷澤聽法頓中漸悟法漸中頓修行頓中漸證果漸中頓圭峰答蕭相公頓則萬行多方焉能一時圓滿語云真理即悟而頓圓妄情息之而漸盡頓圓如初生孩子一日肢體已全漸修如長養成人多年志氣方立又答其若悟即同諸佛何不發神通光明之問云識冰是水藉陽氣以消鎔悟凡即真資法力而修習冰消則水流潤方呈溉滌之功妄盡則心靈通始發通光之應修心外無別行門傅大士云欲得早成戒心自律心性雖空貪瞋體實莫言心王空無體性心性雖空能凡能聖是故相勸好自防慎剎那造作還自漂沈南岳讓云修證則不無馬祖云汝等各信自心是佛達摩來此引楞伽佛語心為宗無門為法門印眾生心地夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故三界惟心森羅萬象一法所印凡所見色皆是見心心不自心因色故有於心所生即名為色知色空故生即不生了此乃可隨時著衣吃飯長養聖胎任運過時問如何修道師曰道不屬修若言修道修成還壞即同聲聞若言不修即同凡夫了得自性本來具足但善惡事上不滯喚作修取善捨惡觀空入定即屬造作若向外馳求轉疏轉遠但盡三界心量一念妄想即是三界生死根但無一念即除生死根即得法王無上珍寶前中後念念念不相待念念寂滅喚作海印三昧聲聞不知聖心本無因果階級心量妄想修因證果雖悟却迷若上根領會更不歷階級地位頓悟本性對迷說悟本既無迷悟亦不立眾生無量劫常在法性三昧中著衣吃飯言談六根運用盡是法性不解返源逐相造種種業若能一念返照全體聖心所以道不用修但莫汙染有生死心造作趣向皆汙染若欲直會平常心是道無造作取捨是非斷常凡聖經云非凡夫行非聖賢行是菩薩行只今行住坐臥盡是道即法界建立亦得掃蕩亦得盡是妙用非離真有立處立處即真一切法皆佛法諸法即是解脫行住坐臥悉不思議用不盡有為不住無為有為是無為用無為是有為依不住於依故曰如空無所依迷為識悟為智悟自本性一悟永悟如日出不與暗合了心境界妄想即除即是無生法性法性本有有不假修禪不屬坐坐即有著若見此理真正合道隨緣度日坐起相隨戒行增熏積於淨業但能如是何慮不通百丈云汝等先歇諸緣休息萬事善惡世出世一切法莫記憶緣念放捨身心令自在心如木石無分別心空無所行慧日自現如雲開日出相似但歇一切攀緣貪瞋垢淨情盡對五欲八風不動不被見聞覺知惑自然具足神通妙用是解脫人問對境如何得心如木石去師曰諸法本不自言空言色亦不言是非垢淨亦無心繫縛人但人自虗妄計著作若干解會愛畏但了諸法不自生皆從己一念妄想顛倒取相而有知心與境本不相到當處解脫一一寂滅當處道場又本性不可名目本不是凡聖垢淨空有善惡若垢淨心盡不住繫縛不住解脫無一切有為無為縛脫心量處於生死其心自在畢竟不與諸虗妄幻塵蘊界生死諸入和合迥然無寄一切不拘往來生死如門開相似人遇種種稱意不稱意事心無退屈不貪名聞功德利養不為世法滯礙苦樂平懷衣食活命兀兀如愚稍有相應分若廣學知解求福智皆生死却被知解境風漂溺生死海裏佛是無求人理是無求理求之即乖若著無求無為復同有求有為若能一生心如木石不被五欲八風所漂即生死因斷去住自由不為一切有為因果所縛有漏所拘他時還以無因縛為因同事利益以無著心應一切物以無礙慧解一切縛努力猛究取莫待老苦整手脚不得但隨貪愛重處業識所引受生都無自由分問如何得自由分師曰如今得即得對五欲八風不動情無取捨慳嫉貪愛我所情盡垢淨俱亡如日月在空不緣而照心心如木石念念如救頭然亦如香象渡河截流而過更無疑滯此人天堂地獄所不能攝夫讀經教語言皆須消歸自己但一切言教祇明如今鑒覺自性但不被有無諸境縛是汝導師能照破有無境是金剛慧即有自由獨立分但離一切聲色亦離於離亦不住於知解是修行三乘教皆治貪瞋等病今若有貪嗔等先須治之不用求覓義句知解知解屬貪貪變成病今但離有無諸法亦離於離透過三句外自然與佛無差既是佛何愁佛不解語只恐被有無縛不自由以理未立先有福智被福智載去如賤使貴不如先立理若要福智臨時作得常歎今所依命不食飢死無水渴死欠一日不生欠一日不死被四大把定不如先達者入火不燒入水不溺要燒溺便燒溺要生即生要死即死去住有自由分如今心如虗空學始有成達摩云心心如木石三祖云兀爾忘緣曹谿云善惡都莫思量馬祖云如迷人不辨方所肇公云閉智塞聰獨覺冥冥文殊云心如虗空故敬禮無所觀甚深脩多羅不聞不受持今但有無諸法都不見聞六根杜塞能與麼學方有修行分這箇語苦口逆耳與麼作得至第二三生能向無佛處坐大道場成等正覺又云如人見火但莫手觸火不燒人祇如今無十句濁心貪心愛心染心瞋心執心住心依心著心取心戀心但是一句各有三句箇箇透過三句但是一切照用任聽縱橫一切舉動語默啼笑盡佛慧於一一境不惑不亂不瞋不喜六根門頭刮削併當得淨是無事人三句者不住貪染亦不依住不貪染亦無不依住知解是名般若黃檗運云佛與眾生唯是一心更無別法此心無始不曾生滅無形相不屬有無新舊非長短大小超過一切限量名言蹤跡對待當體便是如空無邊際不可測惟此心是佛眾生著相外求使佛覓佛終不能得不知息念忘塵佛自現前此心眾生不減佛不添六度萬行恒沙功德本自具足遇緣即施緣息即寂不信此是佛著相修行皆妄想與道乖此心明淨如空無一點相貌動念即乖法體著相無始無著相佛修六度萬行即次第無始無次第佛但悟一心更無少法可得此即真佛如虗空日升不曾明日沒不曾暗明暗相奪空性不變今不悟此心體著相修行皆惡法供養十方佛不如供一無心道人無心者無一切心也如如之體內如木石不動搖外如虗空不塞礙無能所相貌得失方所趨者不敢入此法恐落空無棲泊處望崖而退恒河沙者珍寶馨香沙不貪糞尿臭穢沙不惡此即無心之心離一切相生佛更無差別但能無心便是究竟若不直下無心累劫不成道被三乘功行拘繫不解脫然證有遲疾有聞法一念便得無心者有至十地乃得無心者長短得無心乃住更無可修可證實無所得一念得與十地得功用恰齊只歷劫枉辛勤耳祖師西來直指汝心本來是佛心心不異名祖見此頓超三乘諸位問現有種種妄想何以言無曰妄本無體是汝心起若識心是佛心本無妄那得起心更認妄若不動念自然無妄曰妄起時佛在何處曰覺正是佛若無妄覺亦無問今悟時佛在何處曰問從何來覺從何起語默動靜聲色盡是佛事不可更頭上安頭但莫生異念山水僧俗天地總不出汝心問若如此何處是菩提曰菩提無是處佛不得眾生亦不失菩提但一切眾生即菩提相問云何發菩提心曰菩提無所得汝聞發菩提心將謂學取佛去任三祇修亦只得報化與本源真性佛何涉外求有相佛與汝不相似此本源清淨心生佛世界有相無相平等圓明徧照世人不悟只認見聞覺知為心為見覺覆不覩本體但直下無心本體自現然本心不屬見聞覺知亦不離見等但莫於見等上起解亦莫於見等上動念亦莫離見等覓心亦莫捨見等取法不取不著縱橫自在無非道場心境雙忘乃是真法忘境猶易忘心至難人不敢忘心恐落空無撈摸處不知空本無空只是一真法界問佛空得無明否曰無明是諸佛得道處所以緣起是道場道場者無所得也問無明者為明為暗曰非明非暗明暗是代謝法無明且不明且不暗不明不暗祇自本明人但欲向明不欲向暗不愛無明煩惱分明道佛且不明眾生不暗法無明暗故沙門果者從息慮成不從學得古人心利纔聞一言便乃絕學所以喚作絕學無為閑道人今只欲多知解翻成壅塞但消融表裏情盡都無依執是無事人我宗門但知息心便休汝但除却凡情聖境心外更無別佛祖師直指人全體是佛汝今不識執凡聖向外馳求還自迷心百種多知不如無求最第一也道人是無事人無事亦無但無一切心即名無漏每日行住語言但莫著有為法出言瞬目盡同無漏如今禪者皆著一切聲色何不心同虗空去如枯木石頭寒灰死火去方少分應但離有無諸法心如日輪在空光明自然不照而照不是省力底事到此無棲泊處即是行諸佛路便是無所住而生心此是你清淨法身名阿耨菩提古人道爭似無為實相門一超直入如來地若不會此縱學得多知勤苦草衣木食不識自心盡名邪行今但學無心久須實得為你力量小不能頓超但三五十年得箇入處自然會去法身從古至今與佛祖一般何處欠少既會是意努力盡今生去出息不保入息告裴相云即心是佛無心是道問聖無心是佛凡無心莫沈空否師云法無凡聖亦無空寂法本不有莫作無見法本不無莫作有見有無情盡宗門中只論息機忘見問心既是佛更修六度萬行否師云悟在於心非關六度萬行諸度門中佛心第一但無生死煩惱等心即不用菩提等法所以道佛說一切法為度一切心我無一切心何用一切法此意難信達磨來只可師一人密信自心是佛身心俱無是名大道實無一法可得名坐道場道場者只是不起諸見問何者是精進師云身心不起是名第一強牢精進云如何是出三界師云善惡都莫思量當處便出三界今但無中棲泊即是行諸佛路眾生輪迴不息者意緣走作心於六道不停致受種種苦今但無心頓息諸緣但除人我憎愛勝負多種妄想性自本來清淨即是修菩提法佛等心如頑石無縫罅一切法透不入兀然無著始少分應即此身心是自由人達摩面壁都不令人有見處只論忘機則佛道隆分別即魔軍熾問若無心行此道得否曰無心便是行此道說甚得不得且如瞥起一念便是境若無一念便是境忘心自滅無復可追尋問如何得不落階級師云終日吃飯未曾咬著一粒米終日行路未曾踏著一片地與麼時無人我等相終日不離一切事不被諸境惑名自在人念念不見一切相安然端坐任運不拘名解脫努力努力此門千萬人只得三五箇若不將為事受殃有日在故曰著力今生須了却莫教累劫受餘殃臨濟云學者要求真正知見若得正見生死不染去住自由不要求殊勝殊勝自至山僧指示人只要你不受惑要用便用更莫遲疑如今病在不自信被萬境回換不自由若歇得念念馳求心便與佛祖不別欲識佛祖麼只你面前聽法底是人信不及便向外求約山僧見處與佛祖不別今多般用處欠甚麼一道神光未曾間歇如是見得祇是一生無事人你要與佛祖不別但莫外求你一念心上清淨光是法身佛一念心上無分別光是報身佛一念心上無差別光是化身佛此三種佛即今目前聽法底祇為不向外求有此功用你四大色身不解說法聽法虗空不解說法聽法是你目前歷歷底一箇形段孤明是這箇解說法聽法如是見得便與佛祖不別但一切時更莫間斷觸目皆是只為情生智隔想變體殊所以輪迴受種種苦道流心法無形通貫十方在眼曰見在耳曰聞本是一精明分為六和合一心既無隨處解脫只為馳求心不歇上他古人閑機境若真道人但隨緣消舊業要行即行坐即坐無一念希求佛果古云若欲作業求佛佛是生死大兆你但隨處作主立處即真境來回換不得縱有五無間業皆解脫大海你欲得生死去住自由即今識取聽法的人無形相無根本無住處活潑潑地應是萬種施設用處祇是無處所號之為祕密問如何是四種無相境師云一念心疑被地礙一念愛被水溺一念嗔被火燒一念喜被風飄若不被境轉處處用境達四大如夢幻只你聽法者不是四大能用四大如是見得便乃去住自由佛六通者入色聲香味觸法六界不被惑皆是空相不能繫縛此無依道人雖是五蘊陋質便是地行神通佛現不喜地獄現不怖見諸法空相變即有不變即無三界惟心夢幻空花何勞把捉唯聽法底人入火不燒入水不溺入地獄如遊園觀入餓鬼蓄生而不受報緣何如此無可嫌底法你若愛聖憎凡生死海裏沈浮不如休歇無事去已起者莫續未來者不要放起一念心歇喚作菩提樹若念念歇不得便上他無明樹入六道披毛帶角去你若歇得便是清淨身界三界神通變化意生身大珠云心為根本問根本以何法修師云坐禪禪定即得忘念不生為禪坐見本性為定本性者是你無生心坐者對境無心八風不能動得如是定者雖是凡夫即入佛位此頓悟門無念為宗妄心不起為旨以清淨為體以智為用無念者無邪念非無正念念有無善惡苦樂冤親愛憎皆邪念不念一切惟念菩提名正念菩提不可得菩提無所念無所念者即一切處無心是無所念得無念時自然解脫知二性空即是解脫不空不得解脫名為智二性空即體知二性空解脫名用二性空者不生有無愛憎等也若自了了無心不住一切處者即名了了見本性這不住一切處心者即佛心亦名無生心經云證無生法忍是也未得如是時努力用功功成自會一切處無心即是會但無愛憎心即二性空自然解脫問如何是常不離佛答心無起滅對境寂然一切時畢竟空寂即常不離佛得如是見是為涅槃證無生法忍亦名不二法門亦名一行三昧何故不受愛憎是二性空是無所見即是真如無得之理如論究竟解脫理者只是事來不受一切處無心永寂如空畢竟清淨自然解脫一失人身萬劫難復努力努力又真如之性亦空亦不空以真如妙體無形相不可得名空然空無體相中具足恒沙之用即無事不應名亦不空如此功業由行為本若不降心而入取證無是處外不染聲等內不起妄念名證不作證想名無證亦不作無證想名無無證是名畢竟證僧問南陽忠曰如何用心即得成佛曰無心可用即成佛問無心誰成佛曰無心自成佛成佛亦無心問人持刀取命是有是無曰是無痛否曰痛亦無問死後生何道曰無死無生亦無道問既得無物自在飢寒所逼若為用心曰飢即食寒即衣問知飢寒應有心師曰汝心作何體段答無體段師云既無體段即本來無心何得言有問逢見虎狼如何用心曰見如不見來如不來彼即無心惡獸不能加害問獨脫無心名何物曰喚作無形段金剛大士問有何功德曰一念與金剛相應能滅殑伽沙劫生死重罪得見殑伽沙諸佛其金剛大士功德無量殑伽沙說不盡問如何一念相應曰憶智俱忘即相應問憶智忘誰見諸佛曰忘即無無即佛問無何得喚作佛曰無亦空佛亦空故曰無即佛問既無纖毫可得名為何物還有相似者否曰本無名字無相似者世號無比獨尊努力依此修無能破壞者獨脫無畏常有恒沙聖賢所護河沙天龍八部所敬河沙善神來護永無障礙何處不得逍遙問若為得成佛去曰佛與眾生一時放却當處解脫問作麼得相應曰善惡不思自見佛性問心有煩惱否曰煩惱性自離問即心是佛可更修萬行否曰諸佛皆具二嚴豈撥無因果耶南泉曰真理一如潛行密用無人覺知呼為無滲智亦云無滲不可思議等空不動性非生死流妙用自足始與一切行處得自在故曰於諸行處無所而行亦云徧行三昧普現色身用處無蹤跡不屬見聞覺知真理自通妙用自足大道無形真理無對所以不屬見聞覺知如云不聞聞是大涅槃道只箇物不是聞不聞問不屬見聞如何契會曰須會冥契自通亦曰了因非從見聞覺知有見知屬緣對物始有者箇靈妙不可思議不是有對故云妙用自通不依傍物所以道通不是依通事須假物方得見所以道非明暗法離有無潛理幽通無人覺知亦云冥會真理非見聞覺知故云息心達本源故號如如佛畢竟無依自在人亦云本果不從生因所生唯從了因所了從上以來祇教人會道更無別求若思量作得道理盡屬句義三乘五性義理無不喚作行履處處受用具足即得若論道即不是一向耽著被他識拘亦云貪欲成性所以云佛不會道我自有修行亦云正因了六波羅密空即物拘我不得祖師恐人迷著因果地位故來傳法度迷江西老宿云不是心不是佛不是物先雖說即心即佛黃葉止啼之說如今多有喚心依佛智為道是聞覺知俱是道迷頭認影設認得亦不是本來頭寧作心師不師於心見聞覺知皆因緣照物而有不可常照所以心智俱不是道且大道非明暗法離有無數數不能及如空劫時無佛名無眾生名與麼時正是道只是無人覺知他數不及他喚作無名大道早屬名句了也所以真理一如更無思想纔有思想即被陰拘便有眾生及佛名佛出世喚三界智人未出世時喚作甚麼佛只令人會道體非凡聖喚作還源返本體解大道無量劫六道去來眾生為無了因故生貪欲名為在纏不得自在暫時岐路今既如是會却向裏許行履不同前時為了因會本果故了陰界空六波羅密空所以得其自在若不向裏許行履如何摧挫得五種貪二種欲佛菩薩具福智二嚴為了因了六波羅密空體者箇受用所以不存知見始得自在若有知見即屬地位便有分劑心量喚作酬因答果佛不得自在今行六波羅密先用了因會本果故了此是方便受用始得自由去住自在無障礙亦云方便勤莊嚴亦云微妙淨法身只是不許分劑心量若無如是心一切行處乃至彈指合掌皆是正因萬行皆同無作始得自在所以魔外求我不得喚作無住心亦云無滲智不思議妙用自在故云性海不是覺海覺海涉緣即須對物他便妙如今更別求建立義句覓勝負知解語言言有佛救眾生求佛菩提皆貪欲破戒與道懸隔且法身無為不墮諸數法無動搖不依六塵經云佛性是常心是無常所以智不是道心不是佛今且莫喚心作佛莫作見聞覺知會者箇物本無許多名字妙用自通數量管他不得是大解脫所以道人心無住處蹤跡不可尋故云無滲智不思議智又云心如枯木始有少分應向那邊會了却來這邊行履不證凡聖等位實無少法可得但是有因有果盡屬無常生滅但會取無量劫來性不變異即是修行妙用而不住便是菩薩行達諸法空妙用自在色身三昧熾然行六波羅密空處處無礙處地獄如遊園觀不可道伊不得作用眾生無量劫不自了體著於惡欲不得自在受種種苦不自覺知及至今日會取從來性與今日不別無受師曰學般若菩薩如冰稜上行臨終一毫凡聖情量纖塵思念不盡隨念受生向驢胎馬腹托質泥犁鑊湯煑煠從前記持見解智慧都盧失却依前為螻蟻雖是善因而遭惡果且圖箇甚麼只為貪欲成性二十五有向脚跟下繫著無成辦期祖師惟傳心印得者即不檢凡聖愚智直下便爾歇去頓息萬緣越生死流設有眷屬莊嚴不求自得一聞千悟得大總持倘不如是祖師來此土非常有損益有益者百千中撈漉一箇半箇堪為法器有損者如前明從他依三乘教修行却得三賢四果有進修分所以云了即業障本來空未了還須償宿債馬祖問石鞏曰作麼生牧牛答一回入草去驀鼻拽將回曰子真牧牛長慶安問百丈何者是佛丈曰大似騎牛覓牛問識得後如何丈曰如人騎牛至家曰始終如何保任丈曰如牧牛人執杖視之不令犯苗稼安後云三十年只看一頭水牯牛若落路入草便把鼻孔拽轉纔犯苗稼便鞭撻調伏既久可憐生受人言語如今變作露地白牛常在面前終日露迥迥地趁亦不去汝各有大寶從眼門放光照山河大地耳門放光領一切音響如是六門晝夜常放光明名放光三昧自不識取石頭垂語云言語動用沒交涉藥山曰非言語動用亦沒交涉頭曰我這裏針劄不入藥山曰我這裏如石上栽花頭然之藥山曰祖師祇教保護若貪瞋起切須防禦莫教掁觝是你欲知枯木石頭却須擔荷實無枝葉可得然不得絕却語言我今為汝說這箇語顯無語底他那箇本來無耳目等貌丹霞云汝須保護一靈之物不是你造作名邈得更說甚薦不薦吾見石頭只教切須自保護此事不是你談話得各有一坐具地更疑甚麼你須自看善巧方便慈悲喜捨不從外得不著方寸善巧是文殊方便是普賢你更擬趁逐甚麼我此間無道可修無法可證一飲一各各有分不用疑慮若識得釋迦老凡夫是龐公臨終告于相曰但願空諸所有慎勿實諸所無惟宣師曰凡夫無明二乘執著離此病是曰真修不得勤不得忘勤即近執著忘即落無明此為心要趙州云你被十二時使老僧使得十二時無事衣鉢下究理好老僧行脚時除二時粥飯是雜用心此外更無別用心處不如是大遠在溈山祐曰道人之心無背無向亦不閉眼塞耳但情不附物即得問頓悟人更修否曰若真悟他自知時修不修是兩頭語今初心雖悟猶有曠劫習氣未頓淨須教渠淨除現業流識即修也不可別有法教修行趣向從聞入理聞理深妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得座披衣自作活計始得以要言之則實際理地不受一塵萬行門中不捨一法若單刀直入則凡聖情盡體露真常理事不二即如如佛德山曰汝但無事於心無心於事則虗而靈空而妙若毛端言之皆自欺何故毫釐繫念三途業因瞥爾情生萬劫羈鎖聖凡名號總空名殊相劣形皆幻色求之固累厭之又成患只要一切時莫用他聲色應是從前行履處一時放却頓脫羈鎖一念不生即前後際斷無一法可當情仰山問如何是真佛行處溈山曰以思無思之妙反思靈𦦨之無窮思盡還源性相常住事理不二即如如佛僧問洞山价教人行鳥道如何曰不逢一人直須足下無私去直須心心不觸物步步無處所常無間斷始相應雲巖寶鏡云臣奉於君子順於父不順非孝不奉非輔潛行密用如愚若魯但能相續名主中主僧問還有不病者麼洞山曰有問不病者還看和尚麼曰老僧看他有分看時不見有病曹山辭洞問子向甚處去曰不變易處去問不變易處豈有去耶曹曰去亦不變易曹山云若承當處分明即轉諸聖向己背後方得自由一切麤重境來皆作得主不論天堂地獄餓鬼畜生但是一切處不移易元是舊時人只不行舊時路若有忻心還成滯著若脫得揀甚麼今人愛淨潔路此病最難治世間麤重事却輕淨潔病最重只如佛味祖味盡為滯著先師云擬心是犯戒得味是破齋佛味祖味纔有心便犯若無為無事淨潔此乃重無以加也祖師出世只為這箇黧奴白牯修行却快馳覓佛祖菩提涅槃幾時休歇成辦乎皆是生滅心不如黧奴與白牯兀兀無知但飢吃草渴飲水若能恁麼不愁不成辦不見道計較不成是以知有乃能披毛戴角始較些子人人有坐具地佛侵他不得恁麼體會修行饒令成佛作祖也只這是便墮三塗地獄也只這是須與他作主始得若作得主即是不變易作不得便變易也問如何免得曰知有即得用免作麼但是菩提涅槃煩惱無明等總不要免世間麤重事但知有即得不要免免即同變易去也乃至成祖成佛菩提涅槃此等殃禍為不小因甚如此只為變易若不變易只須觸處自由始得雲居膺云直似一息不來底人方與那箇相應有少許說話行履分暫時不在如同死人如人常在愁甚麼事不辦欲知久遠只在如今如歸家到即是直得頂上光𦦨生亦不是有一毫去不盡即被塵累況更多僧問龍牙古人得箇恁麼便休去曰如賊入空室問十二時中如何著力曰如無手人欲行拳始得玄沙備云還識大悟麼虗空猶從迷妄幻生何處有三界業今道無尚誑語豈況是有知麼無門解脫之門無意道人之意動起生死本靜墮昏沈鄉動靜雙泯即落空亡動靜雙收顢頇佛性必須對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝十方無影像三界絕行蹤不墮往來機不住中間意一段光明未曾昏昧體寂寂常的的不動搖朗然照法爾天真不同修證祇要虗閑不昧作用箇中纖毫不盡即魔眷屬直饒似秋潭月影靜夜鐘聲隨扣無虧觸波不散猶是生死岸頭事道人行處如火銷冰終不却成冰步步履空智識不能到動即失宗覺即迷旨語路心行處絕若與麼現前更疑何事沒棲泊處離去來今本來真淨動用更無欠少不悟箇理妄涉塵事染著縱悟則塵境紛紜便擬斂念破除遏捺即落空外道這裏本絕塵境無位次悟則縱橫不離本際凡聖也無立處動靜揚眉是真解脫塵劫事都在目前時人不遇良朋不辨邪正古德云情存聖量猶落法塵己見未忘還同滲漏不可持齋持戒觀空入定便當去外道八萬劫定不免輪迴蓋生死根不破出家兒真實明達便同諸佛寂照忘知虗含萬像放捨閑緣歇却心識方少許相親不如是盡被識情帶去有甚自由分如今却不如無情木石說法非常真實只是少人能聽具這箇真實發明便向六道中同於諸佛淨土更懼何生死此一門超凡聖因果毗盧妙莊嚴世界海超他釋迦方便門直下永劫不教有一物與汝作眼見不可由汝用功莊嚴得蓋為識得即大出脫大徹頭人莫祇長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空到精明湛不搖處不出識陰喚作如急流水妄為恬靜盡出輪迴不得何似博地凡夫不用一毫功夫便超去肯麼人如海中坐向人乞水若根鈍直須日夜忘疲盡一生去更得人荷挾刻骨究實不妨易得有一般說昭昭靈靈能見能聞大賺人今問為甚睡時又不昭靈認賊為子是生死根本妄想緣氣只因前塵色聲等法分別有若無前塵汝此昭靈同於兔角仁者但識取汝祕密金剛體山河大地十方國土色空明暗及汝身心乃至諸佛成道利生莫非皆承汝圓成威光所現汝有如是奇特當陽出身處何不發明今若不了後入驢胎燒煑去此煩惱業不是一兩劫便休直與汝金剛齊壽又云諸人見有險惡大虫刀劍諸事逼汝身命生無限怖如畫師自畫地獄看了却生怖不是別人與汝為過欲覺此幻惑麼但識取汝金剛眼睛若識得不教有纖塵得露現何處更有虎狼刀劍解愶嚇汝直至釋迦如此伎倆亦覓出頭處不得所以道沙門眼把定世界不漏絲髮何處更有一物為汝知見何不急究取雲門偃云向你道直下無事早埋沒也更欲尋言覓解去道轉遠故知一切有心天地懸隔然得的人道火何曾燒口終日著衣吃飯未曾觸著一粒米挂一縷絲此猶是門庭之說須實得恁麼始得大靜云心念紛飛却將紛飛心究紛飛處究之無處則紛飛之念何存反究究心則能究之心安在又能照智本空所緣境亦寂寂而非寂者蓋無知寂之人照而非照者蓋無所照之境境智俱寂一性怡然乃還源要道行崇曰欲得相應即如今立地便證根思遲鈍日夜究將去忽然覰見更莫以少為足便能究竟乃至淫坊酒肆觸淨好惡以汝所見覰教盡是此境界方得圓修翻擲自由慧忠云眾生不能解脫者情累耳悟道易明道難但脫情見其道自明明之言信也如禁蛇人信其呪力藥力以蛇綰弄揣懷袖中無難未知呪藥者怖駭棄去但諦見自心情見便破今千萬疑不得用者是未見自心者也園頭問梁山家賊難防時如何曰貶向無生國裏曰莫是他安身立命處麼曰死水不藏龍問如何是活水裏龍曰興波不作浪問忽然傾湫倒嶽來時如何梁山走下把住云闍黎莫教打失老僧袈裟角神鼎舉洞山曰貪瞋癡太無知賴我今朝識得伊行便打坐便鎚分付心王仔細推無量劫來不解脫問汝三人知不知神鼎不然貪瞋癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知法眼益曰見道為眼明道為功便能得大智慧力若未得如此三界可愛底事儘教去盡纔有纖毫還未可慈明歌曰牧牛童實快活跣足披衣雙角闊橫眠牛上向天歌人問如何牛未渴回首看家田闊四方放去休攔遏八面無拘任意游要收只在索頭撥小牛兒順摩捋角力未完難提掇且從放在小平坡慮上高峰四蹄脫日已高休吃草揑定鼻頭無少老一時牽向圈中眠和泥看伊東西倒笑呵呵好不好又將橫笛順風吹震動五湖山海島倒騎牛脫布襖知音休向途中討若問牧童何處居鞭指東西無一所奉先引古云聰明不敵生死乾慧豈免輪迴道齊述達摩云楞伽可以印心經曰諸法無法體而說惟是心不見於自心而起於分別可謂大慈悲父如實極談我輩自不領受問見息遂斷分別乎師曰非然也如調馬馬自見其影而不驚以知影從自生出故以是知不斷分別亦捨心相也只今目前如實而觀不見纖毫問鐘鼓本無聲如何信師曰如彼聲無有作者無有住處畢竟空故誑凡夫耳若鼓聲實有鐘聲俱擊應不相參所以玄沙道鐘鼓不交參句句無前後若不當體寂滅如何得句句無前後耶蔣山元答王平甫云佛祖無異於人所異者能自護念耳滔天之水源於濫觴清淨心中無故動念危乎甚於滔天其可動耶佛祖付授必叮嚀曰善自護持問佛法止此乎師云至言不煩顧力行如何耳客來無貴賤寒溫外無別語即斂目入定廚庫火師啜啖自若食畢無所問師出狂人入寺殺一僧即自剄尸相枕走報交武師歸過尸處未甞視登寢危坐職事側立冀處分師斂目竟不得請去芙蓉楷曰出家者求脫生死休心息念斷絕攀緣遇聲色如石上栽花見利名如眼中著屑無始來此等不是不曾經歷何須苦苦貪戀如今不歇更待何時能盡今時更有何事若得心中無事佛祖猶是冤家一切世事自然冷淡方始那邊相應不見隱山至死不肯見人石霜置枯木堂與人坐臥只要死了你心投子使人辦米同煑共饗要得省取你事諸宿若無長處如何忍得真淨文云今人多是得箇身心寂滅前後際斷一念萬年去休去歇去古廟香爐冷湫湫地去便究竟殊不知却被此勝妙境障蔽正知見不現前神通光明不發露或執平常心是道為極則天是天地是地大盡三十小盡廿九此依草附木不知不覺一向迷將去問我手何似佛手便道和尚手我脚何似驢脚便道和尚脚上座生緣便道某州人莫錯會須要平常一路為穩當更不敢別移一步不見臨濟道我這裏是活祖師意把來便用立處即真他不說這語得那語不得此蓋眼不開百般忌諱直饒與麼說當下忽然見得分明也是棺材裏瞪眼又云佛法至妙無二但未至妙則互有長短苟至於妙則悟心人如實知自心究竟本來成佛如實自在安樂如實解脫清淨而日用惟用自心自心變化把得便用莫問是非擬心思量不是也不擬心一一天真自在一一如蓮花不著水所以迷自心作凡悟自心成佛今多不信自心不悟自心不得自心明妙受用安樂解脫心外妄有禪道妄立奇特妄生取捨縱修行多落外道二乘禪寂斷見境界行偉師坐忘夜旦謝絕交游曰道業未辦歲月如流大根器如雲門趙州猶云我惟粥飯二時是雜用心又云我豈有工夫閑處用矧行偉日劫相倍者詎暇清談乎死心新示末後句偈曰末後一句子直須心路絕六根門既空萬法無生滅於此徹其源不須求解脫平生愛罵人只為長快活靈源清云學者未脫生死病在偷心未死耳古者言下脫生死效在偷心已死然非學者自能爾實師家鉗鎚妙密也如梁武見侯景不動聲色而景之心枯竭無餘洪覺範引宗鏡錄云雖然業即是心既從心生還從心受如何治其業報原答但了無作自然業空所以云若無作惡業一生成佛又曰雖有作業而無作者即是祕密之教又凡作業悉皆自心橫計外法還自對治妄取成業若了心不取境境不自生無法牽懷云何成業師釋曰炷香供佛心知獲福操刀殺戮心知入獄或殺或供一手之功云何業報罪福不同皆自橫計有如是事是故從來枉沈生死雷長芭蕉鐵轉磁石俱無作者而有是力以不取境境亦自寂故如來藏不許有識又引羅什頂佛鉢念鉢甚大即重下之曰我心有分別故鉢有重輕予以知一切隨念念未生時量同太虗然今現行分別者萬類紛然何故靈驗不等是皆心力昧略微劣故也王祥臥冰則魚躍耿恭拜井則泉冽蓋養之專故靈驗之應速如響又引靈源曰道人保養如人病須服藥藥之靈驗易見要須忌口乃可不然服藥何益死生是大病佛祖言教是良藥汙染心是雜毒不能忌之生死病無時損也予愛其言追念圓覺經曰末世諸眾生心不生虗妄佛說如是人現世即菩薩法句經曰若起精進心是妄非精進但能心不妄精進無有涯妙普曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈定太平圜悟勤曰緜密無間寂照同時歲月悠久打成一片而根本愈牢密密作用誠無出此應當處處全真則觸處皆渠剎剎塵塵皆在自大圓鏡中愈密愈能轉換也雲門道直得乾坤大地無纖毫過患猶為轉句不見一色始是半提更須知有全提時節始得所以德山棒臨濟喝皆徹證無生透頂透底到大用現前方能全身出沒欲人全身擔荷外退守文殊普賢大人境界巖頭曰他得底人只守閑閑地二六時中無欲無依自然超諸三昧德山亦曰但無事於心於心無事則虗靈寂照此既已明須當踐履但只退步愈退愈明愈不會愈有力量異念纔起即猛割斷令不相續則智照洞然步步踏實地豈有憎愛違順揀擇於其間哉無明習氣旋起旋消悠久無力能擾人也古以牧牛喻誠哉要久長人耳直截省要最是先忘我見使虗靜恬和任運騰騰一切法皆無取捨向根根塵塵應時脫然自處孤運獨照照體獨立物我一如直下徹底無照可立如斬絲一斬一切斬便自會作活計佛見法見尚不令起則塵勞業識自冰消瓦解養得成實如癡兀而峭措佛祖位中收攝不得那肯入驢胎馬腹也趙州云千億箇盡覓作佛漢於中覓作無心底難得香林四十年方一片涌泉四十年尚自走作南泉十八年能作活計古人無不如此密密踐履但逢緣遇境無不管帶何止此生窮未來際證無量聖身也未是他泊頭處但一味退步切莫作限量也又曰透生死豈是小緣當猛利如救頭燃始有少相應參士世智聰明臘月三十不得纖毫力良由最初無正因末後勞而無功古德勸參涅槃堂裏禪誠有旨也處生死良不易惟大超證之士奮利根勇猛一徑截斷則無難此雖由自己根力亦假方便於常時些小境中轉得行打徹不存解見凜然全體現成踐履將去養得純熟到緣謝時自然無怖畏只有清虗瑩徹無一法當情如懸崖撒手棄捨得無留戀一念萬年覓生了不可得豈有死耶古人坐脫立亡行化倒脫能得勇健皆平昔淘汰得淨潔香林四十年成一片石霜勸休歇去永嘉云體即無生了本無速蓋兢兢岌岌念茲在茲方得無礙自在既捨身後得意生身隨自意趣後報皆以理遣不由業牽所謂透脫生死耶報緣未謝於世上有如許參涉交互應須到處使綽綽有餘裕始得人生各有緣分不必厭喧求靜但中虗外順雖鬧市沸湯亦恬然安穩才有纖毫見刺便打不過也又曰利根一聞千悟不為難要須脚跟牢實諦當徹信把得定作得主一切違順境界差別因緣打成一片如太虗空無纖毫障隔湛湛虗明無有轉變雖百劫千生始終一如方得平穩多見聰明根浮脚淺向言語上認得轉變即以世間無可過上及至境界緣生透脫不得因成進退可惜古人直是千魔萬難悉甞徧雖七處割截亦不動念一往操心如鐵石以至透脫生死渾不費力豈不是大丈夫超詣也在家菩薩修出家行如火中蓮蓋名位權勢意氣卒難調伏況火宅煩擾煎熬除非自己直下明悟本真妙圓到大寂定休歇之場尤能放下廓爾平常徹證無心觀一切法如夢幻泡空豁豁地隨時消遣將去即與維摩詰傅大士龐居士裴相國楊內翰在家勝士同其正因隨己力量轉化未悟同入無為無事法性海中則來閻浮一遭不為折本矣又曰近如裴楊之儔投誠放下就宗師決擇剗去浮塵知見大徹悟始能超軼與老禪德抗行踐履到臨合殺結角頭自解撒手克證大解脫豈小事哉惟此千劫不壞不移易一切賢聖根本是知宿世亦曾熏炙遇緣而彰然能自檢點二六時中學佛法已是雜用心則去却佛法乃真淨界中行履矣但依此一切不雜即純一洞然無愛憎離取捨亦不分彼我不作得失一切法坦然皆我家不思議處靜妙圓明受用之物爾須令此心常時現前不墮昏沈不生聰慧入平等安閑寂靜境界那有惡作業緣識情干撓得此本妙光明也祇恐臨境界面前都盧忘失依前紛亂則不堪也古之修行亦只以自所證入時中照了截斷塵勞教活卓卓地悠久三二十年湻熟超出生死不為難著力在行處不重談說說得一丈不如行取一尺蓋定慧之力回轉業緣正要惺惺地勇猛果決千百生中常受用其餘古人機緣語句不必要會但一著分明則著著如此千變萬化豈移變得渠力用哉內心既虗外緣亦寂著衣吃飯本自天真不勞彫琢若或立勝見負我能即禍事切須照管由是可入無我真實平等如如不動不變淨妙清涼穩密田地矣誌公云不起纖毫修學心無相光中常自在又曰作家宗師唯許人捨知見胸中不留毫髮許蕩然如太虗空悠久長養純熟此即本地風光本來面目到此亘古亘今之地脫離生死有甚難也裴相國龐居士直以信得及便得力受用自在曹山道不變易處去去亦不變易蓋履踐深極到無滲漏之至然後羅籠不住學道之士無絲毫意想墮在塵緣直下心如枯木朽株如大死人無些子氣息心心無知念念無住千聖出來移換不得乃可向枯木上生花發大機用興慈運悲乃無功之功無作之作豈落得失是非哉纔留一毫毛則抵捂於生死界自未能度安能度人又云如今照了本心圓融無際色聲諸塵那可作對迥迥獨脫虗靜明妙要須徹底提持勿令浮淺直須高而無上廣不可極淨躶躶圓垛垛無漏無為千聖依之作根本萬有由建立應須斗頓回光令絕形段分明圓證萬變千化無改無移謂之金剛王謂之透法身行住坐臥無不透徹物物頭頭靡有間隔喚作乾白露淨單明自心不可只麼守之守住便落窠臼却須勇猛割斷十分棄捨轉捨轉明轉遠轉近抵死打疊捨却命去始是絕氣息人方解向上行履唯己自知知亦不立釋迦彌勒文殊普賢德山臨濟不敢正眼覰著豈不是奇特事一棒上一喝下一句一言一麤一細若色若香一時透穿方稱無心境界養得如嬰兒相似純和沖淡雖在塵勞中塵勞不染雖居淨妙處淨妙收他不住隨性住緣飢餐渴飲善尚不起念惡豈可復為所以道隨緣消舊業更不造新殃又云道貴無心禪絕名理唯忘懷泯絕乃可趣向回光內燭脫體通透更不容擬議直下桶底子脫入此大圓寂照勝妙解脫門一了一切了只守閑閑地初不分彼我勝負纔有毫芒見刺即痛剗之放教七通八達自由自在長養純密千聖亦覰不見自己尚似冤家只求得遠離不隈傍翛然清靜虗而靈寂而照勇猛割斷徹底無纖毫撓胸次王老師謂之作活計趙州除粥飯時是雜用心悠久踐履使湻熟乃合從上來無心體道密密作用自見工夫到下稍結角頭自然如懸崖撒手豈不快哉又云要須最初入作便遇本色人直截根源退步就己以鐵石心將從前妄想見解世智辯聰彼我得失一時放却直下如枯木死灰情盡見除豁然契證從上諸聖不移易一絲毫許見得徹此始為入理之門更須教一念萬年純一無雜才有纖毫起滅則落二十五有無出離之期抵死謾生咬教斷然後田地穩密聖凡位中收攝不住始是如鳥出籠自休自了處得座披衣真金百鍊舉動施為等閑蕩蕩地根塵生死境智空妙如湯沃雪常自知時更無分外名無心道人以此自修轉開未悟令如是踐履豈不為要道哉又曰當未起念百不干懷時圓融無際脫體虗凝一切所為曾無疑間謂之現成本分及至纔起一毫頭見解欲承當作主宰便落在陰界裏被見聞覺知得失是非籠半醉半醒一般相似透頂透底直下圓成了無形相不廢功用不妨作為語默起倒不是別人稍覺纖毫滯礙悉是妄想直教灑灑落落如太虗空如鏡當臺如日麗天動靜去來不從外得放教自由自在不被法縛不求法脫盡始盡終打成一片何處離佛法外有世法離世法外有佛法是故祖師直指人心金剛般若貴人離相如壯士屈臂不借他力如此省要好長時自退步體究令有箇落著諦實證悟之地即是念念徧參無邊無量大善知識又云徹證無心雖萬機頓赴豈撓其神千難殊對不干其慮平時如癡兀及臨事為物風旋電轉無不當機素有所守也如學射久久方中悟則剎那履踐功夫須資長遠所以悟明之人正要調伏只如諸塵境常流於中窒礙到得底人分上無不虗通全是自家大解脫門終日作為未嘗作為了無欣厭亦無倦怠度盡一切而無能所況生厭惰耶苟性質偏枯尤當增益所不能放教圓通以漚和力攝化開權俯仰應接俾高低遠近略無差誤行常不輕行學忍辱仙遵先佛軌儀成就三十七助道法堅固四攝行到大用現前喧寂一等如下水船不勞篙棹混融含攝圓證普賢行相乃世世世間大善知識也諸處周旋應變於中虗寂靜覺能不被靜縛則隨所至處皆我活計唯中虗外順有根本者雖然非理相干但退步自照只與直下坐斷如初不聞不見久久魔業自銷爾又曰日久不移易拈弄收放得熟小小境界悉能照破割斷不留朕迹至生死際結角羅紋不相參雜湛然不動翛然出離此臘月三十涅槃堂裏禪也大慧杲曰十二時中隨緣處不得惡念相續或照顧不著起一惡念當急著精彩拽轉頭來若隨他去相續不斷非獨障道亦謂之無智人嬾安云一回入草驀鼻拽回制惡念當如嬾安之牧牛則久久自純熟矣此事許靈利漢擔荷若使聰明則無擔荷分雖易入而難保蓋入處不深力弱也世間塵勞事如鉤鎖連環不斷得省處便省為無始來習得熟若不力爭不知不覺日久入得頭深臘月三十卒著手脚不辦要臨終不顛倒今作事處莫教顛倒如今顛倒欲命終不顛倒無是處俗人在火宅中與貪瞋癡為伴作為見聞無非惡業然於中打得徹其力勝出家兒千倍應以宰官身度者即現宰官身說法便是報佛深恩也但念念不要間斷莫管得不得便今生未得徹命終亦不被惡業牽於日用中亦不被塵勞困後世出頭亦得現成受用今生雖不悟亦種得般若種生生不失人身不落惡趣況心花發明耶又曰往往利根得之不費力生容易心便不修行多被現境奪將去作主宰不得日久迷而不返道力不勝業力魔得其便定為魔攝臨終不得力千萬記取理則頓悟乘悟併消事則漸除因次第盡行住坐臥不可忘了其餘古人差別言句皆不可為實亦不可為虗久久純熟自然默契本心不必別求殊勝奇特也又曰刳正性除助因違現業此了事漢無方便修證中真方便真修證也又曰道家以妄想心尚能留形住世況此心全在般若中來生出頭隨我今生願力安在般若中現成受用此決定事又答人曰眾生顛倒以日用境為實不知全體是夢於中復妄分別以想心繫念神識為實夢殊不知正夢中說夢顛倒中又顛倒杲嘗問先師但以手指曰住住休妄想杲曰某未睡時佛讚依而行佛訶不敢犯依師及自做零碎所得者惺惺時都得受用及上牀已作主不得夢金寶則喜夢刀劍惡境則佈念睡著已作主不得況四大分散始著忙師曰待汝說底許多妄想絕時汝自到寤寐恒一處也初未信寤寐分明兩段敢開大口說禪後聞舉諸佛出身處薰風自南來去却礙膺物方知夢時便是寤時底寤時便是夢時底佛言寤寐恒一方始自知拈出呈似人不得承問不覺實供來教不是問禪亦非見詰不免以昔所疑吐露願將老龐語提撕但願空諸所有慎勿實諸所無先以目前境作夢會然後將夢中移來目前則佛金鼓孔子奠楹決不是夢矣又曰見佛祖如生冤家方少分應如此做工夫日久不著起心牯牛自調猢猻子自死引經云心不妄想過去法亦不貪著未來事不於現在有所住了達三世悉空寂過去不思量未來不計校現在逆順不著意又曰逆我意者只須一忍字定省少時便過順境直是無迴避處如磁石與鐵不覺合作一處無情尚爾況現行無明全身在裏許若無智慧不覺不知被他引入羅網要求出不亦難乎所以入得世間出世無餘便是這箇道理近失方便者往往認現行無明為入世間便將出世間法強差排作出世無餘之事悲乎除夙有誓願即時識破作得主不被障引淨名佛為增上慢說離淫怒癡為解脫若無上慢淫怒癡性即是解脫若免此過逆順境無起滅相方可作入得世間出世無餘已上是妙喜昔經歷的即今日用只如此修願趁色力健亦入是三昧又曰善牧牛者索頭常在手爭得犯苗稼驀地放却索頭鼻孔無撈摸處慈明謂四方放去休攔遏要收只在索頭撥未能如是當緊把索頭且與順摩將淹浸工夫熟自然不著用意提防矣急則躁緩則昏懈俱錯過普照師修心訣曰空寂之心聖不增凡不減佛祖所以異人者能護念耳凡夫無始至今妄想顛倒無明種習久與性成雖頓悟本寂與佛無殊習卒難斷逢逆順境瞋喜是非熾然起滅若不向般若著力焉能對治無相得到大休歇地如云頓悟雖同佛多生習氣深風停波尚涌理現念猶侵杲師曰利根不費力打發便生容易更不修治日久依前流浪輪迴則豈可以一期所悟撥置後修耶故悟後常須照察妄念若起都不隨之損之又損以至無為方始究竟牧牛行是也雖有後修因先悟妄念本空心性本淨於惡斷而無斷於善修而無修此乃真修真斷故雖備修萬行唯以無念為宗曹溪云心地無亂自性定心地無癡自性慧任運寂知遮照無二是頓門雙修定慧也然障濃習重觀劣心浮無明力大般若力小於善惡境未免被動靜互換心不恬淡者不無妄緣遣蕩功夫矣如云六根攝境心不隨緣謂之定心境俱空鑑照無惑謂之慧若掉舉熾盛則先以定門稱理攝教心不隨緣契乎本寂若昏沈尤多則先以慧門攝法觀空照鑑無惑契乎本知以定治亂想以慧治無記動靜機亡對治功終則對境遇緣心心契道任運雙修方為無事人何故此頓門機有勝劣雖先頓悟煩惱濃厚習氣堅重被他昏亂昧却寂知常然者即借對治定慧均調昏亂以及無為雖借對治功暫調習氣以先頓悟心性本淨煩惱本空雖是漸機所行於悟人分上可謂點鐵成金願研此語更莫狐疑真心直說中判真心息妄云以無心法治妄心非無心體但心中無物名無心諸師說做無心功夫不同略明十種一曰覺察平常絕念提防念起纔生便覺破後念不生覺亦不用妄覺俱忘名無心此息妄也二曰休歇謂不思善惡心起便休遇緣便歇冷湫湫如癡兀方少相應此休歇妄心也三泯心存境謂一切妄俱息不顧外境但自息心妄心已息何礙有境即奪人不奪境泯心存境息妄也四泯境存心將內外境悉觀為空寂真心獨照即奪境不奪人泯境存心息妄也五泯心泯境謂內外心境俱寂即人境俱奪泯心境息妄也六存境存心謂心住心位境住境位心境相對心不取境境不臨心各不相到是法住法位世間相常住即人境俱不奪存境存心滅妄也七內外全體謂內身外器一切諸法同真心體湛然虗明無一毫異打成一片此內外全體息妄也八內外全用謂內外身心器界諸法一切動用施為悉觀作真心妙用一念纔生妙用現前此內外全用息妄也九即體即用謂空寂中靈明體即用靈明中空寂用即體惺惺寂寂是惺惺妄想非寂寂惺惺是寂寂無記非此即體即用息妄也十透出體用謂不分體用四面八方只作一箇大解脫門圓陀陀地體用不分通身打成一片此透出體用滅妄也以上不須全用但得一門功夫成就其妄自滅隨根宿習與何法有緣即便習之此休歇妄心法門最要故偏多說其判真心出生死云生死本無妄計為有如人病眼見空中花非實有也今知無生死不能脫者功夫不到也菴婆女問明知生是不生之法為甚被生死轉文殊答云其力未充其判真心正助云妄未息時以無心息妄為正以習眾善為助真如之法體性空淨而有無量煩惱染垢不以方便種種熏習亦無得淨故修一切善行為對治今人自恃天真不習眾善惡道尚不能免況脫生死其判真心驗功云如牧牛雖調猶不敢放鞭繩直待趁入苗稼中不傷苗稼方敢撒手先將愛境想在面前若起愛憎則未熟不生則熟又遇愛憎境特起心令取愛憎不起是心無礙如露地白牛不傷苗稼也私謂宗門本分事盡在六祖云何期自心本自清淨本自具足本不生滅數語牛頭融亦云河沙妙德總在心源悉自具足一切煩惱業障本來空寂來哲須知自性天真具足諸法而當處寂滅畢竟無所有離四句絕百非斯為不思議海印無相三昧馬祖云非聖賢行非凡夫行是菩薩行不取善不捨惡達罪性空念念不可得無自性故森羅萬象一法所印自性本來具足但於善惡事上不滯喚作修道人取善捨惡覿空入定即屬造作一念妄想即是三界生死根本但無一念即除生死根本即得法王無上珍寶更不歷於階級地位頓悟本性總無餘事祇緣眾生無始來病在見諸法為實有其所染執著宿習復有輕重不同故諸祖於了悟後總教人百不知百不會終日永寂如空念念與本分相應久久力量充足本性所具諸定慧神通功德不期發而自發不離此生即得解脫百丈云只今如虗空相似學始有所成臨命終時尋舊路行若怕臨終慞狂須如今便自由始得黃檗云但離却有無諸法心如日輪常在虗空光明自然不照而照到此無棲泊處即是行諸佛路是你清淨法身為你力量小不能頓超但得三五十年須得箇入處自然會去祖師直指汝心本是佛心心不異名之為祖善惡都莫思量當處便出三界眾生輪迴不息生死者意緣走作心於六道不停致受種種苦汝今但學無心如癡人頑石頭一切法透汝心不入始相應不起一切心諸緣盡不生即此身心是自由人臨濟曰現今聽法無依道人歷歷地分明未曾欠少你欲與佛祖不別但如是見心心不異名之活祖諸法無自性亦無生性但有空名名字亦空認他閑名錯了也設有皆依變境有箇菩提依涅槃依解脫依境智依菩薩依佛依你向依變中覓什麼物你若求佛祖即被佛祖魔縛有求皆苦不如無事如上所引皆悟後調心正行此從圓頓宗中圓空門入若能依而行之即是行解相應更得戒行交熏不逾此生定得深證其疾如風然根器不齊或在家輩不無俗累其有習氣濃厚雖得瞥地而昏散貪瞋屢照屢犯不能處處作主必須提起本分見地中此昏散貪瞋是本來空寂否是情迷始有否是起即為起否徹照當體寂滅本分現前昏散諸妄自貼貼地消除矣或尚不能休歇更須痛念多生流浪今生幸得這一著子明白豈可再行隨逐墮落苦自呵責一回入草猛與拽回并擇其習氣最重者先治之以慈治瞋以檀治慳以禪治散以慧治昏以念佛治癡以不淨治淫欲種種法門當詢知識研經教以消蔽障重習一消餘習隨盡百丈云若有貪瞋等病先須治之沙門除貪瞋病不去亦須教渠修禪學慧南泉云若不向裏許行履如何摧挫得五種貪二種欲圜悟云遵先佛儀軌成就三十七助道法即七覺八正等修心訣中亦令對治定慧均調昏亂於悟人分上是點鐵成金至於念念覺照必須努力殷勤空裏步儘盡推爺向裏頭放下又放下二六時與空無撈漉處凝結共鬬長年行坐刻不放鬆庶疾得一生了辦此須各人撫躬自揣如悟後心光脫露處處現前不為愛憎昏散所蔽只須任運保養聖胎便是一員無事道人其或世緣勞重宿習又濃若不抖擻精神種種善巧訶斥調治口口說空步步行有或以為對治是教乘中事宗家兒所不屑為或以為煩惱即菩提遂爾肆意隨逐醍醐上味翻成毒藥竟不念事須漸除因次第盡之囑為何語以致乾慧不敵業力空花還結空果到臘月底毫無靈驗合論引無業師云今解禪道如恒河沙纖塵不盡未免輪迴絲念不忘盡從淪墜觀其發言嫌他三乘菩薩原其所習不如五戒凡夫臨終聖凡情量不盡纖塵絲念未忘輕重五陰向驢胎馬腹托質鑊湯爐炭煑燒從前記憶見解一時失却依舊再為螻蟻蚊虻雖是善因而遭惡果此則聚三千大千世界之鐵鑄不得這一箇大錯字入聖悟心之人自解作活計翻轉本體作工夫終日使得十二辰是之為全性起修全修在性其間多生調熟不離當生便證聖位六祖曰終身不退者定入聖位大珠云頓悟人不離此生即得解脫即修時即入佛位修頓悟者不離此生即超三界又云如此功業由行為本若不降心而入取證無有是處自誑誑他彼此俱墜努力努力然禪宗下客但論見性不論禪定解脫在天台教中亦云人解不同有言頓悟即佛無復位次之殊又有師言頓悟初心即究竟圓極寂滅真如有何位次然平等法界尚不論悟不悟孰辨淺深既得論悟不悟何妨論於淺深乃至雖平等法界無說無示而菩薩行位終是炳然宗鏡錄問一心成佛之道還假歷地位修證否答此無住真心實不可修不可證不可得非取果故不可證非著法故不可得非作法故不可修若論地位即在世諦行門亦不失理以無位中論其位次不可起決定有無之執經明十地差別如空中鳥跡若圓融門寂滅真如有何次第若行布門對治習氣昇進非無若得直下無心量出虗空之外何用更歷階梯如未頓合無心一念有異者直須以佛知見治之究竟圓融佛果以是知宗門下客斷不可偏執一見掃除位次甘墮籠統之病也惟宗門人水到渠成超證十地等妙有不期然而然之理但宗門即生證聖者未可多得初祖面壁九年二祖曰我自調心四祖十四歲入道脇不及席見天然昱語錄六祖云悟時自度從上老祖莫不注意熏修未肯罷手何況我輩後學略得一知半解便自為撒手了當以致臘月三十作主不得祇自欺耳皓月供奉問長沙岑天下善知識證三德涅槃也未岑曰大德問果上涅槃因中涅槃曰問果上涅槃岑曰天下善知識未證功未齊於諸聖曰未齊何謂善知識岑曰明見佛性亦名善知識問未審功齊何道名證大涅槃岑曰摩訶般若照解脫甚深法法身寂滅體三一理圓常欲識功齊處此名常寂光曰果上涅槃已蒙開示如何是因中涅槃岑云大德是須知見地了徹直與佛祖把手同行但得因中涅槃其多生熾然之結習須次第消盡必至見思惑盡方得超出三界按天台教乃藏羅漢位圓教是七信位我宗門人佛亦不作何況其餘然無佛無眾生正是一尊本然自性天真佛漸摩純粹麤垢先落忽然到此界內見思先盡永超三界便是圓教七信位人百丈云去住自由黃檗云隨意而生圭峰曰中陰所向天上人間隨意寄托即是楞伽三種意生身雖教中所判意生身有通狹不同若依三藏法數所引乃通教第三四五地菩薩修三昧得真空寂滅之樂普入佛剎隨意無礙名三昧樂正受意生身通教第八地菩薩覺了諸法自性之體如幻化無有以無量神力普入佛剎迅疾如意無礙自在名覺法自性意生身通教第九十地菩薩覺一切法皆是佛法得一身無量身一時普現如鏡中像隨諸種類得俱生雖現眾像而無作為名種類俱生無行作意生身此三種意生身惟初種三昧樂尚未斷盡見思然亦是須陀洹向方能得之大非易事圭峰云惺悟不由情臨終能轉業謂情中欲作而察理不應即須便止情中不欲作而察理相應即須便作但由是非理不由愛惡情即臨命終時業不能繫隨意自在天上人間也但朝夕所作被情塵所牽即臨終被業所率而受生若所作所為由於覺智不由情塵即臨終由我自在而受生不由業也當知欲驗受生自在不自在但驗尋常行心於塵境自由不自由私謂制情順理密行無間臨終念念現前則有之然其力充者方能轉業力未充者似亦未能受生均不隨業也文殊答庵婆羅未充語此即確證須知未悟之人則貴眼正既悟之後全重行履是為有頭有尾若有頭無尾古德謂之終是不貴永明四料揀云陰境忽現前瞥爾隨他去此中萬分危險幸勿恃先入之言不加細察作安心丸也山庵雜錄載僧末山既死現夢鄒氏託生其友亦夢之既長雖自知前身是僧不喜與僧交癡呆如木石天目山義斷崖見高峰得旨既死現夢託生吳興細民家復為僧名瑞應字寶曇受人禮拜供養無虗日余山庵居天界寶曇在焉察其所為碌碌無異常人間扣以己躬下事但懡㦬而已二人前身皆非常人胡乃頓忘如是古謂聲聞尚昧出胎菩薩猶迷隔陰修行人可不慎歟又載絕學誠公座下僧習禪有得誠驗以三關語其答如鼓應桴早逝生民家父母俱有夢一日父𢹂入山見誠公公問汝前身答我三轉語記得否進云試舉看既舉點首曰是我語誠囑其父保之他寺僧因求為弟子習魚山梵吹多得襯施驕奢不法事無不為之誠因立三大願勵學者大凡參禪人於靜定中得箇歡喜處乃塵勞暫息慧光少現未為究竟八識田中無明根本尚在喻如石壓草去石再青矣戒之雲棲法彚記戒禪師後身為蘇子瞻青草堂後身為曾魯公遜長老後身為李侍郎南庵主後身為陳忠肅知藏後身為張文定嚴首座後身為王龜齡其次則乘禪師為韓氏子敬寺僧為岐王子又其次善師為董司戶女海印為朱防禦女甚而鴈蕩僧為秦氏子檜造諸惡業愚謂大願大力如靈樹生生為僧而雲門三作國王遂失神通百世而下如雲門者有幾況靈樹乎為常人為女人為惡人則轉展下劣矣即為諸名臣亦非計之得也又載隋梁州沙門慧全徒眾中一人頗麤異全素不錄忽云得那含果全疾其人徑至榻前門閉如故謂全曰師命過當生婆羅門家全曰我一生坐禪何故生彼答師信道未篤外學未絕雖有福業不能超詣今時僧有學老莊者有學舉子業經書者有學詩騷詞賦者在彼以禪為務但外學未絕尚緣此累道況恣意外學而禪置之罔聞不知其可也又載南岳天台二師俱言以領眾損己一則止證鐵輪一則僅登五品愚謂權實非後學所能測且莫問權姑以實論聖師尚爾況凡夫乎彼大言不慚者將超越二師上乎可懼也已私謂斷崖義五祖戒青草堂見地何等超卓其正念亦豈後學所能及然受報輾轉隔生難定況其下乎以是知見思未盡者斷不超出三界即天上人界隨意寄托之說亦須陀洹向果始能之耳或問如子所論則自梁陳迄今凡傳燈指月會元以及續燈諸錄所載各祖師有幾人已經入聖有幾人已斷見思不為三界所縛即如鄧隱峰之倒立而化衣皆順體孚上座之講涅槃經揮尺一下而去巖頭歲之預知大喝一聲而逝紫柏老之臨刑圜中自在而脫如此等師可決其出三界否又如龐公之枕膝脫灑靈照之我女鋒捷張相之擲枕作聲楊傑之刻期坐亡此等在家又將作何定論耶答曰此皆未可妄為臆斷也宗門下客但論見性不論禪定解脫無三界可出無眾生可度亦不覩惡生嫌亦不觀善勤措凡聖不立憎愛兩亡臨終諸聖來迎也不欣惡境界現也不懼我王庫中無如是刀只是一念萬年靈光獨耀耳然雖如是功熏所及熟脫不等但須返己自勘外紛對五塵而了不迷逐是謂思惑盡相是圓七信位人已超三界外不對五塵而不起纖欲是謂見惑盡相是圓初信位人此出三界有分若猶未也雖無三界可出而實未出三界雖無眾生可度而須方便度盡心內眾生切勿自欺亦不必妄測古德要而言之約分四階第一等人行解相應見思惑盡或三界貪瞋癡思惑雖未斷而見惑已斷此皆謂之入聖之流得意生身隨願度生固無論已第二等人淨漚識尚未淨除間復昏動便知見惑未盡而熏修得力寂照現前念念相續始本合一了知自性本自清淨本不生滅本自具足見雖未盡愈淘汰愈有力量隨緣消舊業更不造新殃惟此一事實餘二則非真祇是任運過時毫無纖疑立處即真更不思前算後臨命終時也不計校業生意生勘破本分心心不異不變易處去去亦不變異往來生死是依變之境向依變中著迷作麼如斯等人隨其願力定得世世出家童真入道有進無退成聖匪遙此是禪宗相傳正脈行履也第三等人見地清徹而夙習濃厚貪瞋癡念時時現前雖屢加覺照智弱惑強兼復境緣逼迫二六時中馴伏時少打失時多內照似寂對境仍迷若識慚愧力與之爭久久亦能隨順由勉強入自然若功用未足猝遇臘底消息或不得力必須勇猛放下萬緣死抱主人翁仗此般若正因願力強者先牽便得後身童真入道再行參究發悟熏修或出頭來一聞千悟此亦見地契證功熏未齊努力透關之行履正脈也倘不如是踐履口口說空步步行有提起古人公案綱宗意識卜度拈頌也會勘驗也會普說茶話法語也會臨命終時業識紛飛乾慧不敲業力隨業受報未有了期再出頭來知在何日雖本性原無變異而隔世昏暗依然博地凡夫且前世業重墮落三途均未可定古德云雖善因而招惡果思之思之今時此等在家最多出家中亦有之昔日平侍者而今黃秀才我在大陽山看你做出來其或逆行示現此無論已均非禪宗正傳臨末稍頭一場㦬懡伊誰之咎歟第四等人刻苦參學或發心在晚年未得瞥地而大限已臨或立志在少年而壽命夭促或參請雖多載而未遇作家遽爾時至古德云今生不悟來生參來生不了後世再參抱定一句死話頭與之俱沒千生萬世決定期於了徹而後已亦須猛勇決定仗此般若正因願力強者先牽後世受生如願參禪發悟貓有插血之功虎有起尸之德只須志堅勿疑勿畏此則宗門人未得悟明臨終之行履正脈也如上所約自入聖以至未悟盡未來際宗門下客不出四種之中且多在後三四兩種內今時之自命禪宗者當如何善自護侍以期一生了當耶利人無上甚深微妙法百千萬劫難遭遇若不傳法度眾生决定無能報恩者宗門客既了悟已曠觀眾生同具如來智慧而從迷積迷沈淪苦海了無休日其大慈愍心不期發而自發出於勢之不容己內則普心滿運外則人天共推其間般若種熟徹底掀翻於諸祖言句綱宗無不一一默契三藏十二部大小經教無不一一消歸接引來輩應不失時昨日定今日不定昨日是今日不是喝下儼如吼師子棒頭敲出玉麒麟宗教雙融孤撑毒眼逢尊宿勘尊宿逢作家勘作家逢老參勘老參逢新學勘新學逢講主勘講主逢士夫勘士夫有時官不容針孤峻處特地孤峻有時私通車馬婆和處忒殺婆和看人中毒添把砒礵見人疲眠送箇枕子方其入室普說千言萬語而不為費詞猝然覿面當機十度九休而不為辜負或剝盡核皮與人下口或抄盡家產逼人納財解行兼隆頭尾兩正神用莫測品德純全伊何人歟非乘願而再來者歟我思其人實獲我心矣次則見地清徹而文字稍有未長於宗門則一線穿却而教理則合轍未圓既未能如六祖之一聽便了亦未能如諸祖之取義斷章若以三乘十二分教接人自有諸講主在我者裏單提這一著子如靠一座須彌山相似又如馬前相撲倒便休參究真實了悟真實踐履真實一手擡一手捺機靈句活殺活同時登寶王位倒用橫拈據師子牀胡喝瞎棒到處做得白拈賊真不愧為曹溪滴骨兒孫渾身是箇賴皮精也儘算得少林闡提種草其下苦參切究水到渠成摸著老胡脚跟打失瞿曇鼻孔然而河陽新婦子眼目不道全無其如木塔老婆禪機用那能全活此是自救不了之儔豈勝出世為人之任祇以悲心彌切明眼難逢或遇一二有緣但開示其參究軌則逼劄工夫剷去種種邪解引入坦坦正途間有一粒豆𪹼亦可以空印空古德謂之單片子本分在自己正須常居學地而所印之同流尤須囑其親近高賢以期得大自在得大了當不至為七青八黃之輩作蝦蟆跳也宗鏡錄云祖佛正宗纔有信處皆可為人先以聞解信入後以無思契同若入信門便登祖位是也如上所說胥在宗師分上分其淺深大約有此三類若就學者論根器千差造就匪一隨機設化因地置宜既登寶華王座緇白交參魚龍雜列或佈漫天之網或垂一縷之絲庶幾一雨所施而大小草木咸蒙所潤矣其間林林總總初學為多當翦截其知解與一無義味話頭使之苦參力究見有話頭抱得住者已得參情結秀必有悟境現前時時提撕俾使疾得相應急不得緩不得一氣呵成本光透露此全在師家鉗鎚之妙密爾如或前人悠忽從事話頭倏在倏忘何能打成一片須當激發其羞恥之心以鞭策其進修之路俾得翻然勃然速見油然沛然而話頭緊峭悟機流行也或其人先已得有話頭或全未親近師家總當令其從參究進路所有看過經論及在前師家所說道理通令拋擲一箇元字脚不留專研此話頭朝夕莫放話頭不一但起得疑情者便是有緣不須更換倘有依稀見處隨與剷除勿使剁根則枝葉脫落本真覿面自有時至理彰之候但勿輕易許可必須勘得十成穩密肯心自許纔是施與點睛之時蓋學者終身受用全在本分清楚與佛祖把手齊肩了無纖疑徹見無死無生無凡無聖生死一如聖凡不二我本來自性天真佛入天堂與落地獄不變異一毫釐許然後到處一一踐履將去歡喜煩惱境界來到面前不為搖奪惟此一事實餘二則皆非如此保任縝密臨末稍頭方得受用萬勿急於羅籠將就許可誤會本分重關末後三關之說且先印以本分再換話頭令參重關得重關後再透末後言句學者因此無不廉纖粘滯仿佛依稀甚至師家各私其私均有三關密傳一定板印此家許過末後者換一門庭連本分也全未是易地同然以至初學無所滴從其不肯虗心再參者執定前師所許為是甘心作一門外擔板漢了此一生其有良心未昧重行究推者陸續將各處零星所得湊成一箇攙前脫後支離的西來祖印一經明眼人追劄勘驗或在本分處作窠窟或於重關邊躲生涯或肆無忌憚亂統抵塞以為得大自在之末後句宗風至今日真有不忍言者各人根器利鈍不齊豈能人人一節打通或有二三番或有五六番始得徹了然最重是起手悟門必須諦當清徹寧可絕嗣詎可亂許是則最初為人之要領也學者既經知有之後其般若夙熟者於諸家公案言句自然處處會歸毋煩師家點撥間有粘滯消不過之處但令提起本分一一默契此則不妨略以言句消解所謂落草之談是也或有根器魯鈍參究多年而不能相應者此終由於話頭之不得力總宜逼其苦究窮參自得慧光透發或值病體垂危大命告盡其有志者正可藉以參涅槃堂裏禪與之撕捱努力透關抱此話頭以終再世出頭便得悟徹倘有於般若差別岐路逗漏多番一線未達或可放一線道以滿其苦參之願而使臨終安穩密行此則又在師家臨時之手眼矣或有參情緊而正眼未開忽有似是而非之見刺橫梗於中屢拔不脫此必所參話頭誤成窠臼然終有消不過公案言句必須將消不過之公案言句改作話頭再行參究而後其刺可拔正眼可開余先參誰字話頭後忽覺得本來人更不外於不動念時明了之識念既不起則言語道斷心行亦滅而一切普印寂然不動感而遂通與宗門靈光獨耀迥脫根塵但離妄緣即如如佛諸言句以及豎拳下棒諸機用無不印合惟於無夢無想主人公會不過去若非華藏老人大慈手眼令其改參無夢無想主公話頭則終身為門外漢所謂庵內人不知庵外事及堂中事作麼生等語一律支吾強解那有聞樓梯上笑語聲一箇消息窺見枕子落地脚根失之毫釐差以萬里寄語來哲切勿自欺自足自滿自畫而師家作用亦必披根到底方可印證也學者既得知有或經師家所造就或先為他師所印可而本分清楚手眼明白者即將古德誵訛公案及五家綱宗一一拈勘必令其一一消歸自己再於如來一乘經論所說一一契合此真難得種草再須察其習氣濃薄示以牧牛功熏刻不放手此牧牛功夫在教家謂之修道位本分清徹在教門謂之見道位此依宗門人判斷消解若教門見道大小乘亦不同小乘見道已登須陀洹果宗門家兒何能及此況圓教初信見道位耶然宗門行履暗與圓教相合行住坐臥四威儀中到處在不變異處行履法華經云佛子住此地即入諸佛位常在於其中經行及坐臥故無有異也宗門有罷參之說談何容易惟佛一人方可罷參若等覺菩薩猶有一分無明習氣不得云罷參何況我輩略有微末知解所云見道岑大虫所謂因中涅槃與教中見道小乘是初果位大遠在全仗悟後消識功力使此牯牛東西不犯苗稼偏不附物正不立玄變成露地白牛要之習氣輕得一分真性露得一分即牯牛白得一分然不過暫時而伏若真白得一分即圓教初住位破一分無明證一分真如方始說得迨至無明習氣破盡直至佛位方得全身露地白牛現前也後輩略有知解者大約終身是調習時惟視其功行緊怠為臨終得力與否之左券此過去諸祖及盡未來際宗門人皆然所宜與入室種草深細盤桓者也至於在家縉紳先生及士女流輩其有大志必欲一生了辦者其苦參話頭搜索逼紮剷截知解如遇話頭橫生見刺改換消不過公案作為話頭𢬵命參究種種軌則與出家兒毫無有異此為最上根器者說知有之後嚴守在家戒律萬行莊嚴是佛四眾弟子之列亦可接引有緣後輩不為分外但當道士大夫有應酬俗務倥傯那能如禪和一心專辦惟心志慕道必欲得最上乘知見兼之出仕省分朝齊暮楚不能與善知識三五載常聚一方既與有緣察其參情結秀知見已正稍為私通車馬放一線道使其得般若之味從此猛加功熏以求其極免致一無所得或至異日遇有別緣全行退失此等手眼於出家中氣質弱劣而志真切者亦可依樣葫蘆斯則全在明眼宗師之作用矣至於平等士女發心參尋在男眾則有一家生計之累在女眾則有家人撓阻之艱均須格外體恤若能參究苦切而竟未得窺其門戶者亦須稍與平實商量知令途路以不負其來意然決須正見正知方與點撥所謂能入佛而不能入魔者則可如晦堂之吾無隱乎爾者則可如西天老祖之識得喚作佛性不識喚作精魂者則可降此則斷斷未可也古德接人差別眼目各各不同今略引一二則以見大端云爾宗門燈燈相續佛祖慧命攸關乃負荷佛法者第一件事昔首山沒汾陽昭師閉關高枕契聰讓之曰佛法大事靜退小節風穴懼應讖憂宗旨墮滅幸有先師今已棄世汝有力荷擔大法今何時而欲高臥耶昭矍然起握聰手曰非公不聞此語促辦裝吾行矣然則宗眼圓明者急思肩任佛法盡力為人何可坐視宗風掃地而不為之扶持提唱耶僧問汾陽如何是接初機句曰汝是行脚僧問如何是辨衲僧句曰西方日出卯問如何是正令行句曰千里特來呈舊面問如何是立乾坤句曰北俱盧州長粳米食者無瞋亦無喜昭又曰總將此四轉語勘驗天下衲僧了也大愚芝曰先師將此驗衲僧仔細思量將此四句總被天下衲僧一時勘破妙喜曰諸人要識大愚麼三年無改於父之道可謂孝矣伊庵曰今日宗師有將此四語驗人者否祖禰不了殃及兒孫顯喻佛祖接人有平實商量語所謂以言顯無言也其緊要開示已分見於禪源徹參調習入聖各門然初機發悟處處逢源古德提持片片是錦凡有關啟闢悟門指示修功者略於此門節錄之世尊示隨色摩尼珠五方天各說異色世尊藏珠擡手云此珠作何色天云手中無珠何處有色世尊歎曰吾示世珠便說有青黃等色吾將真珠示便總不知天悉悟梵志擎花兩株供佛佛曰放下志放左右手花已佛更詔放下志曰兩手皆空更放下甚麼佛曰汝當放外六塵內六根中六識一時捨却無可捨處是汝免生死處志悟無生忍異見王問波羅提曰佛性在何處提曰性作用處有八在胎為身處世為人在眼曰見在耳曰聞在鼻嗅香在口談論在手執捉在足奔運徧現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂古德別云不識是佛性識得是精魂妙喜云敢問諸人那箇是佛性那箇是精魂初祖安心法門云迷則人逐法解則法逐人解則識攝色迷則色攝識但有心分別計較自心現量者悉是夢若識心寂滅無一切念處名正覺問云何自心現量答見一切法有有不自有心計作有見一切法無無不自無心計作無又若人造一切罪自見法王即得解脫從事得解者力強事中見法者即處處不失念從文字得解者力弱即事即法者深運為跳踉悉不出法界若以法界入法界即癡人凡有施為皆不出法界心心體是法界故問世人種種學問云何不得道答由見己故所以不得道己者我也至人苦不憂樂不喜由不見己故所以不知苦樂由亡己故得至虗無己尚自亡更有何物不忘也問諸法既空阿誰修道答有阿誰須修道若無阿誰即不須修道阿誰者亦我也若無我者逢物不生是非是者我自是而物非是也非者我自非而物非非也即心無心是為通達佛道即物不起見名達道逢物直達知其本原此人慧眼開智者任物不任己即無取捨違順愚者任己不任物即有取捨違順不見一物名見道不行一物名行道即一切處無處即作處無作處無作法即見佛若見相時即一切處見鬼取相故墮地獄觀法故得解脫若見憶想分別即受鑊湯爐炭等事現見生死相若見法界性即見涅槃性無憶想分別即是法界性心非色故非有用而不廢故非無又用常空故非有空而常用故非無可祖云夫謂古異今今異古復離四大更有法身解時即今五陰心是圓淨涅槃此心具足萬行正稱大定四相寂滅夫欲識心定者正坐時知坐是心知有妄起是心知無妄起是心知無內外是心理盡歸心心既清淨淨即本性無外唯一心是智慧相明了無動名自性定三祖云欲知法要心是十二部經根本唯有一乘法一乘者一心是但守一心即心真如門一切法不出自心唯心自知心無形色諸祖只是以心傳心達者印可更無別法又曰一切由心邪正在己不思一物即是本心唯智能知更無別行摘三祖信心銘云至道無難唯嫌揀擇但莫憎愛洞然明白莫逐有緣勿住空忍前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋纔有是非紛然失心一心不生萬法無咎繫念乖真昏沈不好不好勞神何用疏親欲取一乘勿惡六塵六塵不惡還同正覺得失是非一時放却心若不異萬法一如要急相應唯言不二一念萬年萬年一念十方智者皆入此宗六祖云因何聞法不自開悟緣邪見障重煩惱根深般若之智亦無大小迷心外見修行覓佛未悟自性即小根若悟頓教不執外修但自心常起正見煩惱塵勞常不能染即見性無相頌云煩惱暗宅中常須生慧日邪來煩惱至正來煩惱除邪正俱不用清淨至無餘菩提本無性起心即是妄淨心在妄中但正無三障正見名出世邪見名世間邪正盡打却菩提性宛然此頌是頓教悟即剎那間此法門無念為宗無相為體無住為本無住者本性於世間善惡好醜冤親言說觸刺欺爭時並將為空不思酬害念念中不思前境若前今後念相續不斷名縛於諸法念念不住即無縛此是無住為本外離一切相名無相即法體清淨此是無相為體於諸境不染曰無念自念常離諸境不於境上生心若只百物不思念盡除却一念絕即死別處受生大錯云何立無念為宗迷人於境上有念便起邪見一切塵勞妄想從此生自性本無一法可得若有所得妄說禍福即是塵勞邪見又云無者無何物念者念何事無者無二相無諸塵勞相念者念真如本性真如是念體念是真如用真如自性起念六根雖有見聞覺知不染萬境而真性常自在故經云善能分別諸法相於第一義而不動云何坐禪此法門無障無礙於一切善惡境心念不起名坐明見自性不動名禪何名禪定外離相名禪內不亂名定若著相心即亂離相心即不亂本性自淨自定只為見境思境即亂若見諸境心不亂者是真定也於念念自見本性清淨自修自行自成佛道示智常云不見一法存無見大似浮雲遮日面不存一法守空知猶如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯現永嘉覺參遶師三匝振錫而立師曰大德自何方來生大我慢覺曰生死事大無常迅速師曰何不體取無生了無速乎覺曰體即無生了本無速師曰如是如是覺方禮拜須臾告辭師曰返太速乎覺曰本自非動豈有速耶師曰誰知非動曰仁者自生分別師曰汝甚得無生之意曰無生豈有意耶師曰無意誰當分別曰分別亦非意師曰善哉時謂一宿覺玄䇿告智隍大定曰我師所說妙湛圓寂體用如如五陰本空六塵非有不出不入不定不亂禪性無住離住禪寂禪性無生離生禪想心如虗空亦無虗空之量隍謁六祖師曰誠如所言汝但心如虗空不著空見應用無礙動靜無心凡聖情忘能所俱泯性相如如無不定時也師告薛簡曰煩惱即菩提若以智慧照破煩惱者是二乘見解明與無明凡夫見二智者了其性無二無二之性即實性實性者凡不減聖不增住煩惱不亂居禪定不寂不斷不常不來不去不在中間及內外不生不滅性相如如常住不遷名曰道我說不生不滅者本自無生今亦不滅欲知心要但一切善惡都莫思量自入淨心體湛然常寂妙用恒沙偈云有情即解動無情即不動若修不動行同無情不動若覓真不動動上有不動不動是不動無情無佛種善能分別相第一義不動但作如此見即是真如用又曰法性本無生滅去來依此修不失宗旨偈曰兀兀不修善騰騰不造惡寂寂斷見聞蕩蕩心無著吉州思云即言語是汝心此心是實相法身佛與空齊壽若入三昧門無不是三昧若入無相門總是無相隨立之處盡得宗門語言啼笑屈伸俯仰各從性海發故得宗名相好之佛是因果佛即實相佛家用一切時中更無一法可行自是得法不以得更得是以法不知法法不聞法平等即佛佛即平等不以平等更行平等故獨一無伴侶迷時迷於悟悟時悟於迷迷還自迷悟還自悟無有一法不從心生不從心滅是以迷悟總在一心南岳思云學者先須通心心得通一切法一時盡通聞說靜不生靜念即是本自靜聞空不取空譬鳥飛空若住空必有墮落患無住為本自性體寂而生其心是照用即寂是自性定即照是自性慧定即慧體慧即定用離定無別慧離慧無別定即定時是慧即慧時是定即定時無有定即慧時無有慧性是如故如燈是光體光是燈用即定慧雙修不相去離牛頭融絕觀論問何者是心答六根所觀並是心問心若為答心寂滅心為體為宗為本心性寂滅即定常解寂滅為慧問何者是智答境赴解是智問何者是境答自身心性為境問何者是舒卷答照用為舒心寂滅無去來為卷舒則彌游法界卷則空迹難尋問何者是法界答邊表不可得名見法界覺禪師云眼見一切色眼不屬一切色是自性解脫緣禪師云如有石尋常坐臥或作佛像畏罪不敢坐是意識自忙亂石中本無罪福安禪師云直心是道直想直用更不觀空亦不求方便經云直視不見直念不想直受不行直說不煩智達師心境頌云境立心便起心空境不生若將心繫境心境兩俱盲境心各自住心境兩俱清悟境心無起迷心境共行若迷心作境心境亂縱橫悟境心元靜知心境本清知心無境性了境心無形境虗心寂寂心照境泠泠甘泉師云發心入道先須識本心未識者以信為先信者信心是佛無始輪迴只是不敢信自心是佛心外無別佛舉動施為更是阿誰如是解者一念相應即名佛石頭祖云汝心體離斷常性非垢淨湛然圓滿凡聖齊等應用無方三界六道唯是心現水月鏡像有生滅耶汝知之無所不備諸聖述言欲顯法身本寂同歸根耳宗鏡云此宗如何相應答向即背近即離一門深入而忘覺知是心中自證法門先德云諸祖共傳諸佛清淨自覺聖智真如妙心不同世間文字所得曹山云從緣薦得相應疾就體消停得力遲瞥起本來無處所吾師暫說不思議故知諸聖皆用此一念心起時了不可得是真不思議離此決無別無殊勝豈非疾耶問如何即是答是則第二頭非則第三首心智路絕現量情消住此之時自然洞鑒問絕却見聞如何覺悟答只謂強覺妄知而能障道唯當脫粘內伏發自靈知根塵既消光明頓發今為昧性拘文者假以言詮方便開示直指出六根現用常住無生滅性與佛無異親證現知分明無惑今且指見聞二性者當見時即自性祖曰眼門放光照破山河大地又應眼時若干日萬像不能逃影質是知明暗自去來靈光終不昧楞嚴經佛告匿王汝三歲見河時至年十三其水云何王答如三歲時乃至今六十二無異佛言汝面雖皺而此見精性未嘗皺皺者為變不皺非變元無生滅云何於中受汝生死此因國王示疑寄破斷見方便分別生滅不生滅二性若不執斷常見則皆是實相無生滅即相恒真方稱究竟聞性者楞嚴云譬如人靜居十方俱擊鼓十處一時聞此則圓真實隔垣聽音響遐邇俱可聞五根所不齊是則通真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實故知聲塵自有無聞性非生滅又非唯聞性無生返觀聲塵亦無生滅以從緣起自體全無如來勅羅睺羅擊鐘一聲問阿難聞不阿難言聞鐘歇無聲又問聞不答不聞又擊問聞不又言聞佛言聲消無聞若實無聞聞性已滅鐘聲更擊汝云何知自是聲塵或有或無豈聞性為汝有無聞實云無誰知無者如夢中聞舂擣聲聞性不昏縱汝形消命光遷謝此性云何消滅乃至若棄生滅守於真常常光現前則汝法眼應時清淨云何不成無上知覺是以若了聞性即成正覺斯豈不是因言悟道今依祖教更有一門最為省要所謂無心何者若有心則不安無心則自樂古云莫與心為伴無心心始安若將心作伴動即被心瞞心生種種法生心滅種種法滅但得無心境自不現既無對待逆順何生以迎境生惱以順境牽愛能令心動不安今若無心坦然無事不了無心之旨雖對治折伏其不安相常現前又無心有二一澄湛令無則是攝念蠲消覺觀漸至微細二當體本無則直了無生以一念起處不可得故經云一念初起無有初相是真護念問本自無生妄從何起答為不了本自無心名妄知本無心即妄無所起真無所得問何故有心即妄無心即無妄答以法界性空寂無主宰故有心即有主宰即有分劑無心即無主宰即無分劑無分劑即無生死問為當離心是無心即心得無心答即心得無心問即心是有心云何得無心答不壞心相而無分別問豈不辨知也答即辨知無能所是無心也豈渾無用始是無心如鏡照物豈有心耶當知眾生恒自無心心體本來常寂常用常寂實性自爾非自有心方始用也只為眾生不了自心常寂妄計有心心即成境以即心無心故心恒是理不得心相即是眾生不生即理無理故理恒是心不動心相即是佛亦不生聖凡常自平等法界也又無心者不得作有無情見將心作無此即成有若一切處無心如土木又成斷滅皆屬妄識是以稱不思議宗者以有無情見不及故問既不得作有無解如何是正了無心答石虎山前鬬蘆花水底沈問眾生皆有佛性云何不悟答如水淡味恒然著甘草甜下黃蓮苦心水亦然起妄染則凡冥真空則聖性未嘗變異又不覺故不知有以不信故不承當但起無明空成倒想問凡聖皆用一心真性成佛云何見有前後答見雖前後性且不虧眾生以無明夢未破覺道力未具則佛性未現法身未圓豈是不具如來藏性問如何是菩提相答約究竟菩提體常冥寂淨名云寂滅是菩提離諸相故若以無相之相方便門中不無顯示令初發菩提心人分明無惑如云寂照無二為菩提相如鏡無心為體鑒照為用合為其相亦即禪宗即體之用是知即用之體恒寂知寂不二為心相問有念即生無念即佛云何聖凡一等答眾生雖起念不知念本無念與佛無念等妄墮有念中佛得無念知念本無眾生雖現在念中佛知念即無念斯則佛無念與眾生無念義同又眾生不知念空於念成事似有差別若了念空則苦樂境不執以境從念生心空則境何有既無有境相縛自除能所俱空誰生取著既不取著生死自無圓覺云知是空華即無流轉亦無身心受彼生死問即心成佛之宗佛祖本懷如今信不及人謂不現證答若親見無一人而非佛若不信無一佛而非人迷則常作佛之眾生悟則現證眾生之佛妄見成差本性恒一問如何是即今之佛答今一念起了不可得無有處所是過去佛過去不有未來亦空是未來佛即今念念不住是現在佛但莫執莫斷不取不捨則三際無蹤一念圓具十法界非因果而因果之法如是則念念相應念念成佛凡聖悉等故云了了識心是心是佛欲得早成戒心是律除此心王更無別佛華嚴論云不如一念緣起無生超彼三乘權學等見問一念成佛只入信門如何得目前了了分明而見答目前無物是真見佛以一切法性寂靜故如是通達六根所對無非見自性如如佛矣此名真見道真供養契如理之心無見佛之想了自法性是真供養寶雨經云如理思惟即是供養一切如來謂一切不思惟是真思惟以頓悟一心無法可思量故問云何親自現證得見自心之佛答若以智求智則成解解背圓宗若起照心照則立境隨照失旨皆影事不契斯宗若了真心自然無心合道妙德啟口問不二忘言入理顯真宗問禪宗云今須知諸佛出身處如何答石牛生象子木女孕嬰兒諸佛從中出最初成道時見即便見不在意思人問大梅云神性獨立學人不識答誰教汝問又問莫不問者便是答若不是是阿誰如是問問神性非聲色師所示神性學人只識得聲色不識真性答如大空藏眾寶皆具福德人見直捉明月寶珠薄福人見銅鐵類非藏中無寶亦非主藏者不與我向汝道性汝只見聲色如今揚眉動目彈指謦咳喃喃問答總是此性喚作大道常在目前雖在目前難覩若上根聞便會更不作諸惡喚作一受常寂然中根數數聞說還會下根千萬與說元來不會雖記少許如破布裹珠出門還漏却知麼問即心即佛祖佛同詮云何不說非心非佛答即心即佛是表詮令親證自心了了見性非心非佛是遮詮即破執奪情見依通意解妄認之者以心佛了不可得此乃權立頓教泯絕無寄之門言語道斷心行處滅亦是一機入路若圓教即此情盡體露之法有遮有表非即非離體用相收理事無礙今時偏重遮非之詞不見圓常之理所以祖師云是心是佛如牛有角非心非佛如兔無角並對待強名邊事若豁悟本心是非頓息不一向離起絕言見不一向即起執指譏若實親證自宗尚無能證智心及所證妙理豈況更存知解乎問信入此門還有退否答信有二若正信堅固諦了無疑理觀分明乘戒兼急則一生可辦誰論退耶若依通之信觀力麤浮習重境強遇緣即退乃至但於佛法中種於信心謙下無慢敬順賢良於諸惡人心常慈愍於勝己者咨受未聞所聞勝法奉行無忘所有虗妄依教蠲除於三菩提道常勤不息夫為人生之道法合如然若不長惡而生何須慮退信煩惱即菩提本來是佛更無所進如在虗空退至何所問既是無言之道絕相之真如何徧引言詮廣明行相答非言何以知無言非相何能顯無相華嚴云了法不在言善入無言際而能示言說如響徧世間淨名云夫說法者無說無示又云無離文字說解脫斯皆以言顯無言矣華嚴云色身非是佛音聲亦復然亦不離聲色見佛神通力金剛經云若見諸相非相即見如來斯皆以相顯無相矣問生佛同體何故苦樂有殊答佛性法性自了心源妄想不生不失正念我所心滅即不受生死即究竟常寂滅以寂滅故常樂自歸眾生迷自性不達本心種種妄想不從正念故即愛憎以愛憎故心器破壞即受生死諸苦自現欲知法要守心第一若人不守心得成佛者無是處引仰山云頓悟自心無相猶若虗空寄根發明即本性具恒沙妙用無別所持無別安立即本地即本土引安國云如夢好惡知牀上安眠全無憂喜即識心見性今聞作佛喜聞入地獄憂不達心性在菩提牀上安眠妄生憂喜引大梅云各自明心達本得本末自至心是本但心不附一切善惡而生即知萬法本自如如宗鏡釋云如六祖道善惡都莫思量自然得入心體湛然常寂妙用恒沙以諸佛是極善邊眾生是極惡邊以善惡收盡一切法故云若不思量全歸心體如寒山云萬境俱泯迹方見本來人未必須泯只謂眾生不達空花起滅不復一心本源故令泯絕若入心體唯是湛然不落斷滅自然從體起用用徧恒沙引千頃云十惡五逆法並從如來藏中現本來是佛只謂眾生起念奔流至今所以佛令滅意根絕諸分別一念相應便超正覺豈教多知解擾亂身心汝今但絕見聞覺知境上莫生分別隨時著衣吃飯平常心是道此法甚難有問夜後無燈時如何答悟道人常光現前有什麼晝夜引雲居云世出世均自一念妄心有念即是境見即是心觀自一念動即恒沙世界一時動觀自一念常定即六道眾生悉常定若了一念體即恒沙世界常現自心由迷一心即境智胡越又宗鏡錄云雖前引後證文廣義繁何厭重說如大論云譬搖樹果熟者前落未熟者更須後搖又捕魚前網不盡後網乃得種種因緣重說無咎問如何得契斯旨答境智俱忘如何說契問如是則言思道斷心智路絕答此亦強言雖欲隱形而未亡跡問如何得形迹俱忘答本無朕迹如何欲亡問如是則如人飲水冷煖自知當大悟時方合斯旨答此中亦無迷悟合不合道理撒手似君無一物徒勞苦說數千般古德云盡十方世界覓一人為伴不得又云只有一人承紹祖位終無二人若未親到徒勞神思此法一切凡聖大捨身命處不入此宗皆非究竟問如何踐履答教誰踐履問莫不成斷滅否答尚不得常住云何斷滅問乞最後一言答化人問幻士谷響答泉聲欲達吾宗旨泥牛水上行歐陽修問高僧臨生死談笑脫去何道致之答定慧力耳問今何無有答古人念念在定臨終安得亂今念念散亂臨終安得定問雲居膺因何佛菩薩不被生死所拘凡夫獨縈此苦答於清淨性中計有能所即墮生死佛菩薩善知清淨性中不落有無即能所不立問即有了不了人答了尚不可得豈有能了人乎汝應念淨性中無有凡聖亦無了不了人凡聖俱是名若隨名生解即墮生死若知假名不實即無有當名者此是究竟極處若云我能了彼不能了是大病見有淨穢凡聖亦大病作無凡聖解又屬撥無因果見有淨性可棲止亦大病作不棲止解亦大病然淨性中雖無動搖且不壞方便應用及興慈運悲如是慈悲即今清淨性可謂見性成佛矣問大珠如何得大涅槃答不造生死業問如何是生死業答求大涅槃是生死業捨垢取淨有證有得及不脫對治門均生死業問如何得解脫答本自無縛何用求解直用直行是無等等黃檗云人多謂境礙心事礙理常欲逃境安心屏事存理不知乃心礙境理礙事但心空境自空理寂事自寂勿倒用心也人多不肯落空不知自心本空愚人除事不除心智者除心不除事趙州問南泉如何是道答平常心是道問還可趨向也無答擬向即乖問不擬爭知是道答道不屬知不知知是妄覺不知是無記真達不疑之地如太虗廓然豈可強是非耶師悟理僧問趙州學人乍入叢林乞指示師曰吃粥了未答吃了也師云洗鉢盂去雲門云且道指示無指示若言有趙州向伊道甚麼若言無這僧為甚悟去皓月問了即業障本來空師尊可祖為甚却償債去長沙岑曰大德不識本來空問如何是本空答業障是問如何是業障答本來空是偈曰假有元非有假滅亦非無涅槃償債義一性更無殊岑喚竺尚書書應諾岑曰不是本命問不可離却今祇對別有第二主人岑曰喚尚書作至尊得麼問恁麼總不祇對時莫非主人岑曰非但祇對與不祇對無始劫來是箇生死根本偈曰學道之人不識真只為從來認識神無始劫來生死本癡人喚作本來人妙喜拈曰祇對者既不是却喚甚麼作本來人良久云我恁麼道且作死馬醫僧舉洞山云兄弟東去西去直須向萬里無寸草處去良久云只如無寸草處作麼生去石霜問有人下語否答無霜曰何不道出門便是草僧回舉洞山洞曰瀏陽乃有古佛耶太陽云便不出亦草漫漫地圓通云且道脚跟下一句作麼生若道萬里無寸草許你見洞山若道出門便是草許你見石霜若道不出亦草漫漫許你見太陽若總道不得許你參見延聖何故惟有好風來席上更無閑語落人間石霜曰初機先須識取頭其尾自至疏山問如何是頭霜曰直須知有如何是尾答盡却今時問有頭無尾答吐得黃金堪作甚麼問有尾無頭答猶有依倚在問頭尾相稱答渠不作這箇解會亦未許渠在後僧問九峰如何是頭答開眼不覺曉問尾曰不坐萬年牀問有頭無尾答終是不貴問有尾無頭答雖飽無力問頭尾相稱答兒孫得力室內不知夾山云明不越戶穴不棲巢六戶不掩四衢無踪學不停午意不立玄竿頭絲線從君弄不犯清波意自殊張拙云光明寂照徧河沙凡聖神靈共一家一念不生全體現六根纔動被雲遮斷除妄想重增病趨向真如亦是邪隨順世緣無掛礙涅槃生死等空花洛浦云末後一句始到牢關鎖斷要津不通凡聖向道任汝天下樂欣欣我終不肯欲知上流不將佛祖言教貼在額頭上如龜負圖自取喪身之兆直須劫外明宗莫向言中取則是以石人幾似汝也解唱巴歌汝若似石人雪曲應難和雲門問密密處為甚麼不知有古德答只為密密所以不知有問此人如何親近答莫向密密處親近問不向密密處如何答始解親近門曰諾諾乾峰曰法身三種病二種光須一一透過始解歸家穩坐須知更有向上一竅在雲門出問為甚麼庵內人不知庵外事乾峰呵呵大笑雲曰猶是學人疑處乾曰子是甚麼心行雲曰也要和尚相委乾曰直須與麼方解穩坐門應諾諾雲門曰古宿為慈悲故有落草談若出草之談即無與麼如仰山問僧近離甚處曰廬山又問曾到五老峰麼曰不曾仰曰汝不曾游山此即慈悲之故有落草之談風穴參南院機鋒峻峭南院亦未辨得他次日只尋常問云夏在甚處答與廓侍者過夏院問向你道甚麼答始終只教某一向作主院便打推出曰這般納敗闕漢有甚用處穴服膺一日院問南方一棒作麼商量答作奇特商量穴却問此間作麼商量院拈杖云棒下無生忍臨機不見師穴大徹風穴舉南院云欲得親切莫將問來問會麼問在答處答在問處雖然如是有時問不在答處答不在問處汝若擬議老僧在汝脚跟底大凡參學眼目直須臨機大用現前勿自拘於小節設使言前薦得猶自滯殻迷封句下精通未免觸途狂見應是向來依他作解明昧兩岐一切掃却直教如師兒哮吼一聲璧立千仞誰敢正眼著即瞎却渠眼法眼因沙塞井泉問泉眼不通被沙礙道眼不通被甚麼礙自代曰被眼礙汾陽昭見老宿七十一人後至首山問百丈捲席意旨首云龍袖拂開全體現昭曰師意如何首曰象王行處絕狐踪昭大悟拜起曰萬古碧渾空界月再三撈漉始應知有問見何道理便爾自肯曰正是我放身心處圜悟請益濟臨四賓主怎生演祖曰也只箇程限是甚麼閑事我這裏却是馬前相撲倒便休演謂悟曰你也儘好只是有些病禪忒多只是尋常說話時多少好有僧問因甚嫌人說禪演曰惡情悰慧球云欲得省要却是山河大地與汝發明其道既常亦能究竟若文殊門入者一切土木瓦礫助汝發機若觀音門入者一切音響助汝發機若普賢門入者不動步而到以此三門方便示汝如將一隻折箸攪大海水令彼魚龍知水為命會麼茫沖謂圓通旻曰某墮金紫行與此事稍遠通呼內翰公諾通曰何遠之有公躍然曰乞再垂示通曰此去洪都有四程公佇思通曰見即便見擬思即差公有省吳居厚謁圓通曰前問訥老透趙州關事如何訥曰且去做官今不覺五十餘年通曰曾明得透關事麼厚曰未甚灑脫通度扇曰請使扇厚即揮扇通曰有甚不灑脫處厚忽省曰便請末後句通乃揮扇兩下厚曰親切親切通曰吉獠舌頭三千里覩貺問通曰是法非思量分別所能解如何湊泊通曰全身入火聚公曰畢竟如何會通曰驀直去公沈吟通曰可更吃茶麼公曰不必通曰何不恁麼會公契旨曰元來太近通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處通曰咦猶有這箇在公曰乞再示通曰便恁麼去鐺是鐵鑄師遠舉楊岐三脚驢話有道宗師家無固必有問隨答作乾無事會不見楊岐用處乃至祖師千差萬別門庭如何消遣又有只向佛邊會却與自己沒交涉古人道凡有言句一一須消歸自己又作麼生又有只作自己會棄却古人用處惟知明自己事古人方便却如何消遣既消遣不下却似抱橋柱洗澡要且放手不得此亦是病又有却去脚多少處會此病最難醫也所以他語巧妙處學人卒難摸索纔擬心即差也前輩謂之楊岐宗旨須是他屋裏人到恁麼田地方堪傳授這公案直須透頂透底漢方了得直須向威音那畔覰著提起便行捺著便轉却向萬仞峰頭進一步可以坐斷天下人舌頭今有麼如無聽一頌三脚驢子弄蹄行直透威音萬丈坑雲在嶺頭閑不徹水流㵎底太忙生湖南長老誰解會行人更在青山外王蕭問大隨云某有箇見處被人問却開口不得過在甚處隨曰過在有箇見處隨却問幾時到任曰去年八月隨曰為甚麼道開口不得蕭契悟湛堂謂大慧曰我這裏禪你一時理會得說也說得拈頌普說也做得只欠這一解在㘞若不得這一解惺惺思量時便有禪纔睡著便無了如何敵得生死杲曰正是某甲疑處堂病亟曰有箇勤巴子汝必依之可了汝事後見圜悟舉東山水上行語杲呈四十九轉語悟不肯悟一日舉云天寧即不然若問諸佛出身處但向道薰風自南來殿角生微涼杲豁然悟察杲雖得前後際斷動相不生却坐靜躶躶處曰不易你到這田地可惜死了不能活不疑言句是為大病不見道懸崖撒手自肯承當絕後再甦欺君不得須知有這箇道理每舉有句無句如藤倚樹問之杲開口便曰不是飯時杲把箸在手忘下口杲曰這箇道理如狗看熱油鐺欲䑛䑛不得欲捨捨不得悟曰喻得極好這便是金剛圈栗棘蓬也一日杲問和尚曾問五祖祖道甚麼悟述祖云描也描不成畫也畫不就又問樹倒藤枯時如何祖云相隨來也杲曰我會也杲既大徹反於數禪客有疑悟曰我這裏禪如大海你將箇大海傾去始得若將鉢盂盛得些是你器量如此能有幾箇得到你田地悟語杲云近諸方盡成窠臼我與佛鑑佛眼參禪今佛鑑下有一種作狗子叫鵓鳩鳴取笑人佛眼下有一種覰燈籠指東畫西如眼見鬼一般我這裏且無這兩般病杲曰擊石火閃電光引得無限人弄業識舉了便會了豈不是大窠臼悟不覺吐舌乃云休管他我只以契證為期若不契證終不放過杲曰契證即得第恐恁麼傳將去舉了便悟了硬主張擊石火閃電光業識茫茫未有了日悟深肯之雪巖云處州書記說這工夫不濟事動靜二相打作兩橛我被說著真箇坐便有這境纔拈提放箸都不見了他道參禪須起疑大疑大悟小疑小悟不疑不悟我便提箇乾矢橛封了被脅不沾席行坐只是昏散膠擾霎時乾淨不得淨慈七兄弟坐禪有修上座不在數只是獨行獨坐蒲團坐如鐵橛行時挺起脊梁我要近他說話二年不得我因不倒頭昏散輥一團不覺流淚起鄉念自此都放下兩月後再來參假却得這一放十倍精神元來究明此事不睡也不得須中夜爛睡一覺方有精神一日見修問去年要與你說話只避我他道辦道人無翦爪工更與你說話在我末後道今被昏散打併不去他云是你不猛烈須是高著蒲團豎起脊梁三百六十骨脊八萬四千毛竅併作一箇無字我依他提得轉力轉見又散到此盡命一提忽見身心俱忘目前如一片銀山相似清清三晝夜修問我對云辦道他云你喚什麼作道不能對轉加迷悶首座云你但大開著眼看是什麼道理被這一提纔上蒲團面前豁然開如地陷一般說似人不得尋修兄便道且喜且喜我與他柳堤行一轉森羅萬象向來所厭棄物與無明煩惱昏散元來盡自妙明真如性中流出半月餘動相不生可憐不遇大手眼尊宿與我打併不合向者裏坐住謂之見地不脫礙正知見於睡著無夢想聞見地又打作兩橛寤寐恒一之說又透不過礙在胷中十年後來東天目見一株古柏觸著向來所得境界和底一時颺下自此不疑生死不疑佛祖方始見徑山老人立處高峰參雪巖方問訊即打出閉門再往令看一話頭忽一日問誰與你拖這死屍來聲未絕即打不知幾偶憶一歸何處話疑情頓發三晝夜目不交睫擡頭覩演祖真讚云百年三萬六千日反覆元來是遮漢打破拖死屍疑見欽問誰拖死屍到這裏便喝欽拈棒把住云今日打某甲不得欽曰為甚打不得拂袖便出一日欽問日間浩浩時作得主麼答作得主問睡夢中作得主麼答作得主又云正睡著無夢想見聞主在甚處無語欽囑曰從今日去也不要你學佛學法但飢吃飯困打眠纔覺來却抖擻精神我這一覺主公畢竟在甚處安身立命自誓云𢬵一生做箇癡獃漢決要這一著子明白越五載同宿友枕墮地作聲大悟語學人曰今負一知半解不能了徹者病在甚處只為坐在不疑之地被參徒下一喝不能辨邪正蓋從前得處莽鹵也直須參到大徹田地明得差別智方能勘辨人殺活人此吃折脚鐺飯底工夫做到如二人同時下喝那有眼那無眼那箇深那箇淺還辨得出麼應庵舉白雲端云悟了須遇人始得若不遇人只是箇無尾巴猢猻纔弄出便人笑深信此道者萬中無一私謂歷祖乘大悲願出世為人開示言句洵屬美不勝收茲門所錄重重透發心宗體段大備倘能精細研察儘可藉以徹了本來其有欲融會淹貫者更須徧閱古今燈錄愈淵博而愈廣大者也然須知古德示人千言萬語阨其要有二一悟門二保任未悟之先自初學至久參總須以悟門徹契為入手所謂大疑大悟只貴子見地不貴子行履是也既悟後自破參至臘終全在功熏縝密為正行所謂行解相應那邊明白了來這邊行履是也如以兩者相較則悟後工夫當無不自重己靈自慶知有即逢緣懈怠時知抱慚或不至如癡狂輩肆無忌憚依前甘作博地凡夫以辜負唐喪此生知見若未悟前則全在師家鉗鎚妙密學人志量宏深不到徹頭不肯歇手脫有纖毫消不過處𢬵著十年廿載必求透徹而後休方得隻眼孤撐種智深入與佛祖把手同行其於古人千差萬別公案機用言句如觀掌紋悉洞鑒明了纔不枉來閻浮一番是以悟門一著尤為吃緊須看古人參究榜樣何等刻苦何等勇猛如大慧在湛堂座下拈提皆會於門頭戶邊消息已是七穿八達少此一㘞則終不了當必待薰風南來句始剝去一層又必待相隨來也句方徹法源底則今時人略有所得頓爾不疑言句自滿足者奚翅萬里崖州又如雪巖已得動相不生了知萬象森羅皆妙明性流出而無夢想處打成兩橛若非肯自刻苦那有觸著古柏徹底打併時節雪巖是過來人便將此藥頭炙高峰之病蓋無夢想見聞之際是昏悶地位明了意識不行全沒撈摸處不獨雪巖高峰二尊宿透不去大約盡未來際禪客或得見聞覺知光影者於此總必打成兩橛其無志氣者或強作血脈不斷消解或強謂誰求相見理會更不求通徹打併此是古今學人通病若高峰以先得元來遮漢見地已透拖死屍主更不𢬵此一生做獃漢那得有五載後枕子落地徹悟因緣寄語來哲須知未透此關總是有夢有想時夾雜昭靈業識非真白淨主公也且於古德言句中如百丈云靈光獨耀獨字臨濟云歷歷孤明孤字洞山所云三更初夜月明前之初字前字又古所云父母未生前主公安身立命處句死了燒了向甚麼處相見句身裏出門難句堂中事作麼生句庵內人為甚麼不知庵外事句種種此類皆是浮面依稀影響支吾消釋斷斷不能徹底萬分親切契證似此廉纖粘滯籠統支離自救不能如何勘驗得學人邪正深淺承嗣得佛祖慧命五體投地痛哭頂禮願與諸來哲具第一等人志氣具第一等人剛骨具第一等人猛烈具第一等人眼目平氣虗衷我之所悟倘不與無夢想主公安身立命處相應決不肯將就糢糊放過罷手不計歲月與之苦切撕捱庶幾思之思之鬼神通之絕後再甦欺君不得慶快生平證得本分清楚真不愧為少林兒孫此則得得西來老古椎所深望於常寂光中者也
